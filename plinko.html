<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>Diamond Casino — Plinko</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#0a0418">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Diamond Casino">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png">
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bungee&family=Bungee+Shade&family=Outfit:wght@400;600;800&family=Geist+Mono:wght@400;600;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg-0: #0a0418;
  --bg-1: #150828;
  --gold-0: #fff0a8;
  --gold-1: #ffd24a;
  --gold-2: #b8860b;
  --gold-deep: #5c3d00;
  --neon-pink: #ff2e93;
  --neon-cyan: #22d3ee;
  --neon-violet: #a855f7;
  --neon-green: #5cffa1;
  --board-deep: #0a0420;
  --board-mid: #1a0838;
  --shadow-deep: 0 30px 60px -10px rgba(0,0,0,0.7), 0 18px 36px -18px rgba(0,0,0,0.5);
}

* { box-sizing: border-box; margin: 0; padding: 0; touch-action: manipulation; }

html, body {
  width: 100%;
  min-height: 100vh;
  overflow-x: hidden;
  font-family: 'Outfit', sans-serif;
  color: #fff;
  background:
    radial-gradient(ellipse at 20% 0%, rgba(168,85,247,0.20) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 100%, rgba(34,211,238,0.16) 0%, transparent 55%),
    radial-gradient(ellipse at 50% 50%, rgba(255,46,147,0.08) 0%, transparent 70%),
    linear-gradient(180deg, var(--bg-0), var(--bg-1) 60%, var(--bg-0));
  background-attachment: fixed;
  user-select: none;
  -webkit-user-select: none;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 1;
  opacity: 0.05;
  mix-blend-mode: overlay;
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/></svg>");
}

/* TOP CHROME — identical to other games */
.lobby-link, .history-btn {
  position: fixed;
  top: 12px;
  z-index: 30;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  height: 36px;
  padding: 0 14px;
  border: 0;
  border-radius: 12px;
  text-decoration: none;
  font-family: 'Bungee', cursive;
  font-size: 11px;
  letter-spacing: 0.2em;
  line-height: 1;
  cursor: pointer;
  background: linear-gradient(180deg, rgba(42,18,77,0.85), rgba(15,4,30,0.85));
  backdrop-filter: blur(8px);
  transition: transform 0.1s, filter 0.15s;
}
.lobby-link {
  left: 12px;
  color: var(--gold-1);
  box-shadow: inset 0 0 0 1.5px rgba(255,210,74,0.35), 0 3px 0 rgba(0,0,0,0.5);
}
.history-btn {
  left: 122px;
  color: var(--neon-cyan);
  box-shadow: inset 0 0 0 1.5px rgba(34,211,238,0.4), 0 3px 0 rgba(0,0,0,0.5);
}
.lobby-link::before { content: '←'; font-size: 14px; line-height: 1; }
.history-btn::before { content: '⌛'; font-size: 13px; line-height: 1; }
.lobby-link:hover, .history-btn:hover { filter: brightness(1.15); }
.lobby-link:active, .history-btn:active { transform: translateY(2px); }

.balance-link {
  position: fixed;
  top: 12px; right: 12px;
  z-index: 30;
  display: inline-flex;
  align-items: center;
  gap: 10px;
  padding: 9px 14px 8px;
  border-radius: 12px;
  background: linear-gradient(180deg, rgba(42,18,77,0.85), rgba(15,4,30,0.85));
  backdrop-filter: blur(8px);
  box-shadow: inset 0 0 0 1.5px rgba(255,210,74,0.35), 0 3px 0 rgba(0,0,0,0.5);
}
.balance-link .label {
  font-family: 'Bungee', cursive;
  font-size: 9px;
  letter-spacing: 0.22em;
  color: rgba(255,210,74,0.75);
}
.balance-link .value {
  font-family: 'Geist Mono', monospace;
  font-weight: 800;
  font-size: 14px;
  color: #fff;
}
.balance-link .btn-add {
  width: 26px; height: 26px;
  border-radius: 7px;
  border: 0;
  font-family: 'Bungee', cursive;
  font-size: 14px;
  cursor: pointer;
  color: #0a0418;
  background: linear-gradient(180deg, #5cffa1, #14b85a);
  box-shadow: 0 2px 0 rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.4);
}
.balance-link .btn-add:active { transform: translateY(1px); }

/* STAGE */
.stage {
  position: relative;
  z-index: 2;
  min-height: 100vh;
  max-width: 980px;
  margin: 0 auto;
  padding: 64px 16px 28px;
  display: flex;
  flex-direction: column;
  gap: 14px;
  align-items: center;
}

/* GAME TITLE — tiny header above board */
.game-header {
  text-align: center;
  margin-top: 4px;
}
.game-header .pre {
  font-family: 'Bungee', cursive;
  font-size: 9px;
  letter-spacing: 0.5em;
  color: var(--neon-cyan);
  text-shadow: 0 0 8px rgba(34,211,238,0.55);
  margin-bottom: 4px;
}
.game-header .title {
  font-family: 'Bungee Shade', 'Bungee', cursive;
  font-size: clamp(28px, 4.5vw, 38px);
  line-height: 1;
  background: linear-gradient(180deg, #fff7d1 0%, var(--gold-1) 45%, #b8860b 100%);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  filter: drop-shadow(0 3px 0 rgba(0,0,0,0.55)) drop-shadow(0 0 14px rgba(255,210,74,0.3));
  letter-spacing: 0.04em;
}

/* BOARD FRAME — holds the canvas */
.board-frame {
  position: relative;
  width: min(560px, 100%);
  aspect-ratio: 1 / 1;
  border-radius: 22px;
  padding: 12px;
  background:
    radial-gradient(ellipse at top, rgba(168,85,247,0.18), transparent 60%),
    linear-gradient(180deg, #1a0838, #08031a 80%);
  box-shadow:
    inset 0 0 0 1.5px rgba(255,210,74,0.32),
    inset 0 0 40px rgba(0,0,0,0.5),
    var(--shadow-deep);
}
.board-frame::before {
  content: '';
  position: absolute;
  inset: 4px;
  border-radius: 18px;
  pointer-events: none;
  padding: 1.5px;
  background: linear-gradient(135deg, var(--gold-0), var(--gold-1) 30%, var(--gold-deep) 50%, var(--gold-1) 70%, var(--gold-0));
  -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
  -webkit-mask-composite: xor;
  mask-composite: exclude;
  opacity: 0.5;
}
#board {
  width: 100%;
  height: 100%;
  display: block;
  border-radius: 14px;
  background:
    radial-gradient(ellipse at 50% 12%, rgba(168,85,247,0.22), transparent 65%),
    radial-gradient(ellipse at 50% 85%, rgba(34,211,238,0.10), transparent 70%),
    linear-gradient(180deg, #08021a 0%, #0d0428 50%, #050118 100%);
  box-shadow: inset 0 0 22px rgba(0,0,0,0.6);
}

/* RECENT RESULTS STRIP — last few multipliers */
.recent-strip {
  display: flex;
  gap: 6px;
  flex-wrap: nowrap;
  overflow: hidden;
  height: 30px;
  width: min(560px, 100%);
  justify-content: center;
  align-items: center;
}
.recent-pill {
  font-family: 'Geist Mono', monospace;
  font-weight: 800;
  font-size: 12px;
  padding: 5px 10px;
  border-radius: 999px;
  background: rgba(255,255,255,0.04);
  box-shadow: inset 0 0 0 1px rgba(255,255,255,0.08);
  white-space: nowrap;
  opacity: 0;
  animation: recentIn 0.4s ease forwards;
}
.recent-pill.tier-1 { background: linear-gradient(180deg, rgba(255,46,147,0.32), rgba(120,8,60,0.5)); box-shadow: inset 0 0 0 1px rgba(255,46,147,0.55), 0 0 12px rgba(255,46,147,0.4); color: #ffe6f0; }
.recent-pill.tier-2 { background: linear-gradient(180deg, rgba(255,170,46,0.32), rgba(120,60,8,0.5)); box-shadow: inset 0 0 0 1px rgba(255,170,46,0.55), 0 0 12px rgba(255,170,46,0.35); color: #fff0d4; }
.recent-pill.tier-3 { background: linear-gradient(180deg, rgba(255,210,74,0.28), rgba(80,52,8,0.55)); box-shadow: inset 0 0 0 1px rgba(255,210,74,0.5); color: #fff7d1; }
.recent-pill.tier-4 { background: rgba(255,255,255,0.05); box-shadow: inset 0 0 0 1px rgba(255,255,255,0.15); color: rgba(255,255,255,0.65); }
.recent-pill.tier-5 { background: rgba(255,90,125,0.10); box-shadow: inset 0 0 0 1px rgba(255,90,125,0.35); color: #ff8aa2; }
@keyframes recentIn {
  from { transform: translateY(-6px) scale(0.85); opacity: 0; }
  to   { transform: translateY(0) scale(1);     opacity: 1; }
}

/* CONTROLS PANEL */
.controls {
  width: min(560px, 100%);
  display: flex;
  flex-direction: column;
  gap: 10px;
  padding: 16px;
  border-radius: 18px;
  background:
    radial-gradient(ellipse at top, rgba(34,211,238,0.10), transparent 60%),
    linear-gradient(180deg, #1a0838, #0a0319);
  box-shadow:
    inset 0 0 0 1.5px rgba(255,210,74,0.25),
    var(--shadow-deep);
}
.control-row {
  display: flex;
  align-items: center;
  gap: 12px;
}
.control-row .label {
  flex: 0 0 56px;
  font-family: 'Bungee', cursive;
  font-size: 10px;
  letter-spacing: 0.24em;
  color: var(--neon-cyan);
  text-shadow: 0 0 8px rgba(34,211,238,0.45);
}

/* Segmented buttons (risk / rows / auto) */
.seg {
  flex: 1;
  display: grid;
  grid-auto-columns: 1fr;
  grid-auto-flow: column;
  gap: 6px;
  padding: 4px;
  border-radius: 12px;
  background: rgba(0,0,0,0.4);
  box-shadow: inset 0 0 0 1px rgba(255,255,255,0.05);
}
.seg button {
  border: 0;
  padding: 9px 4px;
  border-radius: 8px;
  font-family: 'Bungee', cursive;
  font-size: 11px;
  letter-spacing: 0.18em;
  color: rgba(255,255,255,0.6);
  background: transparent;
  cursor: pointer;
  transition: color 0.15s, background 0.18s, box-shadow 0.18s;
}
.seg button:hover { color: #fff; }
.seg button.active {
  color: #0a0418;
  background: linear-gradient(180deg, var(--gold-0), var(--gold-1) 55%, var(--gold-2));
  box-shadow: 0 2px 0 rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.45);
  text-shadow: 0 1px 0 rgba(255,255,255,0.3);
}
.seg button:disabled,
.bet-mod:disabled,
#bet:disabled {
  cursor: not-allowed;
  filter: grayscale(0.55) brightness(0.78);
  opacity: 0.55;
}
.seg button:disabled:hover,
.bet-mod:disabled:hover { filter: grayscale(0.55) brightness(0.78); }

/* Bet row */
.bet-wrap {
  flex: 1;
  position: relative;
  display: flex;
  gap: 6px;
}
.bet-input-wrap {
  flex: 1;
  position: relative;
}
.bet-input-wrap::before {
  content: '$';
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  font-family: 'Geist Mono', monospace;
  font-size: 16px;
  color: var(--gold-1);
  text-shadow: 0 0 8px rgba(255,210,74,0.4);
  pointer-events: none;
}
#bet {
  width: 100%;
  padding: 10px 12px 10px 26px;
  font-family: 'Geist Mono', monospace;
  font-size: 16px;
  font-weight: 800;
  letter-spacing: 0.04em;
  color: #fff;
  border: 0;
  border-radius: 10px;
  background: rgba(0,0,0,0.5);
  box-shadow: inset 0 0 0 1.5px rgba(34,211,238,0.35);
  outline: none;
  transition: box-shadow 0.18s;
}
#bet:focus { box-shadow: inset 0 0 0 1.5px var(--neon-cyan), 0 0 12px rgba(34,211,238,0.35); }
.bet-mods {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 6px;
  flex: 0 0 165px;
}
.bet-mod {
  border: 0;
  padding: 9px 4px;
  border-radius: 9px;
  font-family: 'Bungee', cursive;
  font-size: 11px;
  letter-spacing: 0.12em;
  cursor: pointer;
  color: rgba(255,255,255,0.75);
  background: rgba(0,0,0,0.45);
  box-shadow: inset 0 0 0 1px rgba(255,255,255,0.08);
  transition: filter 0.15s, color 0.15s, box-shadow 0.15s;
}
.bet-mod:hover { color: #fff; filter: brightness(1.15); box-shadow: inset 0 0 0 1px rgba(34,211,238,0.5); }

/* DROP button — the star */
.drop-btn {
  border: 0;
  margin-top: 6px;
  width: 100%;
  padding: 16px;
  border-radius: 14px;
  font-family: 'Bungee', cursive;
  font-size: 16px;
  letter-spacing: 0.3em;
  cursor: pointer;
  color: #0a0418;
  background: linear-gradient(180deg, var(--gold-0), var(--gold-1) 50%, var(--gold-2));
  box-shadow: 0 6px 0 #3a2200, inset 0 1px 0 rgba(255,255,255,0.45), 0 0 24px rgba(255,210,74,0.32);
  text-shadow: 0 1px 0 rgba(255,255,255,0.3);
  transition: transform 0.1s, filter 0.18s, box-shadow 0.18s;
}
.drop-btn::before { content: '◆ '; margin-right: 6px; }
.drop-btn:hover { filter: brightness(1.08); }
.drop-btn:active { transform: translateY(3px); box-shadow: 0 3px 0 #3a2200, inset 0 1px 0 rgba(255,255,255,0.45); }
.drop-btn[disabled] { filter: grayscale(0.4) brightness(0.7); cursor: not-allowed; pointer-events: none; }
.drop-btn.auto-mode {
  background: linear-gradient(180deg, #5cffa1, #14b85a);
  box-shadow: 0 6px 0 #0a4a23, inset 0 1px 0 rgba(255,255,255,0.4), 0 0 24px rgba(92,255,161,0.4);
  color: #08160d;
}
.drop-btn.auto-stop {
  background: linear-gradient(180deg, #ff8aa2, #ff2e58);
  box-shadow: 0 6px 0 #5c0a1c, inset 0 1px 0 rgba(255,255,255,0.4), 0 0 22px rgba(255,46,88,0.45);
  color: #fff;
}

/* MOBILE */
@media (max-width: 720px) {
  .lobby-link, .history-btn {
    height: 32px;
    padding: 0 11px;
    font-size: 9px;
    letter-spacing: 0.14em;
    gap: 6px;
  }
  .history-btn { left: 102px; }
  .lobby-link::before { font-size: 12px; }
  .balance-link { padding: 7px 11px; gap: 8px; }
  .balance-link .label { font-size: 8px; }
  .balance-link .value { font-size: 12px; }
  .balance-link .btn-add { width: 24px; height: 24px; font-size: 13px; }
  .stage { padding: 54px 12px 22px; gap: 11px; }
  .game-header .title { font-size: 22px; }
  .controls { padding: 12px; gap: 8px; }
  .control-row { gap: 8px; }
  .control-row .label { flex-basis: 44px; font-size: 9px; letter-spacing: 0.18em; }
  .seg button { padding: 8px 2px; font-size: 10px; letter-spacing: 0.1em; }
  .bet-mods { flex-basis: 130px; }
  .bet-mod { font-size: 10px; padding: 8px 3px; letter-spacing: 0.08em; }
  #bet { font-size: 14px; padding: 8px 10px 8px 22px; }
  .bet-input-wrap::before { font-size: 14px; left: 10px; }
  .drop-btn { padding: 14px; font-size: 14px; letter-spacing: 0.22em; }
  .recent-strip { height: 26px; }
  .recent-pill { font-size: 11px; padding: 4px 8px; }
}
</style>
</head>
<body>
<script src="casino-audio.js"></script>
<script type="module" src="casino-account.js"></script>

<a class="lobby-link" href="index.html">LOBBY</a>
<button class="history-btn" id="btn-history" title="History">HISTORY</button>
<div class="balance-link">
  <span class="label">BAL</span>
  <span class="value">$<span id="balance">0</span></span>
  <button class="btn-add" id="btn-add" title="Add chips">+</button>
</div>

<div class="stage">
  <div class="game-header">
    <div class="pre">DIAMOND CASINO</div>
    <div class="title">PLINKO</div>
  </div>

  <div class="board-frame">
    <canvas id="board"></canvas>
  </div>

  <div class="recent-strip" id="recent-strip"></div>

  <div class="controls">
    <div class="control-row">
      <span class="label">RISK</span>
      <div class="seg" id="risk-seg">
        <button data-v="low" class="active">LOW</button>
        <button data-v="med">MEDIUM</button>
        <button data-v="high">HIGH</button>
      </div>
    </div>
    <div class="control-row">
      <span class="label">ROWS</span>
      <div class="seg" id="rows-seg">
        <button data-v="8">8</button>
        <button data-v="12">12</button>
        <button data-v="16" class="active">16</button>
      </div>
    </div>
    <div class="control-row">
      <span class="label">BET</span>
      <div class="bet-wrap">
        <div class="bet-input-wrap">
          <input id="bet" type="number" min="0.10" step="0.10" inputmode="decimal" value="1.00">
        </div>
        <div class="bet-mods">
          <button class="bet-mod" data-mul="0.5">½</button>
          <button class="bet-mod" data-mul="2">2×</button>
          <button class="bet-mod" data-amt="max">MAX</button>
        </div>
      </div>
    </div>
    <div class="control-row">
      <span class="label">AUTO</span>
      <div class="seg" id="auto-seg">
        <button data-v="0" class="active">OFF</button>
        <button data-v="10">×10</button>
        <button data-v="25">×25</button>
        <button data-v="100">×100</button>
      </div>
    </div>
    <button class="drop-btn" id="drop">DROP BALL</button>
  </div>
</div>

<script>
'use strict';

/* ============================================================
   PLINKO — Diamond Casino
   Single-file game: physics + canvas render + bet wiring + audio
   ============================================================ */

if (window.SettingsUI) SettingsUI.mount();
if (window.HistoryUI)  HistoryUI.mount();
if (window.Music)      Music.init(encodeURI("Music/Plinko Royale.m4a"));

/* ---------- shared balance (matches other games) ---------- */
const BALANCE_KEY = 'casino.balance';
function loadBalance() {
  const v = parseFloat(localStorage.getItem(BALANCE_KEY));
  return isNaN(v) || v < 0 ? 1000 : v;
}
function persistBalance(v) {
  try { localStorage.setItem(BALANCE_KEY, String(v)); } catch (e) {}
}
function fmt(n) {
  const cents = Math.round(n * 100) / 100;
  if (Number.isInteger(cents)) return cents.toLocaleString('en-US');
  return cents.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}
let balance = loadBalance();
const balEl = document.getElementById('balance');
function refreshBalance() { balEl.textContent = fmt(balance); }
refreshBalance();
window.addEventListener('focus',   () => { balance = loadBalance(); refreshBalance(); });
window.addEventListener('pageshow',() => { balance = loadBalance(); refreshBalance(); });

document.getElementById('btn-add').addEventListener('click', () => {
  window.location.href = 'index.html';
});
document.getElementById('btn-history').addEventListener('click', () => {
  if (window.HistoryUI) HistoryUI.open({ scope: 'session', game: 'plinko' });
});

/* ---------- AUDIO ----------
   Tiny WebAudio synth handles the rapid peg "ticks" (cleaner than
   loading a sample for each bounce). File-based SFX cover the
   bigger moments — drop, win, payout, loss.                       */
const SFX_PATHS = {
  buttonSoft: 'sfx/button_soft.mp3',
  chipPlace:  'sfx/chip_place_a.mp3',
  chipPayout: 'sfx/chip_payout.mp3',
  winChime:   'sfx/win_chime.mp3',
  fanfare:    'sfx/blackjack_fanfare.mp3',
};
const sfxPool = {};
Object.entries(SFX_PATHS).forEach(([key, path]) => {
  const pool = [];
  for (let i = 0; i < 3; i++) {
    const a = new Audio(path);
    a.preload = 'metadata';
    pool.push(a);
  }
  sfxPool[key] = { pool, idx: 0 };
});
function playSfx(key, volMul = 1) {
  const entry = sfxPool[key];
  if (!entry) return;
  const a = entry.pool[entry.idx];
  entry.idx = (entry.idx + 1) % entry.pool.length;
  try {
    a.currentTime = 0;
    a.volume = (window.Settings ? Settings.sfxVolume() : 0.85) * volMul;
    a.play().catch(() => {});
  } catch (e) {}
}

/* WebAudio peg tick. Lazy-init on first user gesture so we play
   nicely with autoplay policies. Pitch jitters per hit. */
let actx = null;
function ensureAudio() {
  if (actx) return actx;
  try { actx = new (window.AudioContext || window.webkitAudioContext)(); }
  catch (e) { actx = null; }
  return actx;
}
let lastTickT = 0;
function pegTick(velocity) {
  const ctx = ensureAudio();
  if (!ctx) return;
  const vol = (window.Settings ? Settings.sfxVolume() : 0.85);
  if (vol <= 0.001) return;
  // Velocity gate — soft glancing hits don't tick. These contribute most
  // of the chittering when multiple balls are in flight; you don't lose
  // anything by skipping them since the strong bounces still register.
  if (velocity < 120) return;
  const now = ctx.currentTime;
  // Hard rate limit (was 12 ms → 45 ms). Across multiple in-flight balls,
  // collisions cluster; capping at ~22 ticks/sec prevents the avalanche.
  if (now - lastTickT < 0.045) return;
  lastTickT = now;

  // Map velocity (above the gate) → pitch & gain. Dropped pitch range
  // from 1100-1700 Hz (piercing chirp) to 480-820 Hz (warm wooden "tok").
  // Sine instead of triangle removes the harmonic bite.
  const v = Math.min(1, Math.max(0, (velocity - 120) / 720));
  const baseFreq = 480 + Math.random() * 160 + v * 180;

  const o = ctx.createOscillator();
  o.type = 'sine';
  o.frequency.setValueAtTime(baseFreq, now);
  o.frequency.exponentialRampToValueAtTime(Math.max(110, baseFreq * 0.55), now + 0.04);

  const g = ctx.createGain();
  // Audible-but-not-piercing. Bumped peak from 0.012-0.04 -> 0.025-0.07
  // now that win volumes are pulled back; pegs should still read as
  // background texture, not foreground percussion.
  const peak = 0.025 + v * 0.045;
  g.gain.setValueAtTime(0.0001, now);
  g.gain.exponentialRampToValueAtTime(peak * vol, now + 0.003);
  g.gain.exponentialRampToValueAtTime(0.0001, now + 0.045);

  o.connect(g).connect(ctx.destination);
  o.start(now);
  o.stop(now + 0.06);
}
/* Replaces the file SFX `lose_low.mp3` — that sample is jagged and too
   loud for sub-1× hits, which fire constantly in plinko. A short, soft,
   descending sine reads as "no win" without abrading the ear. */
function softLoss() {
  const ctx = ensureAudio();
  if (!ctx) return;
  const vol = (window.Settings ? Settings.sfxVolume() : 0.85);
  if (vol <= 0.001) return;
  const now = ctx.currentTime;
  const o = ctx.createOscillator();
  o.type = 'sine';
  o.frequency.setValueAtTime(240, now);
  o.frequency.exponentialRampToValueAtTime(150, now + 0.20);
  const g = ctx.createGain();
  g.gain.setValueAtTime(0.0001, now);
  g.gain.exponentialRampToValueAtTime(0.05 * vol, now + 0.01);
  g.gain.exponentialRampToValueAtTime(0.0001, now + 0.22);
  o.connect(g).connect(ctx.destination);
  o.start(now);
  o.stop(now + 0.24);
}

function slotThud() {
  const ctx = ensureAudio();
  if (!ctx) return;
  const vol = (window.Settings ? Settings.sfxVolume() : 0.85);
  if (vol <= 0.001) return;
  const now = ctx.currentTime;
  const o = ctx.createOscillator();
  o.type = 'sine';
  o.frequency.setValueAtTime(120, now);
  o.frequency.exponentialRampToValueAtTime(55, now + 0.18);
  const g = ctx.createGain();
  g.gain.setValueAtTime(0.0001, now);
  g.gain.exponentialRampToValueAtTime(0.22 * vol, now + 0.005);
  g.gain.exponentialRampToValueAtTime(0.0001, now + 0.22);
  o.connect(g).connect(ctx.destination);
  o.start(now);
  o.stop(now + 0.24);
}

/* ---------- PAYOUT TABLES — nerfed
   Stake-style structure but edge multipliers capped much lower than the
   originals. Old 16/high topped out at 1000× — a single $1000 ball into
   the corner cup paid $1M and a $2275 bankroll exploded to $4M over
   100 drops. Under (close to) binomial distribution these tables target
   ~93-96% RTP, with max payout 200× at the top tier. */
const MULTIPLIERS = {
  // 8 rows: only 256 binomial outcomes, so P(edge) is 1/256 vs 1/65536
  // for 16 rows — same multiplier shape pays out massively more often.
  // Tables nerfed accordingly (binomial RTP ~93/85/77% across L/M/H).
  8: {
    low:  [3,   1.5, 1.1, 1.0, 0.5, 1.0, 1.1, 1.5, 3],
    med:  [5,   2.0, 1.2, 0.7, 0.4, 0.7, 1.2, 2.0, 5],
    high: [10,  3.0, 1.3, 0.3, 0.2, 0.3, 1.3, 3.0, 10],
  },
  12: {
    low:  [7,   2.5, 1.5, 1.3, 1.1, 1.0, 0.5, 1.0, 1.1, 1.3, 1.5, 2.5, 7],
    med:  [22,  9,   3.5, 1.8, 1.0, 0.6, 0.3, 0.6, 1.0, 1.8, 3.5, 9,   22],
    high: [60,  16,  6.0, 2.0, 0.7, 0.3, 0.2, 0.3, 0.7, 2.0, 6.0, 16,  60],
  },
  16: {
    low:  [9,   4,   1.8, 1.4, 1.3, 1.2, 1.1, 1.0, 0.5, 1.0, 1.1, 1.2, 1.3, 1.4, 1.8, 4,   9],
    med:  [30,  14,  6.0, 3.0, 2.0, 1.3, 0.9, 0.7, 0.5, 0.7, 0.9, 1.3, 2.0, 3.0, 6.0, 14,  30],
    high: [200, 50,  18,  7.0, 4.0, 2.0, 0.3, 0.3, 0.3, 0.3, 0.3, 2.0, 4.0, 7.0, 18,  50,  200],
  },
};

/* ---------- GAME STATE ---------- */
const state = {
  rows: 16,
  risk: 'low',
  autoCount: 0,           // 0 = manual; n = remaining auto drops
  autoMax: 0,             // selected auto bucket (for UI)
  pendingAuto: 0,         // remaining still to drop in current auto run
  lastDropTime: 0,
  recent: [],             // [{ mult, idx }]
};

/* ---------- CANVAS + RENDER + PHYSICS ---------- */
const canvas = document.getElementById('board');
const ctx2d = canvas.getContext('2d');

// Logical (CSS-pixel) board dimensions are derived from the rendered size.
let LW = 540;   // logical width
let LH = 648;   // logical height (5:6 aspect to match board-frame)
let dpr = 1;

// Computed layout (recomputed when rows changes or canvas resizes)
let pegs = [];           // { x, y, r }
let pegSpaceX = 0;
let pegSpaceY = 0;
let pegRadius = 0;
let ballRadius = 0;
let topPegY = 0;
let bottomPegY = 0;
let slotXs = [];         // x of slot CENTERS at the bottom
let slotWidth = 0;
let slotTopY = 0;        // top of the slot row
let slotBottomY = 0;     // bottom of the canvas / where balls vanish
// Angled side walls — two line segments forming a funnel that exactly
// hugs the peg triangle (no channel between wall and outermost peg, so
// balls can't slide a clean edge path).
let leftWall  = { ax: 0, ay: 0, bx: 0, by: 0 };
let rightWall = { ax: 0, ay: 0, bx: 0, by: 0 };
let wallTopY  = 0;       // upper extent of the angled walls
// Invisible vertical walls dropping from each bottom-row peg into the chip
// area — physically seals each slot so a ball can't drift through the gap
// between the last peg row and the chip strip into the wrong cup.
let slotDividers = [];   // [{ ax, ay, bx, by }, ...]

function layoutBoard() {
  const N = state.rows;          // 8/12/16
  // Bottom row has N+2 pegs → N+1 slots. Top row has 3 pegs.
  const playMargin = 18;
  const bottomPadding = 8;       // breathing room beneath the chip strip
  pegSpaceX = (LW - 2 * playMargin) / (N + 1);
  pegRadius  = Math.max(3, pegSpaceX * 0.11);
  ballRadius = Math.max(4, pegSpaceX * 0.30);

  // Chip geometry mirrors render — chip center sits at slotTopY + 22,
  // height capped at 46. Anchor the chip strip to the bottom of the
  // canvas so there's no dead band beneath it.
  const chipH = Math.min(46, pegSpaceX * 1.30);
  slotTopY = LH - bottomPadding - 22 - chipH / 2;
  slotBottomY = LH - 4;

  // Pegs: prefer the natural 0.88×pegSpaceX vertical spacing, but stretch
  // up to a 1:1 cell ratio if the canvas can absorb it (small N), and
  // compress below natural if the canvas is too short (mobile + N=16).
  const topMargin = Math.max(24, ballRadius * 3.5);
  const naturalPegSpaceY = pegSpaceX * 0.88;
  const maxPegSpaceY     = pegSpaceX * 1.02;
  const triangleAvail    = slotTopY - topMargin - naturalPegSpaceY * 0.55 - 4;
  const fillPegSpaceY    = triangleAvail / Math.max(1, N - 1);
  pegSpaceY = Math.min(maxPegSpaceY, Math.max(naturalPegSpaceY * 0.55, Math.max(naturalPegSpaceY, fillPegSpaceY)));
  // If natural still doesn't fit (extreme small canvas), force-fit.
  if ((N - 1) * pegSpaceY > triangleAvail) pegSpaceY = Math.max(naturalPegSpaceY * 0.55, fillPegSpaceY);

  bottomPegY = slotTopY - pegSpaceY * 0.55;
  topPegY = bottomPegY - (N - 1) * pegSpaceY;

  // Build pegs: row r has (r+3) pegs, centered horizontally.
  // Each peg is tagged with its row index — physics uses this to apply
  // the prerolled path direction once per row.
  pegs = [];
  for (let r = 0; r < N; r++) {
    const count = r + 3;
    const rowW = (count - 1) * pegSpaceX;
    const startX = (LW - rowW) / 2;
    const y = topPegY + r * pegSpaceY;
    for (let k = 0; k < count; k++) {
      pegs.push({ x: startX + k * pegSpaceX, y, r: pegRadius, row: r });
    }
  }

  // Slot centers — sit BETWEEN the bottom-row pegs.
  const bottomCount = N + 2;
  const bottomRowW = (bottomCount - 1) * pegSpaceX;
  const bottomStartX = (LW - bottomRowW) / 2;
  slotXs = [];
  for (let i = 0; i < N + 1; i++) {
    slotXs.push(bottomStartX + (i + 0.5) * pegSpaceX);
  }
  slotWidth = pegSpaceX;

  // Angled walls: from just-outside the top row's outermost peg down
  // to just-outside the bottom row's outermost peg. Forms a triangular
  // funnel — no straight channel for a ball to slide down.
  const topOuterX_L  = (LW - 2 * pegSpaceX) / 2;          // top row leftmost peg x
  const botOuterX_L  = bottomStartX;                       // bottom row leftmost peg x
  const margin       = pegRadius + ballRadius * 0.6;
  wallTopY = Math.max(8, topPegY - pegSpaceY * 0.8);
  leftWall  = { ax: topOuterX_L - margin, ay: wallTopY,
                bx: botOuterX_L - margin, by: slotTopY - 2 };
  rightWall = { ax: (LW - topOuterX_L) + margin, ay: wallTopY,
                bx: (LW - botOuterX_L) + margin, by: slotTopY - 2 };

  // Slot dividers — vertical segments dropping from just below each
  // bottom-row peg into the top of the chip strip. With these in place
  // a ball that's exited the peg array can ONLY fall into the cup that
  // physically contains its current x position — no more cross-slot drift.
  slotDividers = [];
  // Push the divider top well past the peg's bottom so a ball moving
  // straight down off a peg has time to drift sideways into a slot
  // column before encountering a divider (otherwise it can pin on the
  // divider's top endpoint and bounce).
  const dividerTopY = bottomPegY + pegSpaceY * 0.30;
  const dividerBotY = slotTopY + 6;                    // a hair into chip face
  for (let k = 0; k < bottomCount; k++) {
    const px = bottomStartX + k * pegSpaceX;
    slotDividers.push({ ax: px, ay: dividerTopY, bx: px, by: dividerBotY });
  }
}

function resizeCanvas() {
  const rect = canvas.getBoundingClientRect();
  if (rect.width === 0 || rect.height === 0) return;
  dpr = Math.min(window.devicePixelRatio || 1, 2.5);
  LW = rect.width;
  LH = rect.height;
  canvas.width  = Math.round(LW * dpr);
  canvas.height = Math.round(LH * dpr);
  ctx2d.setTransform(dpr, 0, 0, dpr, 0, 0);
  layoutBoard();
}
window.addEventListener('resize', resizeCanvas);

/* Per-slot flash animations (when a ball lands) */
const slotFlash = [];   // parallel to slotXs; each holds a 0..1 fade

/* Balls in flight + floating win labels */
const balls = [];
const floaters = [];    // { x, y, vy, text, fontSize, color, life, maxLife, isLoss }
const GRAVITY = 1900;
const RESTITUTION = 0.22;   // was 0.28 — even less bounce-back so vy recovers faster
const AIR_DRAG = 0.0001;
const MIN_LATERAL = 75;     // post-bounce |vx| floor — ensures the ball clears
                            // the peg radius before gravity pulls it back, so
                            // no more twitchy pinballing on the same peg
const MAX_BALLS = 50;
const LAND_FADE_MS = 380; // how long a settled ball stays on screen before removal

/* Pure physics now: no preroll, no per-peg override, no safety steering.
   The angled outer walls + invisible slot dividers contain everything;
   wherever the ball physically lands IS the outcome. Distribution is
   roughly binomial (symmetric peg layout, ~50/50 deflection per peg,
   tangential jitter prevents resonance). */
function spawnBall(bet) {
  if (balls.length >= MAX_BALLS) return false;
  const N = state.rows;
  balls.push({
    // Slight spawn spread + a bit of initial vx so consecutive balls in
    // an auto run don't all trace the same column. Still tight enough
    // that distribution is determined by bounces, not by where it dropped.
    x: LW / 2 + (Math.random() - 0.5) * pegSpaceX * 0.22,
    y: topPegY - pegSpaceY * 0.9,
    vx: (Math.random() - 0.5) * 20,
    vy: 0,
    r: ballRadius,
    bet: bet,
    // Snapshot risk + rows at spawn so a mid-flight UI change can't
    // retroactively re-price the outcome. (Bet input is also locked
    // while balls are in flight; this is defense-in-depth.)
    risk: state.risk,
    rows: N,
    landed: false,
    landedAt: 0,
  });
  return true;
}

function settleBall(b) {
  // Outcome = whichever slot the ball physically landed in. The dividers
  // have constrained it to a single column, so nearest-x is exact.
  let idx = 0, bestD = Infinity;
  for (let i = 0; i < slotXs.length; i++) {
    const d = Math.abs(b.x - slotXs[i]);
    if (d < bestD) { bestD = d; idx = i; }
  }
  slotFlash[idx] = 1;
  // Tiny visual snap to the slot center so the fade animation reads as
  // "it landed here" rather than "it landed a few px off-center". The
  // ball is already inside the slot column thanks to the dividers, so
  // this is a sub-pixel adjustment, not a teleport.
  b.x = slotXs[idx];
  b.vx = 0;
  b.landed = true;
  b.landedAt = performance.now();
  slotThud();
  resolveDrop(idx, b.bet, b.risk, b.rows);
}

/* Resolve win for a ball that landed in slot `idx` */
const recentEl = document.getElementById('recent-strip');

function tierFor(mult) {
  if (mult >= 10)  return 1;     // hot pink → orange
  if (mult >= 2)   return 2;     // orange/amber
  if (mult >= 1)   return 3;     // gold (break-even / small win)
  if (mult >= 0.5) return 4;     // neutral
  return 5;                      // sub-half loss
}

/* Floater shows the RETURN (bet × mult) — never a negative number. The
   bet was already taken at drop time, so the multiplier is always a
   non-negative payout, even if it's less than the bet. Color tier
   indicates whether the return is net-positive (gold/green) or net-
   negative (pink). */
function spawnFloater(slotIdx, mult, bet) {
  const winAmt = bet * mult;

  let fontSize;
  if (mult >= 50)       fontSize = 36;
  else if (mult >= 10)  fontSize = 28;
  else if (mult >= 2)   fontSize = 22;
  else if (mult >= 1)   fontSize = 17;
  else                  fontSize = 14;

  let color;
  if (mult >= 10)       color = '#fff7d1';   // big win: bright gold
  else if (mult >= 2)   color = '#5cffa1';   // green: net-positive
  else if (mult >= 1)   color = '#ffe27a';   // soft gold: tiny win / break-even
  else                  color = '#ff8aa2';   // pink: net-negative (partial return)

  // Lifetime: epic wins linger longer
  const maxLife = mult >= 50 ? 2200 : (mult >= 10 ? 1700 : 1100);

  floaters.push({
    x: slotXs[slotIdx],
    y: slotTopY + 24,
    vy: -55 - Math.min(40, mult),
    text: '+$' + fmt(winAmt),
    fontSize: fontSize,
    color: color,
    life: 0,
    maxLife: maxLife,
    big: mult >= 10,
  });
}

function resolveDrop(slotIdx, bet, risk, rows) {
  // Use the risk/rows snapshotted at spawn — NOT the live state.
  const mults = MULTIPLIERS[rows || state.rows][risk || state.risk];
  const mult = mults[slotIdx];
  const winAmt = bet * mult;
  const net = winAmt - bet;

  balance += winAmt;     // bet was already debited at drop time
  persistBalance(balance);
  refreshBalance();

  // Audio cue based on tier
  if (mult >= 10)       { playSfx('fanfare', 0.55); playSfx('chipPayout', 0.55); }
  else if (mult >= 2)   { playSfx('winChime', 0.55); playSfx('chipPayout', 0.4); }
  else if (mult >= 1)   { playSfx('chipPayout', 0.4); }
  else                  { softLoss(); }

  // Floater (+$X / -$X) rises out of the slot
  spawnFloater(slotIdx, mult, bet);

  // Recent strip
  const pill = document.createElement('div');
  pill.className = 'recent-pill tier-' + tierFor(mult);
  pill.textContent = mult.toFixed(mult >= 10 ? 0 : (mult >= 1 ? 1 : 2)) + '×';
  recentEl.insertBefore(pill, recentEl.firstChild);
  while (recentEl.children.length > 9) recentEl.removeChild(recentEl.lastChild);

  // History
  if (window.History) {
    const note = mult >= 100 ? 'GRAND' : (mult >= 10 ? 'BIG ' + mult + 'X' : (mult >= 1 ? mult + 'X' : null));
    History.record('plinko', bet, net, note);
  }
}

/* Ball collision against a line segment. Used for the angled outer walls
   (restitution ~ 0.35) and the invisible slot-divider walls dropped from
   each bottom-row peg into the chip area (restitution ~ 0.15 so the ball
   doesn't ricochet back up). */
function collideLine(b, ax, ay, bx, by, restitution) {
  const dx = bx - ax, dy = by - ay;
  const len2 = dx * dx + dy * dy;
  if (len2 < 1e-6) return;
  let t = ((b.x - ax) * dx + (b.y - ay) * dy) / len2;
  if (t < 0) t = 0; else if (t > 1) t = 1;
  const cx = ax + t * dx;
  const cy = ay + t * dy;
  const ex = b.x - cx, ey = b.y - cy;
  const d2 = ex * ex + ey * ey;
  if (d2 < b.r * b.r) {
    const d = Math.sqrt(d2) || 0.0001;
    const nx = ex / d, ny = ey / d;
    const overlap = b.r - d;
    b.x += nx * overlap;
    b.y += ny * overlap;
    const vn = b.vx * nx + b.vy * ny;
    if (vn < 0) {
      const e = (typeof restitution === 'number') ? restitution : 0.35;
      b.vx -= (1 + e) * vn * nx;
      b.vy -= (1 + e) * vn * ny;
    }
  }
}

/* ---------- physics step ---------- */
function step(dt) {
  const now = performance.now();

  // Remove faded-out landed balls + expired floaters before stepping physics
  for (let i = balls.length - 1; i >= 0; i--) {
    if (balls[i].landed && now - balls[i].landedAt > LAND_FADE_MS) {
      balls.splice(i, 1);
    }
  }
  for (let i = floaters.length - 1; i >= 0; i--) {
    floaters[i].life += dt * 1000;
    if (floaters[i].life > floaters[i].maxLife) floaters.splice(i, 1);
  }

  // Substeps keep collisions tight at high velocity.
  const STEPS = 4;
  const h = dt / STEPS;

  for (let s = 0; s < STEPS; s++) {
    for (let i = balls.length - 1; i >= 0; i--) {
      const b = balls[i];
      if (b.landed) continue;

      b.vy += GRAVITY * h;
      b.vx *= (1 - AIR_DRAG);
      b.vy *= (1 - AIR_DRAG * 0.5);
      b.x  += b.vx * h;
      b.y  += b.vy * h;

      // Angled wall collisions (left + right funnels)
      collideLine(b, leftWall.ax,  leftWall.ay,  leftWall.bx,  leftWall.by);
      collideLine(b, rightWall.ax, rightWall.ay, rightWall.bx, rightWall.by);
      // Invisible slot-divider walls (one per bottom-row peg). Low
      // restitution so balls slide down into the cup instead of pinging
      // back up. y-band gate is cheap — most balls aren't in the slot
      // band, so we skip the loop entirely.
      if (b.y > bottomPegY - b.r && b.y < slotTopY + 12) {
        for (let di = 0; di < slotDividers.length; di++) {
          const d = slotDividers[di];
          collideLine(b, d.ax, d.ay, d.bx, d.by, 0.15);
        }
      }
      // Hard outer-canvas safety clamps (catch any escape from numerical drift)
      if (b.x < b.r + 2)        { b.x = b.r + 2;       b.vx = Math.abs(b.vx) * 0.3; }
      else if (b.x > LW - b.r - 2) { b.x = LW - b.r - 2; b.vx = -Math.abs(b.vx) * 0.3; }

      // Peg collisions — only check pegs within a vertical band near the ball.
      const yMin = b.y - pegSpaceY * 1.2;
      const yMax = b.y + pegSpaceY * 1.2;
      for (let pi = 0; pi < pegs.length; pi++) {
        const p = pegs[pi];
        if (p.y < yMin || p.y > yMax) continue;
        const dx = b.x - p.x;
        const dy = b.y - p.y;
        const r = b.r + p.r;
        const d2 = dx * dx + dy * dy;
        if (d2 < r * r) {
          const d = Math.sqrt(d2) || 0.0001;
          const nx = dx / d;
          const ny = dy / d;
          // Separate to avoid sticky overlap
          const overlap = r - d;
          b.x += nx * overlap;
          b.y += ny * overlap;
          // Reflect, damp horizontal sweep, add a fresh tangential kick,
          // then ENFORCE a minimum |vx|. The floor is what actually
          // unsticks balls — natural physics + jitter sometimes left vx
          // below ~30 px/s, not enough to clear the peg radius before
          // gravity pulled the ball back into a re-hit. With MIN_LATERAL
          // enforced, the ball always carries at least 75 px/s sideways
          // out of every bounce and escapes in one cycle.
          const vn = b.vx * nx + b.vy * ny;
          if (vn < 0) {
            b.vx -= (1 + RESTITUTION) * vn * nx;
            b.vy -= (1 + RESTITUTION) * vn * ny;
            b.vx *= 0.72;
            const tx = -ny, ty = nx;
            const j = (Math.random() - 0.5) * 80;
            b.vx += tx * j;
            b.vy += ty * j;
            if (Math.abs(b.vx) < MIN_LATERAL) {
              const dir = b.vx !== 0 ? Math.sign(b.vx) : (Math.random() < 0.5 ? -1 : 1);
              b.vx = dir * MIN_LATERAL;
            }
            pegTick(Math.hypot(b.vx, b.vy));
          }
        }
      }

      // Crossed into the slot band → settle in whichever cup it landed in
      if (!b.landed && b.y > slotTopY + b.r * 0.5) {
        settleBall(b);
      }
    }

    // Ball-ball collisions — prevents the visual stack when auto-drop
    // pushes new balls into the air faster than old ones can fall.
    // Each ball's circle pushes the others apart and exchanges normal
    // velocity components (elastic-ish). O(n^2) over in-flight balls,
    // fine for our MAX_BALLS=50.
    for (let i = 0; i < balls.length; i++) {
      const a = balls[i];
      if (a.landed) continue;
      for (let j = i + 1; j < balls.length; j++) {
        const c = balls[j];
        if (c.landed) continue;
        const dxb = c.x - a.x;
        const dyb = c.y - a.y;
        const rsum = a.r + c.r;
        const d2 = dxb * dxb + dyb * dyb;
        if (d2 < rsum * rsum && d2 > 0.001) {
          const d = Math.sqrt(d2);
          const nx = dxb / d, ny = dyb / d;
          const overlap = rsum - d;
          // Separate equally
          a.x -= nx * overlap * 0.5;
          a.y -= ny * overlap * 0.5;
          c.x += nx * overlap * 0.5;
          c.y += ny * overlap * 0.5;
          // Velocity exchange along the collision normal (e ~= 0.3 — soft)
          const vRel = (c.vx - a.vx) * nx + (c.vy - a.vy) * ny;
          if (vRel < 0) {
            const e = 0.3;
            const impulse = (1 + e) * vRel * 0.5;
            a.vx += impulse * nx;
            a.vy += impulse * ny;
            c.vx -= impulse * nx;
            c.vy -= impulse * ny;
          }
        }
      }
    }
  }

  // Fade slot flashes
  for (let i = 0; i < slotFlash.length; i++) {
    if (slotFlash[i] > 0) slotFlash[i] = Math.max(0, slotFlash[i] - dt * 1.4);
  }
}

/* ---------- render ---------- */
function slotHue(idx, total) {
  // Distance from center (0 at middle slot, 1 at edges)
  const half = (total - 1) / 2;
  const t = Math.abs(idx - half) / half;
  // Cool blue/green at center → hot pink/red at edges
  // Hue: 175 (cyan-green) at t=0  →  348 (hot pink) at t=1
  const start = 175, end = 348;
  return start + (end - start) * Math.pow(t, 0.85);
}

function renderBoard() {
  ctx2d.clearRect(0, 0, LW, LH);

  // Faint funnel fill behind everything (between the angled walls)
  ctx2d.save();
  const grd = ctx2d.createLinearGradient(0, 0, 0, LH);
  grd.addColorStop(0, 'rgba(168,85,247,0.08)');
  grd.addColorStop(1, 'rgba(34,211,238,0.05)');
  ctx2d.fillStyle = grd;
  ctx2d.beginPath();
  ctx2d.moveTo(leftWall.ax,  leftWall.ay);
  ctx2d.lineTo(rightWall.ax, rightWall.ay);
  ctx2d.lineTo(rightWall.bx, rightWall.by);
  ctx2d.lineTo(leftWall.bx,  leftWall.by);
  ctx2d.closePath();
  ctx2d.fill();
  ctx2d.restore();

  // Subtle wall outlines so the funnel reads visually
  ctx2d.save();
  ctx2d.strokeStyle = 'rgba(255,210,74,0.18)';
  ctx2d.lineWidth = 1.2;
  ctx2d.beginPath();
  ctx2d.moveTo(leftWall.ax,  leftWall.ay);
  ctx2d.lineTo(leftWall.bx,  leftWall.by);
  ctx2d.moveTo(rightWall.ax, rightWall.ay);
  ctx2d.lineTo(rightWall.bx, rightWall.by);
  ctx2d.stroke();
  ctx2d.restore();

  // Pegs
  for (let i = 0; i < pegs.length; i++) {
    const p = pegs[i];
    // Outer glow halo
    const g = ctx2d.createRadialGradient(p.x, p.y, p.r * 0.2, p.x, p.y, p.r * 2.4);
    g.addColorStop(0, 'rgba(255,240,168,0.45)');
    g.addColorStop(0.4, 'rgba(168,85,247,0.18)');
    g.addColorStop(1, 'rgba(168,85,247,0)');
    ctx2d.fillStyle = g;
    ctx2d.beginPath();
    ctx2d.arc(p.x, p.y, p.r * 2.4, 0, Math.PI * 2);
    ctx2d.fill();

    // Solid peg with 3D shading
    const pg = ctx2d.createRadialGradient(p.x - p.r * 0.35, p.y - p.r * 0.4, p.r * 0.05, p.x, p.y, p.r);
    pg.addColorStop(0, '#fff7d1');
    pg.addColorStop(0.45, '#ffd24a');
    pg.addColorStop(1, '#7a5500');
    ctx2d.fillStyle = pg;
    ctx2d.beginPath();
    ctx2d.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx2d.fill();

    // Tiny highlight pip
    ctx2d.fillStyle = 'rgba(255,255,255,0.55)';
    ctx2d.beginPath();
    ctx2d.arc(p.x - p.r * 0.32, p.y - p.r * 0.38, p.r * 0.22, 0, Math.PI * 2);
    ctx2d.fill();
  }

  // Slot dividers (subtle vertical ticks between slots)
  const total = slotXs.length;
  ctx2d.strokeStyle = 'rgba(255,255,255,0.10)';
  ctx2d.lineWidth = 1;
  for (let i = 0; i < total - 1; i++) {
    const x = (slotXs[i] + slotXs[i+1]) / 2;
    ctx2d.beginPath();
    ctx2d.moveTo(x, slotTopY + 4);
    ctx2d.lineTo(x, slotTopY + 14);
    ctx2d.stroke();
  }

  // Slot multiplier chips along the bottom.
  // Bigger chips + Bungee (way more condensed than Geist Mono) + dropped
  // the `×` suffix so the 17 multipliers fit cleanly even at 16 rows on
  // mobile. The `×` is implied by the chip context.
  const mults = MULTIPLIERS[state.rows][state.risk];
  const chipH = Math.min(46, slotWidth * 1.30);
  const chipY = slotTopY + 22;
  for (let i = 0; i < total; i++) {
    const cx = slotXs[i];
    const cy = chipY;
    const w  = Math.min(slotWidth - 2, 64);
    const h  = chipH;
    const hue = slotHue(i, total);
    const flash = slotFlash[i] || 0;
    const sat = 80 + flash * 20;
    const lit = 50 + flash * 24;

    // Chip body
    ctx2d.save();
    const cgrad = ctx2d.createLinearGradient(cx, cy - h/2, cx, cy + h/2);
    cgrad.addColorStop(0, `hsl(${hue} ${sat}% ${lit + 18}%)`);
    cgrad.addColorStop(0.5, `hsl(${hue} ${sat}% ${lit}%)`);
    cgrad.addColorStop(1, `hsl(${hue} ${sat - 12}% ${Math.max(15, lit - 30)}%)`);
    ctx2d.fillStyle = cgrad;
    roundRect(ctx2d, cx - w/2, cy - h/2, w, h, Math.min(8, w * 0.2));
    ctx2d.fill();

    // Inner highlight rim
    ctx2d.strokeStyle = `hsla(${hue} 100% 88% / ${0.4 + flash * 0.5})`;
    ctx2d.lineWidth = 1.5;
    roundRect(ctx2d, cx - w/2 + 0.75, cy - h/2 + 0.75, w - 1.5, h - 1.5, Math.min(7, w * 0.19));
    ctx2d.stroke();

    // Flash glow on landing — strong, slow fade
    if (flash > 0.02) {
      ctx2d.shadowColor = `hsla(${hue} 100% 72% / ${Math.min(1, flash * 1.2)})`;
      ctx2d.shadowBlur = 36 * flash;
      ctx2d.strokeStyle = `hsla(${hue} 100% 82% / ${Math.min(1, flash * 1.1)})`;
      ctx2d.lineWidth = 2 + flash * 1.5;
      roundRect(ctx2d, cx - w/2, cy - h/2, w, h, Math.min(8, w * 0.2));
      ctx2d.stroke();
    }
    ctx2d.restore();

    // Multiplier text — compact: Bungee, abbreviate >=1000 to "1K", drop
    // leading "0." and trailing ".0", then auto-shrink to fit chip width.
    const m = mults[i];
    let txt;
    if (m >= 1000)    txt = Math.round(m / 1000) + 'K';
    else if (m >= 100)txt = '' + Math.round(m);
    else if (m >= 10) txt = m.toFixed(0);
    else if (m >= 1)  txt = (m % 1 === 0) ? m.toFixed(0) : m.toFixed(1);
    else              txt = ('' + m.toFixed(1)).replace(/^0/, '');   // 0.5 → .5
    let fontPx = Math.min(15, Math.max(9, w * 0.36));
    ctx2d.font = `${fontPx}px 'Bungee', cursive`;
    // Measure and shrink if needed so 3-char numbers always fit at N=16 on mobile
    const maxTextW = w - 4;
    const measured = ctx2d.measureText(txt).width;
    if (measured > maxTextW) {
      fontPx = Math.max(7, fontPx * (maxTextW / measured));
      ctx2d.font = `${fontPx}px 'Bungee', cursive`;
    }
    ctx2d.fillStyle = m >= 1 ? '#1a0608' : 'rgba(255,255,255,0.95)';
    ctx2d.textAlign = 'center';
    ctx2d.textBaseline = 'middle';
    ctx2d.fillText(txt, cx, cy + 0.5);
  }

  // Balls — fade + scale-down when landed so the bin doesn't stack.
  const nowMs = performance.now();
  for (const b of balls) {
    let alpha = 1, scale = 1;
    if (b.landed) {
      const t = Math.min(1, (nowMs - b.landedAt) / LAND_FADE_MS);
      alpha = 1 - t;
      scale = 1 - t * 0.45;
    }
    if (alpha <= 0.02) continue;

    ctx2d.save();
    ctx2d.globalAlpha = alpha;
    const rEff = b.r * scale;
    ctx2d.shadowColor = 'rgba(0,0,0,0.55)';
    ctx2d.shadowBlur = rEff * 0.9;
    ctx2d.shadowOffsetX = 0;
    ctx2d.shadowOffsetY = rEff * 0.5;
    const bg = ctx2d.createRadialGradient(
      b.x - rEff * 0.4, b.y - rEff * 0.5, rEff * 0.1,
      b.x, b.y, rEff * 1.1
    );
    bg.addColorStop(0, '#fff7d1');
    bg.addColorStop(0.35, '#ffd24a');
    bg.addColorStop(0.85, '#b8860b');
    bg.addColorStop(1, '#3a2200');
    ctx2d.fillStyle = bg;
    ctx2d.beginPath();
    ctx2d.arc(b.x, b.y, rEff, 0, Math.PI * 2);
    ctx2d.fill();
    ctx2d.shadowBlur = 0;
    // Sharp specular highlight
    ctx2d.fillStyle = 'rgba(255,255,255,0.85)';
    ctx2d.beginPath();
    ctx2d.arc(b.x - rEff * 0.38, b.y - rEff * 0.45, rEff * 0.22, 0, Math.PI * 2);
    ctx2d.fill();
    ctx2d.restore();
  }

  // Rising "+$X" / "-$X" floaters — size scaled with win tier.
  for (const f of floaters) {
    const t = f.life / f.maxLife;
    // Quick fade-in (first 12%), long fade-out
    const inA  = Math.min(1, f.life / 80);
    const outA = Math.max(0, 1 - Math.max(0, (t - 0.55) / 0.45));
    const a    = Math.min(inA, outA);
    if (a <= 0.01) continue;
    const yOff = f.life * 0.085;       // ~85 px/s ascent
    // Pop scale at start so it punches in
    const pop = t < 0.10 ? 0.75 + (t / 0.10) * 0.35 : 1.0 + Math.sin(t * 3) * 0.02;
    ctx2d.save();
    ctx2d.globalAlpha = a;
    ctx2d.font = `${f.fontSize * pop}px 'Bungee', cursive`;
    ctx2d.textAlign = 'center';
    ctx2d.textBaseline = 'middle';
    // Clamp x so an edge-slot floater (especially a wide "+$1000.00")
    // doesn't get cut off by the canvas edge.
    const halfW = ctx2d.measureText(f.text).width / 2;
    const drawX = Math.max(halfW + 6, Math.min(LW - halfW - 6, f.x));
    if (f.big) {
      ctx2d.shadowColor = f.color;
      ctx2d.shadowBlur = 22;
    } else {
      ctx2d.shadowColor = 'rgba(0,0,0,0.65)';
      ctx2d.shadowBlur = 6;
    }
    ctx2d.fillStyle = f.color;
    ctx2d.fillText(f.text, drawX, f.y - yOff);
    ctx2d.restore();
  }
}

function roundRect(c, x, y, w, h, r) {
  c.beginPath();
  c.moveTo(x + r, y);
  c.lineTo(x + w - r, y);
  c.quadraticCurveTo(x + w, y, x + w, y + r);
  c.lineTo(x + w, y + h - r);
  c.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  c.lineTo(x + r, y + h);
  c.quadraticCurveTo(x, y + h, x, y + h - r);
  c.lineTo(x, y + r);
  c.quadraticCurveTo(x, y, x + r, y);
  c.closePath();
}

/* ---------- main loop ---------- */
let lastT = performance.now();
let lastLockState = null;
function ballsInFlight() {
  for (const b of balls) if (!b.landed) return true;
  return false;
}
function updateControlLocks() {
  const locked = ballsInFlight();
  if (locked === lastLockState) return;   // cheap: only touch DOM on edges
  lastLockState = locked;
  betInput.disabled = locked;
  document.querySelectorAll('.bet-mod').forEach(b => b.disabled = locked);
  document.querySelectorAll('#risk-seg button, #rows-seg button, #auto-seg button')
    .forEach(b => b.disabled = locked);
}
function frame(now) {
  let dt = (now - lastT) / 1000;
  lastT = now;
  if (dt > 0.05) dt = 0.05;   // clamp big tab-switch deltas
  step(dt);
  renderBoard();
  updateControlLocks();
  // Auto-drop scheduler
  if (state.pendingAuto > 0 && balance >= getBet() && now - state.lastDropTime > 240) {
    triggerDrop(/*fromAuto*/ true);
  }
  requestAnimationFrame(frame);
}

/* ---------- bet controls ---------- */
const betInput = document.getElementById('bet');

function getBet() {
  let v = parseFloat(betInput.value);
  if (isNaN(v) || v < 0.1) v = 0.1;
  // Round to cents
  return Math.round(v * 100) / 100;
}
function setBet(v) {
  v = Math.max(0.1, Math.round(v * 100) / 100);
  betInput.value = v.toFixed(2);
}
setBet(getBet());

document.querySelectorAll('.bet-mod').forEach(btn => {
  btn.addEventListener('click', () => {
    playSfx('buttonSoft', 0.6);
    if (btn.dataset.amt === 'max') {
      // MAX = "this one drop, all-in". Force auto OFF so the player can't
      // multi-bet at MAX (otherwise a winning ball would re-fire MAX bets
      // off the new larger balance, spiraling fast). Player has to MAX
      // again or set a smaller amount to continue dropping.
      const cap = Math.floor(Math.max(0, balance) * 100) / 100;
      setBet(Math.max(0.1, cap));
      if (state.autoMax !== 0 || state.pendingAuto > 0) {
        state.autoMax = 0;
        state.pendingAuto = 0;
        document.querySelectorAll('#auto-seg button').forEach(b => {
          b.classList.toggle('active', b.dataset.v === '0');
        });
        updateDropBtn();
      }
    } else if (btn.dataset.mul) {
      setBet(getBet() * parseFloat(btn.dataset.mul));
    }
  });
});

/* Segmented controls — risk / rows / auto */
function wireSeg(id, key, parse) {
  const root = document.getElementById(id);
  root.querySelectorAll('button').forEach(btn => {
    btn.addEventListener('click', () => {
      if (btn.classList.contains('active')) return;
      root.querySelectorAll('button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const v = parse(btn.dataset.v);
      onSegChange(key, v);
      playSfx('buttonSoft', 0.6);
    });
  });
}
function onSegChange(key, v) {
  if (key === 'risk') {
    state.risk = v;
  } else if (key === 'rows') {
    state.rows = v;
    // Clear in-flight balls when geometry changes — but refund their bets first
    // (the pegs they were navigating no longer exist).
    if (balls.length > 0) {
      let refund = 0;
      for (const b of balls) refund += b.bet;
      balance += refund;
      persistBalance(balance);
      refreshBalance();
    }
    balls.length = 0;
    slotFlash.length = 0;
    layoutBoard();
  } else if (key === 'auto') {
    state.autoMax = v;
    if (state.pendingAuto > 0) {
      // User picked a different bucket mid-run → just queue the new size
      state.pendingAuto = v;
    }
    updateDropBtn();
  }
}
wireSeg('risk-seg', 'risk', s => s);
wireSeg('rows-seg', 'rows', s => parseInt(s, 10));
wireSeg('auto-seg', 'auto', s => parseInt(s, 10));

/* DROP button: behavior depends on auto state */
const dropBtn = document.getElementById('drop');
function updateDropBtn() {
  dropBtn.classList.remove('auto-mode', 'auto-stop');
  if (state.pendingAuto > 0) {
    dropBtn.classList.add('auto-stop');
    dropBtn.textContent = `STOP AUTO (${state.pendingAuto})`;
  } else if (state.autoMax > 0) {
    dropBtn.classList.add('auto-mode');
    dropBtn.textContent = `AUTO DROP × ${state.autoMax}`;
  } else {
    dropBtn.textContent = 'DROP BALL';
  }
}
updateDropBtn();

function triggerDrop(fromAuto) {
  const bet = getBet();
  // Block when out of chips OR when the on-board ball cap is full.
  // (Cap is high enough that this only fires under aggressive ×100 auto.)
  if (balance < bet || balls.length >= MAX_BALLS) {
    if (balance < bet && state.pendingAuto > 0) {
      state.pendingAuto = 0;
      updateDropBtn();
      softLoss();
      flashBetInput();
    } else if (balance < bet) {
      softLoss();
      flashBetInput();
    }
    // Cap-hit case: silently throttle — the scheduler will retry next frame.
    return;
  }
  balance -= bet;
  persistBalance(balance);
  refreshBalance();
  spawnBall(bet);
  playSfx('chipPlace', 0.7);
  state.lastDropTime = performance.now();
  if (fromAuto) {
    state.pendingAuto--;
    updateDropBtn();
  }
}

function flashBetInput() {
  betInput.style.transition = 'box-shadow 0.12s';
  betInput.style.boxShadow = 'inset 0 0 0 1.5px #ff2e58, 0 0 14px rgba(255,46,88,0.5)';
  setTimeout(() => { betInput.style.boxShadow = ''; }, 240);
}

dropBtn.addEventListener('click', () => {
  if (state.pendingAuto > 0) {
    // STOP AUTO
    state.pendingAuto = 0;
    updateDropBtn();
    playSfx('buttonSoft', 0.7);
    return;
  }
  if (state.autoMax > 0) {
    state.pendingAuto = state.autoMax;
    updateDropBtn();
    triggerDrop(true);  // kick off immediately
  } else {
    triggerDrop(false);
  }
});

/* Spacebar to drop */
document.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'INPUT') return;
  if (e.code === 'Space') {
    e.preventDefault();
    dropBtn.click();
  }
});

/* ---------- boot ---------- */
function boot() {
  resizeCanvas();
  // Two resize ticks to handle late font/layout settling
  setTimeout(resizeCanvas, 80);
  setTimeout(resizeCanvas, 300);
  requestAnimationFrame(frame);
}
boot();
</script>
</body>
</html>
