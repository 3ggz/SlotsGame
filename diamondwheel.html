<!DOCTYPE html>
<html lang="en">
<head>

<style>
:root {
  --bg-0: #0a0418;
  --bg-1: #150828;
  --gold-0: #fff0a8;
  --gold-1: #ffd24a;
  --gold-2: #b8860b;
  --gold-deep: #5c3d00;
  --neon-pink: #ff2e93;
  --neon-cyan: #22d3ee;
  --neon-violet: #a855f7;
  --neon-green: #5cffa1;
  --danger: #ff4d6d;
  --shadow-deep: 0 30px 60px -10px rgba(0,0,0,0.7), 0 18px 36px -18px rgba(0,0,0,0.5);
}

* { box-sizing: border-box; margin: 0; padding: 0; touch-action: manipulation; }

html, body {
  width: 100%;
  min-height: 100vh;
  overflow-x: hidden;
  font-family: 'Outfit', sans-serif;
  color: #fff;
  background:
    radial-gradient(ellipse at 18% 0%, rgba(168,85,247,0.20) 0%, transparent 50%),
    radial-gradient(ellipse at 82% 18%, rgba(34,211,238,0.16) 0%, transparent 46%),
    radial-gradient(ellipse at 50% 100%, rgba(255,46,147,0.13) 0%, transparent 58%),
    linear-gradient(180deg, var(--bg-0), var(--bg-1) 58%, var(--bg-0));
  background-attachment: fixed;
  user-select: none;
  -webkit-user-select: none;
}
body::before {
  content: '';
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 1;
  opacity: 0.05;
  mix-blend-mode: overlay;
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/></svg>");
}

button, input { font: inherit; }

/* ---------- TOP CHROME (canonical) ---------- */
.lobby-link, .history-btn {
  position: fixed;
  top: 12px;
  z-index: 30;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  height: 36px;
  padding: 0 14px;
  border: 0;
  border-radius: 12px;
  text-decoration: none;
  font-family: 'Bungee', cursive;
  font-size: 11px;
  letter-spacing: 0.2em;
  line-height: 1;
  cursor: pointer;
  background: linear-gradient(180deg, rgba(42,18,77,0.85), rgba(15,4,30,0.85));
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  transition: transform 0.1s, filter 0.15s;
}
.lobby-link {
  left: 12px;
  color: var(--gold-1);
  box-shadow: inset 0 0 0 1.5px rgba(255,210,74,0.35), 0 3px 0 rgba(0,0,0,0.5);
}
.history-btn {
  left: 122px;
  color: var(--neon-cyan);
  box-shadow: inset 0 0 0 1.5px rgba(34,211,238,0.4), 0 3px 0 rgba(0,0,0,0.5);
}
.lobby-link::before { content: '<'; font-size: 14px; line-height: 1; }
.history-btn::before { content: '#'; font-size: 13px; line-height: 1; }
.lobby-link:hover, .history-btn:hover { filter: brightness(1.15); }
.lobby-link:active, .history-btn:active { transform: translateY(2px); }

.balance-link {
  position: fixed;
  top: 12px;
  right: 64px;
  z-index: 30;
  display: inline-flex;
  align-items: center;
  gap: 10px;
  padding: 9px 14px 8px;
  border-radius: 12px;
  background: linear-gradient(180deg, rgba(42,18,77,0.85), rgba(15,4,30,0.85));
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  box-shadow: inset 0 0 0 1.5px rgba(255,210,74,0.35), 0 3px 0 rgba(0,0,0,0.5);
  color: #fff;
}
.balance-link .label {
  font-family: 'Bungee', cursive;
  font-size: 9px;
  letter-spacing: 0.24em;
  color: rgba(255,210,74,0.78);
}
.balance-link .value {
  font-family: 'Geist Mono', monospace;
  font-weight: 800;
  font-size: 16px;
  letter-spacing: 0.01em;
}
.balance-link .value.bump { animation: balBump 0.4s ease; }
@keyframes balBump { 35% { transform: scale(1.08); color: var(--gold-1); } }

/* ---------- STAGE ---------- */
.stage {
  position: relative;
  z-index: 2;
  width: min(1080px, 100%);
  min-height: 100vh;
  margin: 0 auto;
  padding: 64px 16px 40px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
}

.game-header { text-align: center; }
.pre {
  font-family: 'Bungee', cursive;
  font-size: 10px;
  letter-spacing: 0.55em;
  color: rgba(34,211,238,0.78);
  text-shadow: 0 0 10px rgba(34,211,238,0.45);
  margin-bottom: 6px;
}
.title {
  font-family: 'Bungee Shade', 'Bungee', cursive;
  font-size: clamp(34px, 6.5vw, 62px);
  line-height: 1;
  letter-spacing: 0.04em;
  background: linear-gradient(180deg, #fff7d1 0%, var(--gold-1) 45%, #b8860b 100%);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  filter: drop-shadow(0 4px 0 rgba(0,0,0,0.55)) drop-shadow(0 0 18px rgba(255,210,74,0.32));
}
.subtitle {
  font-family: 'Bungee', cursive;
  font-size: 10px;
  letter-spacing: 0.34em;
  color: rgba(255,255,255,0.48);
  margin-top: 6px;
}

/* ---------- WHEELHOUSE (3D canvas) ---------- */
.wheelhouse {
  position: relative;
  width: min(620px, 94vw, 58vh);
  aspect-ratio: 1 / 1;
  border-radius: 26px;
  background:
    radial-gradient(ellipse at 50% 30%, rgba(168,85,247,0.18), transparent 65%),
    linear-gradient(180deg, #221040, #0c0520);
  box-shadow:
    var(--shadow-deep),
    inset 0 0 0 1.5px rgba(255,210,74,0.28),
    inset 0 0 60px rgba(0,0,0,0.55);
  overflow: hidden;
}
.wheelhouse canvas { display: block; width: 100%; height: 100%; }
.wheelhouse.flash-gold::after {
  content: '';
  position: absolute; inset: 0;
  pointer-events: none;
  background: radial-gradient(ellipse at center, rgba(255,210,74,0.34), transparent 70%);
  animation: whFlash 0.7s ease-out forwards;
}
.wheelhouse.flash-dim::after {
  content: '';
  position: absolute; inset: 0;
  pointer-events: none;
  background: rgba(0,0,0,0.45);
  animation: whFlash 0.45s ease-out forwards;
}
@keyframes whFlash { from { opacity: 1; } to { opacity: 0; } }

.message {
  min-height: 22px;
  font-family: 'Bungee', cursive;
  font-size: 12px;
  letter-spacing: 0.2em;
  color: rgba(255,255,255,0.78);
  text-align: center;
}
.message.win  { color: var(--neon-green); text-shadow: 0 0 12px rgba(92,255,161,0.5); }
.message.lose { color: var(--danger); }

/* ---------- BET BOARD ---------- */
.board {
  display: grid;
  grid-template-columns: repeat(7, minmax(86px, 122px));
  gap: 10px;
  justify-content: center;
  width: 100%;
}
.spot {
  position: relative;
  border: 0;
  cursor: pointer;
  border-radius: 14px;
  padding: 12px 6px 10px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  color: #fff;
  background: linear-gradient(180deg, rgba(20,8,42,0.92), rgba(8,3,20,0.92));
  box-shadow: inset 0 0 0 1.5px var(--spot-edge, rgba(255,210,74,0.25)), 0 4px 0 rgba(0,0,0,0.4);
  transition: transform 0.09s, filter 0.15s, box-shadow 0.2s;
}
.spot:hover { filter: brightness(1.15); }
.spot:active { transform: translateY(2px); }
.spot .s-sym {
  font-family: 'Bungee', cursive;
  font-size: 17px;
  letter-spacing: 0.04em;
  color: var(--spot-color, var(--gold-0));
  text-shadow: 0 0 10px var(--spot-glow, transparent);
}
.spot .s-pays {
  font-family: 'Bungee', cursive;
  font-size: 7.5px;
  letter-spacing: 0.18em;
  color: rgba(255,255,255,0.45);
}
.spot .s-stake {
  min-height: 20px;
  padding: 2px 9px;
  border-radius: 999px;
  font-family: 'Geist Mono', monospace;
  font-weight: 800;
  font-size: 12px;
  color: var(--gold-0);
  background: rgba(0,0,0,0.45);
  box-shadow: inset 0 0 0 1px rgba(255,210,74,0.35);
  opacity: 0;
  transform: scale(0.8);
  transition: opacity 0.15s, transform 0.15s;
}
.spot.staked .s-stake { opacity: 1; transform: scale(1); }
.spot.win {
  box-shadow: inset 0 0 0 2px var(--spot-color), 0 0 26px var(--spot-glow), 0 4px 0 rgba(0,0,0,0.4);
  animation: spotWin 0.55s ease;
}
@keyframes spotWin { 35% { transform: scale(1.06); } }
.spot.dud { filter: brightness(0.55) saturate(0.6); transition: filter 0.3s; }
.spot:disabled { cursor: default; }
.spot:disabled:hover { filter: none; }
.spot.dud:disabled:hover { filter: brightness(0.55) saturate(0.6); }

/* ---------- RAIL: chips + actions ---------- */
.rail {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  justify-content: center;
  gap: 14px;
  width: 100%;
}
.chip-rack { display: flex; gap: 9px; }
.chip {
  position: relative;
  width: 54px;
  height: 54px;
  border-radius: 50%;
  border: 0;
  cursor: pointer;
  font-family: 'Bungee', cursive;
  font-size: 11px;
  color: #fff;
  text-shadow: 0 1px 2px rgba(0,0,0,0.7);
  background:
    radial-gradient(circle at 50% 38%, rgba(255,255,255,0.25), transparent 55%),
    var(--chip-bg, #7a1024);
  box-shadow:
    inset 0 0 0 3px rgba(255,255,255,0.85),
    inset 0 0 0 5px rgba(0,0,0,0.3),
    0 4px 8px rgba(0,0,0,0.55);
  transition: transform 0.12s, box-shadow 0.2s;
}
.chip.c1    { --chip-bg: #e8e4da; color: #222; text-shadow: 0 1px 0 rgba(255,255,255,0.5); }
.chip.c5    { --chip-bg: #c01f2e; }
.chip.c25   { --chip-bg: #1d9e55; }
.chip.c100  { --chip-bg: #23242b; }
.chip.c500  { --chip-bg: #6d28b8; }
.chip.c1000 { --chip-bg: #b8860b; }
.chip.selected {
  transform: translateY(-7px);
  box-shadow:
    inset 0 0 0 3px var(--gold-1),
    inset 0 0 0 5px rgba(0,0,0,0.3),
    0 0 18px rgba(255,210,74,0.5),
    0 7px 12px rgba(0,0,0,0.55);
}
.chip:active { transform: translateY(-2px); }

.actions { display: flex; gap: 10px; }
.act {
  border: 0;
  cursor: pointer;
  height: 54px;
  padding: 0 26px;
  border-radius: 14px;
  font-family: 'Bungee', cursive;
  font-size: 13px;
  letter-spacing: 0.16em;
  transition: transform 0.09s, filter 0.15s, opacity 0.2s;
}
.act:hover { filter: brightness(1.12); }
.act:active { transform: translateY(2px); }
.act:disabled { opacity: 0.42; cursor: default; filter: grayscale(0.3); transform: none; }
.act.spin {
  min-width: 150px;
  color: #120704;
  background: linear-gradient(180deg, var(--gold-0), var(--gold-1) 62%, var(--gold-2));
  box-shadow: 0 5px 0 rgba(76,45,0,0.7), inset 0 1px 0 rgba(255,255,255,0.55);
}
.act.clear {
  color: #dff9ff;
  background: linear-gradient(180deg, #165069, #082335);
  box-shadow: 0 5px 0 rgba(0,0,0,0.54), inset 0 0 0 1.5px rgba(34,211,238,0.32);
}
.act.rebet {
  color: #f2e4ff;
  background: linear-gradient(180deg, #4d1d8a, #1d0a3a);
  box-shadow: 0 5px 0 rgba(0,0,0,0.54), inset 0 0 0 1.5px rgba(168,85,247,0.4);
}

/* ---------- RESULT TOAST ---------- */
.result-toast {
  position: fixed;
  left: 50%;
  top: 44%;
  z-index: 60;
  transform: translate(-50%, -50%) scale(0.7);
  padding: 18px 34px;
  border-radius: 18px;
  text-align: center;
  background: linear-gradient(180deg, rgba(34,13,66,0.96), rgba(10,3,25,0.96));
  box-shadow: inset 0 0 0 2px rgba(255,210,74,0.5), 0 24px 60px rgba(0,0,0,0.7), 0 0 40px rgba(255,210,74,0.2);
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.22s, transform 0.22s cubic-bezier(.18,.89,.32,1.28);
}
.result-toast.show { opacity: 1; transform: translate(-50%, -50%) scale(1); }
.result-toast .rt-sym {
  font-family: 'Bungee', cursive;
  font-size: 15px;
  letter-spacing: 0.3em;
  color: var(--gold-0);
  margin-bottom: 4px;
}
.result-toast .rt-amt {
  font-family: 'Geist Mono', monospace;
  font-weight: 800;
  font-size: 34px;
  color: var(--neon-green);
  text-shadow: 0 0 18px rgba(92,255,161,0.5);
}
.result-toast .rt-amt.lose { color: var(--danger); text-shadow: none; }

/* DOM confetti burst on big wins */
.dw-confetti {
  position: fixed;
  width: 9px; height: 9px;
  z-index: 59;
  pointer-events: none;
  border-radius: 2px;
  animation: dwConf 1s ease-out forwards;
}
@keyframes dwConf {
  to { transform: translate(var(--dx), var(--dy)) rotate(var(--rot)); opacity: 0; }
}

/* ---------- PAYTABLE NOTE ---------- */
.house-note {
  font-size: 11px;
  color: rgba(255,255,255,0.35);
  letter-spacing: 0.06em;
  text-align: center;
}

@media (max-width: 720px) {
  /* Extra top room so the fixed level bar + NET pill (top-right
     chrome) clear the centered title instead of sitting on it. */
  .stage { padding: 96px 8px 28px; gap: 10px; }
  .title { font-size: clamp(28px, 9vw, 42px); }
  .lobby-link, .history-btn { top: 8px; height: 30px; padding: 0 11px; font-size: 9px; }
  .lobby-link { left: 8px; }
  .history-btn { left: 98px; }
  .balance-link { top: 8px; right: 50px; padding: 8px 10px 7px; gap: 7px; }
  .balance-link .label { display: none; }
  .balance-link .value { font-size: 13px; }
  .board { grid-template-columns: repeat(4, 1fr); gap: 7px; }
  .spot { padding: 9px 4px 8px; border-radius: 11px; }
  .spot .s-sym { font-size: 14px; }
  .chip { width: 44px; height: 44px; font-size: 9.5px; }
  .act { height: 48px; padding: 0 18px; font-size: 11px; }
  .act.spin { min-width: 120px; }
  .result-toast .rt-amt { font-size: 26px; }
}

html.low-power body::before { display: none; }
html.low-power .lobby-link,
html.low-power .history-btn,
html.low-power .balance-link {
  background: linear-gradient(180deg, rgba(42,18,77,0.96), rgba(15,4,30,0.96));
  backdrop-filter: none;
  -webkit-backdrop-filter: none;
}
@media (prefers-reduced-motion: reduce) {
  .spot, .chip, .act, .result-toast { transition: none; }
}
</style>
</head>

<script type="module">
/* ============================================================
   DIAMOND WHEEL — 3D Big Six money wheel.
   Three.js is loaded at runtime from the CDN (cross-origin, so it
   is NOT precached by the service worker — same deal as the
   Firebase SDK in casino-account.js). If the import or WebGL
   fails, a Canvas2D fallback renders the same game.
   ============================================================ */

/* CORE TESTABLE API START */
(function () {
  'use strict';
  // Canonical 54-segment layout. Counts: x1=24, x2=15, x5=7, x10=4,
  // x20=2, JOKER=1, FLAG=1. Rare symbols spread; verified by test.
  const SEGMENTS = [
    'JOKER','x1','x2','x5','x1','x1','x10','x2','x1','x5','x2','x1','x1','x20',
    'x2','x1','x5','x2','x1','x1','x10','x2','x1','x2','x5','x1','x1','FLAG',
    'x2','x1','x5','x2','x1','x10','x1','x2','x1','x5','x2','x1','x20','x1',
    'x2','x1','x2','x1','x1','x10','x2','x1','x5','x2','x1','x1'
  ];
  const PAYS = { x1: 1, x2: 2, x5: 5, x10: 10, x20: 20, JOKER: 45, FLAG: 45 };
  const SYMBOLS = ['x1', 'x2', 'x5', 'x10', 'x20', 'JOKER', 'FLAG'];
  const SEG = (Math.PI * 2) / 54;

  // Outcome is a pure function of one RNG value in [0,1).
  function pickLanding(rngValue) {
    const v = Number(rngValue);
    if (!(v >= 0) || v >= 1) return 0;
    return Math.min(53, Math.floor(v * 54));
  }

  // Wheel rotation (clockwise, radians) that puts segment `index`
  // under the flapper at 12 o'clock. jitterFrac in [-0.5, 0.5) of a
  // segment offsets the landing within the wedge (clamped for the
  // settle rock); turns = extra full revolutions.
  function targetRotation(index, turns, jitterFrac) {
    const TWO = Math.PI * 2;
    const j = Math.max(-0.30, Math.min(0.30, Number(jitterFrac) || 0));
    const base = (TWO - (index * SEG)) % TWO;
    return (Math.max(0, turns | 0) * TWO) + base + (j * SEG);
  }

  // Inverse: which segment sits under the flapper at rotation rho.
  function segmentAtRotation(rho) {
    const TWO = Math.PI * 2;
    const local = ((-rho) % TWO + TWO) % TWO; // wheel-local angle now at top
    return Math.round(local / SEG) % 54;
  }

  // Settle every bet against the landed segment.
  // bets: { x1: stake, ... } (missing keys = 0). Stakes already
  // debited at placement; grossReturn is what gets credited back.
  function resolveSpin(landedIndex, bets) {
    const symbol = SEGMENTS[landedIndex] || 'x1';
    let totalStaked = 0;
    for (const s of SYMBOLS) totalStaked += Math.max(0, Number(bets && bets[s]) || 0);
    const winStake = Math.max(0, Number(bets && bets[symbol]) || 0);
    const grossReturn = winStake * (PAYS[symbol] + 1);
    return {
      landedIndex,
      symbol,
      totalStaked,
      grossReturn,
      net: grossReturn - totalStaked,
    };
  }

  const api = { SEGMENTS, PAYS, SYMBOLS, SEG, pickLanding, targetRotation, segmentAtRotation, resolveSpin };
  if (typeof globalThis !== 'undefined') globalThis.DiamondWheelCore = api;
  if (typeof window !== 'undefined') window.DiamondWheelCore = api;
})();
/* CORE TESTABLE API END */

const Core = window.DiamondWheelCore;
const TWO_PI = Math.PI * 2;

/* ---------- low power ---------- */
const REDUCED_MOTION = window.matchMedia && matchMedia('(prefers-reduced-motion: reduce)').matches;
const LOW_POWER = REDUCED_MOTION ||
  (navigator.hardwareConcurrency && navigator.hardwareConcurrency <= 4) ||
  Math.min(screen.width, screen.height) <= 720;
if (LOW_POWER) document.documentElement.classList.add('low-power');

/* ---------- shared balance ---------- */
const BALANCE_KEY = 'casino.balance';
function loadBalance() {
  const v = parseFloat(localStorage.getItem(BALANCE_KEY));
  return isNaN(v) || v < 0 ? 1000 : v;
}
function persistBalance(v) {
  try { localStorage.setItem(BALANCE_KEY, String(v)); } catch (e) {}
}
const fmt = n => Math.round(n).toLocaleString('en-US');

/* ---------- SFX (pooled <audio>, fail silent, x Settings.sfxVolume) ---------- */
const SFX_POOL = {};
function playSfx(name, gain) {
  try {
    const vol = (window.Settings ? Settings.sfxVolume() : 1) * (gain == null ? 1 : gain);
    if (vol <= 0) return;
    let pool = SFX_POOL[name];
    if (!pool) {
      pool = SFX_POOL[name] = { i: 0, els: [] };
      for (let k = 0; k < 3; k++) pool.els.push(new window.Audio('sfx/' + name + '.mp3'));
    }
    const a = pool.els[pool.i = (pool.i + 1) % pool.els.length];
    a.volume = Math.min(1, vol);
    a.currentTime = 0;
    a.play().catch(() => {});
  } catch (e) {}
}
const CHIP_PLACE = ['chip_place_a', 'chip_place_b', 'chip_place_c'];

/* WebAudio peg ticks — crisper than mp3 at rapid fire. */
let actx = null;
function ensureCtx() {
  if (!actx) {
    try { actx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {}
  }
  if (actx && actx.state === 'suspended') actx.resume().catch(() => {});
}
let lastTickAt = 0;
function pegTick(speed) {
  const now = performance.now();
  if (now - lastTickAt < 45) return;
  lastTickAt = now;
  if (!actx) return;
  try {
    const vol = (window.Settings ? Settings.sfxVolume() : 1) * Math.min(0.22, 0.05 + speed * 0.012);
    if (vol <= 0) return;
    const t = actx.currentTime;
    const osc = actx.createOscillator();
    const g = actx.createGain();
    osc.type = 'square';
    osc.frequency.value = 1750 + Math.random() * 500;
    g.gain.setValueAtTime(vol, t);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.03);
    osc.connect(g).connect(actx.destination);
    osc.start(t);
    osc.stop(t + 0.035);
  } catch (e) {}
}

/* ---------- symbol look ---------- */
const LOOK = {
  x1:    { base: '#2b1455', text: '#e9d8ff', accent: '#a855f7', label: '$1' },
  x2:    { base: '#073b4c', text: '#aef3ff', accent: '#22d3ee', label: '$2' },
  x5:    { base: '#0b3d26', text: '#a9ffd0', accent: '#5cffa1', label: '$5' },
  x10:   { base: '#4d0f33', text: '#ffc1dd', accent: '#ff2e93', label: '$10' },
  x20:   { base: '#553c00', text: '#ffe9a8', accent: '#ffd24a', label: '$20' },
  JOKER: { base: '#5e0a3c', text: '#ffd24a', accent: '#ff2e93', label: 'JOKER', glyph: '★' },
  FLAG:  { base: '#0a2f5e', text: '#dffaff', accent: '#22d3ee', label: 'DIAMOND', glyph: '♦' },
};

/* ---------- wheel face painter (shared by 3D texture + 2D fallback) ---------- */
function paintFace(size, withPegs) {
  const cv = document.createElement('canvas');
  cv.width = cv.height = size;
  const ctx = cv.getContext('2d');
  const C = size / 2;
  const R = C * 0.98;
  const SEG = Core.SEG;

  // hub-to-rim base
  ctx.translate(C, C);

  // wedges r [0.32R, 0.90R]
  for (let i = 0; i < 54; i++) {
    const sym = Core.SEGMENTS[i];
    const lk = LOOK[sym];
    const a0 = -Math.PI / 2 + (i - 0.5) * SEG;
    const a1 = a0 + SEG;
    ctx.beginPath();
    ctx.arc(0, 0, R * 0.90, a0, a1);
    ctx.arc(0, 0, R * 0.32, a1, a0, true);
    ctx.closePath();
    const grad = ctx.createRadialGradient(0, 0, R * 0.32, 0, 0, R * 0.90);
    grad.addColorStop(0, shade(lk.base, 1.35));
    grad.addColorStop(1, lk.base);
    ctx.fillStyle = grad;
    ctx.fill();
    // special segments glow brighter
    if (sym === 'JOKER' || sym === 'FLAG') {
      ctx.save();
      ctx.clip();
      const gg = ctx.createRadialGradient(0, 0, R * 0.4, 0, 0, R * 0.9);
      gg.addColorStop(0, 'rgba(255,255,255,0)');
      gg.addColorStop(1, hexToRgba(lk.accent, 0.35));
      ctx.fillStyle = gg;
      ctx.fill();
      ctx.restore();
    }
  }

  // separators
  ctx.strokeStyle = 'rgba(255,210,74,0.75)';
  ctx.lineWidth = Math.max(1.5, size * 0.0022);
  for (let i = 0; i < 54; i++) {
    const a = -Math.PI / 2 + (i - 0.5) * SEG;
    ctx.beginPath();
    ctx.moveTo(Math.cos(a) * R * 0.32, Math.sin(a) * R * 0.32);
    ctx.lineTo(Math.cos(a) * R * 0.955, Math.sin(a) * R * 0.955);
    ctx.stroke();
  }

  // outer gold band
  ring(ctx, R * 0.90, R * 0.955, '#8a6508', '#ffd24a', '#5c3d00');
  // inner gold ring
  ring(ctx, R * 0.30, R * 0.32, '#8a6508', '#ffe27a', '#5c3d00');

  // labels
  for (let i = 0; i < 54; i++) {
    const sym = Core.SEGMENTS[i];
    const lk = LOOK[sym];
    const ang = i * SEG; // wheel-local, clockwise from up
    ctx.save();
    ctx.rotate(ang); // canvas clockwise == our clockwise (y down)
    ctx.fillStyle = lk.text;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    if (lk.glyph) {
      ctx.shadowColor = lk.accent;
      ctx.shadowBlur = size * 0.012;
      ctx.font = `${Math.round(size * 0.052)}px Outfit, sans-serif`;
      ctx.fillText(lk.glyph, 0, -R * 0.575);
      ctx.shadowBlur = 0;
      ctx.font = `800 ${Math.round(size * 0.018)}px Outfit, sans-serif`;
      ctx.fillText(lk.label, 0, -R * 0.45);
    } else {
      ctx.font = `800 ${Math.round(size * 0.042)}px Outfit, sans-serif`;
      ctx.fillText(lk.label, 0, -R * 0.62);
    }
    ctx.restore();
  }

  // pegs painted only for the 2D fallback (3D uses real meshes)
  if (withPegs) {
    for (let i = 0; i < 54; i++) {
      const a = -Math.PI / 2 + (i - 0.5) * SEG;
      const px = Math.cos(a) * R * 0.925;
      const py = Math.sin(a) * R * 0.925;
      const g = ctx.createRadialGradient(px - 1, py - 1, 0, px, py, size * 0.008);
      g.addColorStop(0, '#fff7d1');
      g.addColorStop(1, '#8a6508');
      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.arc(px, py, size * 0.008, 0, TWO_PI);
      ctx.fill();
    }
  }

  // hub
  const hg = ctx.createRadialGradient(0, -size * 0.02, 0, 0, 0, R * 0.30);
  hg.addColorStop(0, '#2a1050');
  hg.addColorStop(1, '#0c0520');
  ctx.fillStyle = hg;
  ctx.beginPath();
  ctx.arc(0, 0, R * 0.30, 0, TWO_PI);
  ctx.fill();
  // hub diamond glyph
  ctx.fillStyle = '#ffd24a';
  ctx.shadowColor = '#ffd24a';
  ctx.shadowBlur = size * 0.02;
  ctx.font = `${Math.round(size * 0.13)}px Outfit, sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('♦', 0, size * 0.004);
  ctx.shadowBlur = 0;

  // Pre-shaded lighting baked into the art: the 3D face material is
  // unlit (MeshBasicMaterial) so the painted colors are WYSIWYG on
  // every device — scene lights only sculpt the gold 3D parts.
  // Soft top sheen…
  const sheen = ctx.createLinearGradient(0, -R, 0, R * 0.4);
  sheen.addColorStop(0, 'rgba(255,255,255,0.10)');
  sheen.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = sheen;
  ctx.beginPath();
  ctx.arc(0, 0, R * 0.955, 0, TWO_PI);
  ctx.fill();
  // …and an edge vignette for depth.
  const vig = ctx.createRadialGradient(0, 0, R * 0.55, 0, 0, R * 0.955);
  vig.addColorStop(0, 'rgba(0,0,0,0)');
  vig.addColorStop(1, 'rgba(0,0,0,0.30)');
  ctx.fillStyle = vig;
  ctx.beginPath();
  ctx.arc(0, 0, R * 0.955, 0, TWO_PI);
  ctx.fill();
  return cv;

  function ring(c, r0, r1, edge, mid, deep) {
    const g = c.createRadialGradient(0, 0, r0, 0, 0, r1);
    g.addColorStop(0, deep);
    g.addColorStop(0.5, mid);
    g.addColorStop(1, edge);
    c.beginPath();
    c.arc(0, 0, r1, 0, TWO_PI);
    c.arc(0, 0, r0, 0, TWO_PI, true);
    c.fillStyle = g;
    c.fill();
  }
  function shade(hex, mul) {
    const n = parseInt(hex.slice(1), 16);
    const r = Math.min(255, ((n >> 16) & 255) * mul) | 0;
    const g = Math.min(255, ((n >> 8) & 255) * mul) | 0;
    const b = Math.min(255, (n & 255) * mul) | 0;
    return `rgb(${r},${g},${b})`;
  }
  function hexToRgba(hex, a) {
    const n = parseInt(hex.slice(1), 16);
    return `rgba(${(n >> 16) & 255},${(n >> 8) & 255},${n & 255},${a})`;
  }
}

/* ============================================================
   Renderers. Both expose: resize(), setState(rho, flapperAng),
   render(), dispose(). Built once; render on demand only.
   ============================================================ */
const house = document.getElementById('wheelhouse');

function makeFallback2D() {
  const canvas = document.createElement('canvas');
  house.appendChild(canvas);
  let face = paintFace(LOW_POWER ? 1024 : 1536, true);
  if (document.fonts && document.fonts.ready) {
    document.fonts.ready.then(() => {
      try { face = paintFace(LOW_POWER ? 1024 : 1536, true); renderOnce(); } catch (e) {}
    });
  }
  let rho = 0, flap = 0, W = 0, H = 0;
  function resize() {
    const r = house.getBoundingClientRect();
    const dpr = Math.min(devicePixelRatio || 1, LOW_POWER ? 1 : 2);
    W = canvas.width = Math.round(r.width * dpr);
    H = canvas.height = Math.round(r.height * dpr);
  }
  function render() {
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, W, H);
    const C = Math.min(W, H) / 2;
    const R = C * 0.82;
    ctx.save();
    ctx.translate(W / 2, H / 2 + C * 0.04);
    // wheel
    ctx.save();
    ctx.rotate(rho);
    ctx.drawImage(face, -R, -R, R * 2, R * 2);
    ctx.restore();
    // rim
    ctx.lineWidth = C * 0.045;
    const rim = ctx.createLinearGradient(0, -R, 0, R);
    rim.addColorStop(0, '#ffe27a');
    rim.addColorStop(0.5, '#b8860b');
    rim.addColorStop(1, '#5c3d00');
    ctx.strokeStyle = rim;
    ctx.beginPath();
    ctx.arc(0, 0, R * 1.01, 0, TWO_PI);
    ctx.stroke();
    // flapper
    ctx.save();
    ctx.translate(0, -R * 1.06);
    ctx.rotate(flap);
    ctx.fillStyle = '#a3122c';
    ctx.beginPath();
    ctx.moveTo(-C * 0.030, -C * 0.02);
    ctx.lineTo(C * 0.030, -C * 0.02);
    ctx.lineTo(0, C * 0.085);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = '#ffd24a';
    ctx.beginPath();
    ctx.arc(0, -C * 0.02, C * 0.022, 0, TWO_PI);
    ctx.fill();
    ctx.restore();
    ctx.restore();
  }
  resize();
  return {
    is3D: false,
    resize,
    setState(r, f) { rho = r; flap = f; },
    render,
    dispose() { canvas.remove(); },
  };
}

async function make3D() {
  const THREE = await import('https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js');
  const renderer = new THREE.WebGLRenderer({ antialias: !LOW_POWER, alpha: true });
  renderer.setPixelRatio(Math.min(devicePixelRatio || 1, LOW_POWER ? 1 : 2));
  house.appendChild(renderer.domElement);
  renderer.domElement.addEventListener('webglcontextlost', e => e.preventDefault());

  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(38, 1, 0.1, 30);
  camera.position.set(0, 0.34, 3.35);
  camera.lookAt(0, 0, 0);

  // Lights sculpt ONLY the gold 3D parts (rim/pegs/hub/flapper) —
  // the painted face is unlit so its colors are exact everywhere.
  scene.add(new THREE.AmbientLight(0xbbaadd, 1.15));
  const key = new THREE.DirectionalLight(0xffe9b0, 2.4);
  key.position.set(2.2, 3.0, 4.0);
  scene.add(key);
  const fill = new THREE.DirectionalLight(0x22d3ee, 0.6);
  fill.position.set(-3.0, 0.8, 2.4);
  scene.add(fill);

  // soft felt backdrop
  const felt = new THREE.Mesh(
    new THREE.PlaneGeometry(14, 9),
    new THREE.MeshStandardMaterial({ color: 0x170a30, roughness: 1, metalness: 0 })
  );
  felt.position.z = -0.55;
  scene.add(felt);
  // dark halo behind the wheel for depth
  const haloTex = (() => {
    const c = document.createElement('canvas');
    c.width = c.height = 256;
    const g = c.getContext('2d');
    const grad = g.createRadialGradient(128, 128, 30, 128, 128, 128);
    grad.addColorStop(0, 'rgba(0,0,0,0.55)');
    grad.addColorStop(1, 'rgba(0,0,0,0)');
    g.fillStyle = grad;
    g.fillRect(0, 0, 256, 256);
    const t = new THREE.CanvasTexture(c);
    t.generateMipmaps = false;
    t.minFilter = THREE.LinearFilter;
    t.magFilter = THREE.LinearFilter;
    return t;
  })();
  const halo = new THREE.Mesh(
    new THREE.PlaneGeometry(3.4, 3.4),
    new THREE.MeshBasicMaterial({ map: haloTex, transparent: true, depthWrite: false })
  );
  halo.position.z = -0.30;
  scene.add(halo);

  // ---- wheel group ----
  const tilt = new THREE.Group();
  tilt.rotation.x = -0.16;
  scene.add(tilt);
  const wheel = new THREE.Group();
  tilt.add(wheel);

  const faceTex = new THREE.CanvasTexture(paintFace(LOW_POWER ? 1024 : 1280, false));
  faceTex.colorSpace = THREE.SRGBColorSpace;
  // NO mipmaps, NO anisotropy: several mobile GPUs generate garbage
  // mip chains for canvas textures (radially-smeared rotation-invariant
  // noise — exactly the bug report). Sample the base level only; the
  // canvas is already sized close to display resolution.
  faceTex.generateMipmaps = false;
  faceTex.minFilter = THREE.LinearFilter;
  faceTex.magFilter = THREE.LinearFilter;
  // Unlit: the painted art (with its baked sheen/vignette) IS the look.
  const face = new THREE.Mesh(
    new THREE.CircleGeometry(1, 108),
    new THREE.MeshBasicMaterial({ map: faceTex })
  );
  face.position.z = 0.035;
  wheel.add(face);

  // Repaint once webfonts land so the labels render in Outfit, not
  // the system fallback the first paint may have used.
  if (document.fonts && document.fonts.ready) {
    document.fonts.ready.then(() => {
      try {
        faceTex.image = paintFace(LOW_POWER ? 1024 : 1280, false);
        faceTex.needsUpdate = true;
        renderOnce();
      } catch (e) {}
    });
  }

  // body behind the face
  const body = new THREE.Mesh(
    new THREE.CylinderGeometry(1.0, 1.0, 0.07, 96),
    new THREE.MeshStandardMaterial({ color: 0x1a0b36, roughness: 0.9, metalness: 0.1 })
  );
  body.rotation.x = Math.PI / 2;
  wheel.add(body);

  const goldMat = new THREE.MeshStandardMaterial({
    color: 0xd4a017, roughness: 0.28, metalness: 0.95,
    emissive: 0x553c00, emissiveIntensity: 0.25,
  });

  // rim
  const rim = new THREE.Mesh(new THREE.TorusGeometry(1.015, 0.052, 20, 96), goldMat);
  wheel.add(rim);

  // 54 pegs (instanced) on the wheel at segment boundaries
  const pegGeo = new THREE.CylinderGeometry(0.016, 0.016, 0.07, 10);
  const pegs = new THREE.InstancedMesh(pegGeo, goldMat, 54);
  const m4 = new THREE.Matrix4();
  const q = new THREE.Quaternion().setFromEuler(new THREE.Euler(Math.PI / 2, 0, 0));
  const v3 = new THREE.Vector3();
  for (let i = 0; i < 54; i++) {
    const a = -Math.PI / 2 + (i - 0.5) * Core.SEG; // matches painter boundaries
    v3.set(Math.cos(a) * 0.925, -Math.sin(a) * 0.925, 0.055);
    m4.compose(v3, q, new THREE.Vector3(1, 1, 1));
    pegs.setMatrixAt(i, m4);
  }
  pegs.instanceMatrix.needsUpdate = true;
  wheel.add(pegs);

  // hub diamond
  const hub = new THREE.Mesh(new THREE.OctahedronGeometry(0.15, 0), new THREE.MeshStandardMaterial({
    color: 0xffd24a, roughness: 0.15, metalness: 0.9,
    emissive: 0xb8860b, emissiveIntensity: 0.5,
  }));
  hub.scale.set(1, 1.35, 0.6);
  hub.position.z = 0.13;
  wheel.add(hub);

  // ---- flapper (fixed, above wheel) ----
  const flapGroup = new THREE.Group();
  flapGroup.position.set(0, 1.13, 0.10);
  tilt.add(flapGroup);
  const blade = new THREE.Mesh(
    new THREE.ConeGeometry(0.058, 0.26, 4),
    new THREE.MeshStandardMaterial({ color: 0xb01430, roughness: 0.5, metalness: 0.2, emissive: 0x40060f, emissiveIntensity: 0.6 })
  );
  blade.rotation.x = Math.PI; // point down
  blade.scale.z = 0.45;
  blade.position.y = -0.10;
  flapGroup.add(blade);
  const cap = new THREE.Mesh(new THREE.SphereGeometry(0.04, 16, 12), goldMat);
  flapGroup.add(cap);

  function resize() {
    const r = house.getBoundingClientRect();
    renderer.setSize(r.width, r.height, false);
    camera.aspect = r.width / r.height;
    camera.updateProjectionMatrix();
  }
  resize();

  return {
    is3D: true,
    resize,
    setState(rho, flap) {
      wheel.rotation.z = -rho;        // -z == clockwise for the viewer
      flapGroup.rotation.z = -flap;
    },
    render() { renderer.render(scene, camera); },
    dispose() { renderer.dispose(); renderer.domElement.remove(); },
  };
}

/* ============================================================
   Game state + animation engine (renderer-agnostic).
   ============================================================ */
const els = {
  balance: document.getElementById('balance'),
  balanceWrap: document.querySelector('.balance-link .value'),
  message: document.getElementById('message'),
  board: document.getElementById('board'),
  rack: document.getElementById('chip-rack'),
  spin: document.getElementById('btn-spin'),
  clear: document.getElementById('btn-clear'),
  rebet: document.getElementById('btn-rebet'),
  toast: document.getElementById('result-toast'),
  toastSym: document.getElementById('rt-sym'),
  toastAmt: document.getElementById('rt-amt'),
};

const State = {
  phase: 'BETTING', // BETTING | SPINNING
  balance: loadBalance(),
  bets: Object.fromEntries(Core.SYMBOLS.map(s => [s, 0])),
  lastBets: null,
  selectedChip: 25,
  rho: 0,
  flapAng: 0,
  flapVel: 0,
};

let renderer = null;
let rafId = 0;
let loopActive = false;

function setBalance(v) {
  State.balance = Math.round(v * 100) / 100;
  persistBalance(State.balance);
  els.balance.textContent = fmt(State.balance);
  els.balanceWrap.classList.remove('bump');
  void els.balanceWrap.offsetWidth;
  els.balanceWrap.classList.add('bump');
}
function refreshBalance() {
  State.balance = loadBalance();
  els.balance.textContent = fmt(State.balance);
}
function setMessage(text, kind) {
  els.message.textContent = text;
  els.message.classList.toggle('win', kind === 'win');
  els.message.classList.toggle('lose', kind === 'lose');
}

/* ---------- bet board ---------- */
const spotEls = {};
function buildBoard() {
  for (const sym of Core.SYMBOLS) {
    const lk = LOOK[sym];
    const b = document.createElement('button');
    b.className = 'spot';
    b.dataset.sym = sym;
    b.style.setProperty('--spot-color', lk.accent);
    b.style.setProperty('--spot-glow', lk.accent + '66');
    b.style.setProperty('--spot-edge', lk.accent + '55');
    b.innerHTML =
      `<span class="s-sym">${lk.glyph ? lk.glyph + ' ' : ''}${lk.label}</span>` +
      `<span class="s-pays">PAYS ${Core.PAYS[sym]}:1</span>` +
      `<span class="s-stake">$0</span>`;
    b.addEventListener('click', () => addBet(sym));
    b.addEventListener('contextmenu', e => { e.preventDefault(); removeBet(sym); });
    els.board.appendChild(b);
    spotEls[sym] = b;
  }
}
function paintSpot(sym) {
  const el = spotEls[sym];
  const v = State.bets[sym];
  el.classList.toggle('staked', v > 0);
  el.querySelector('.s-stake').textContent = '$' + fmt(v);
}
function totalStaked() {
  let t = 0;
  for (const s of Core.SYMBOLS) t += State.bets[s];
  return t;
}
function addBet(sym) {
  if (State.phase !== 'BETTING') return;
  const chip = State.selectedChip;
  if (State.balance < chip) { setMessage('NOT ENOUGH CHIPS', 'lose'); playSfx('lose_low', 0.4); return; }
  ensureCtx();
  setBalance(State.balance - chip);
  State.bets[sym] += chip;
  paintSpot(sym);
  playSfx(CHIP_PLACE[(Math.random() * 3) | 0], 0.8);
  updateActions();
}
function removeBet(sym) {
  if (State.phase !== 'BETTING') return;
  const cur = State.bets[sym];
  if (cur <= 0) return;
  let take = State.selectedChip <= cur ? State.selectedChip : 0;
  if (!take) for (const d of [1000, 500, 100, 25, 5, 1]) if (cur >= d) { take = d; break; }
  State.bets[sym] = cur - take;
  setBalance(State.balance + take);
  paintSpot(sym);
  playSfx('chip_select', 0.7);
  updateActions();
}
function clearBets(refund) {
  let refunded = 0;
  for (const s of Core.SYMBOLS) {
    refunded += State.bets[s];
    State.bets[s] = 0;
    paintSpot(s);
    spotEls[s].classList.remove('win', 'dud');
  }
  if (refund && refunded > 0) {
    setBalance(State.balance + refunded);
    playSfx('chip_clear', 0.8);
  }
  updateActions();
}
function updateActions() {
  const betting = State.phase === 'BETTING';
  const staked = totalStaked();
  els.spin.disabled = !betting || staked <= 0;
  els.clear.disabled = !betting || staked <= 0;
  els.rebet.disabled = !betting || !State.lastBets || staked > 0;
  for (const s of Core.SYMBOLS) spotEls[s].disabled = !betting;
}

/* ---------- chip rack ---------- */
function buildRack() {
  const denoms = [1, 5, 25, 100, 500, 1000];
  for (const d of denoms) {
    const c = document.createElement('button');
    c.className = 'chip c' + d + (d === State.selectedChip ? ' selected' : '');
    c.textContent = d >= 1000 ? '$1K' : '$' + d;
    c.addEventListener('click', () => {
      State.selectedChip = d;
      els.rack.querySelectorAll('.chip').forEach(x => x.classList.remove('selected'));
      c.classList.add('selected');
      playSfx('chip_select', 0.6);
    });
    els.rack.appendChild(c);
  }
}

/* ---------- animation ---------- */
const Anim = {
  phases: [],   // [{from,to,dur,ease,onDone}]
  t0: 0,
  idx: 0,
  lastPeg: 0,
  done: null,
};
const easeInOutSine = t => 0.5 - 0.5 * Math.cos(Math.PI * t);
const easeOutQuart = t => 1 - Math.pow(1 - t, 4);
const easeOutCubic = t => 1 - Math.pow(1 - t, 3);

function startSpinAnimation(targetRho, onDone) {
  const from = State.rho % TWO_PI;
  const SEGA = Core.SEG;
  Anim.phases = REDUCED_MOTION
    ? [{ from, to: targetRho, dur: 1400, ease: easeOutCubic }]
    : [
        { from, to: from - 0.6 * SEGA, dur: 320, ease: easeInOutSine },                       // wind-up
        { from: from - 0.6 * SEGA, to: targetRho, dur: LOW_POWER ? 3600 : 4700, ease: easeOutQuart }, // launch
        { from: targetRho, to: targetRho - 0.15 * SEGA, dur: 200, ease: easeOutCubic },       // rock back
        { from: targetRho - 0.15 * SEGA, to: targetRho, dur: 260, ease: easeInOutSine },      // settle
      ];
  Anim.idx = 0;
  Anim.t0 = performance.now();
  Anim.lastPeg = Math.floor((from + SEGA / 2) / SEGA);
  Anim.done = onDone;
  ensureLoop();
}

function tickAnim(now) {
  const ph = Anim.phases[Anim.idx];
  if (!ph) return false;
  let t = (now - Anim.t0) / ph.dur;
  let prevRho = State.rho;
  if (t >= 1) {
    State.rho = ph.to;
    Anim.idx++;
    Anim.t0 = now;
    if (Anim.idx >= Anim.phases.length) {
      const cb = Anim.done;
      Anim.done = null;
      Anim.phases = [];
      if (cb) cb();
      return false;
    }
  } else {
    State.rho = ph.from + (ph.to - ph.from) * ph.ease(t);
  }
  // peg crossings -> flapper kicks + ticks (forward motion only)
  const SEGA = Core.SEG;
  const pegNow = Math.floor((State.rho + SEGA / 2) / SEGA);
  if (pegNow !== Anim.lastPeg) {
    const speed = Math.abs(State.rho - prevRho) * 1000 / 16.7; // rad per ~frame
    State.flapVel += Math.min(0.55, 0.18 + speed * 0.10);
    Anim.lastPeg = pegNow;
    pegTick(speed * 10);
  }
  return true;
}

function tickFlapper(dt) {
  // spring-damper toward rest
  const k = 130, c = 11;
  const acc = -k * State.flapAng - c * State.flapVel;
  State.flapVel += acc * dt;
  State.flapAng += State.flapVel * dt;
  if (State.flapAng < 0) { State.flapAng = 0; State.flapVel *= -0.35; }
  if (State.flapAng > 0.55) { State.flapAng = 0.55; State.flapVel = 0; }
}

let lastFrame = 0;
function loop(now) {
  const animating = tickAnim(now);
  const dt = Math.min(0.05, (now - (lastFrame || now)) / 1000);
  lastFrame = now;
  tickFlapper(dt);
  renderer.setState(State.rho, State.flapAng);
  renderer.render();
  const flapperLive = Math.abs(State.flapAng) > 0.004 || Math.abs(State.flapVel) > 0.02;
  if (animating || flapperLive) {
    rafId = requestAnimationFrame(loop);
  } else {
    loopActive = false;
    lastFrame = 0;
  }
}
function ensureLoop() {
  if (loopActive || document.hidden) return;
  loopActive = true;
  rafId = requestAnimationFrame(loop);
}
function renderOnce() {
  if (!renderer) return;
  renderer.setState(State.rho, State.flapAng);
  renderer.render();
}

document.addEventListener('visibilitychange', () => {
  if (!document.hidden) {
    if (Anim.phases.length || Math.abs(State.flapVel) > 0.02) ensureLoop();
    else renderOnce();
  } else if (rafId) {
    cancelAnimationFrame(rafId);
    loopActive = false;
  }
});

let resizeT = 0;
addEventListener('resize', () => {
  clearTimeout(resizeT);
  resizeT = setTimeout(() => { if (renderer) { renderer.resize(); renderOnce(); } }, 150);
});

/* ---------- spin flow ---------- */
function spin() {
  if (State.phase !== 'BETTING' || totalStaked() <= 0) return;
  ensureCtx();
  State.phase = 'SPINNING';
  State.lastBets = { ...State.bets };
  for (const s of Core.SYMBOLS) spotEls[s].classList.remove('win', 'dud');
  updateActions();
  setMessage('NO MORE BETS');
  playSfx('diamond_spin_normal', 0.7);

  // RNG first — the animation is pure theater.
  const landedIndex = Core.pickLanding(Math.random());
  const turns = 5 + ((Math.random() * 3) | 0);
  const jitter = (Math.random() * 0.6 - 0.3);
  const target = Core.targetRotation(landedIndex, turns, jitter);

  startSpinAnimation(target, () => resolve(landedIndex));
}

function resolve(landedIndex) {
  playSfx('stand_thump', 0.8);
  const result = Core.resolveSpin(landedIndex, State.bets);
  const lk = LOOK[result.symbol];

  if (result.grossReturn > 0) setBalance(State.balance + result.grossReturn);

  // The one round-logging call — feeds stats, jackpots, XP, banner, NET pill.
  try { History.record('diamondwheel', result.totalStaked, result.net, null); } catch (e) {}

  // celebrate / commiserate
  for (const s of Core.SYMBOLS) {
    if (State.bets[s] <= 0) continue;
    spotEls[s].classList.add(s === result.symbol ? 'win' : 'dud');
  }
  const ratio = result.totalStaked > 0 ? result.grossReturn / result.totalStaked : 0;
  const big = ratio >= 10;
  if (result.grossReturn > 0) {
    house.classList.remove('flash-gold', 'flash-dim');
    void house.offsetWidth;
    house.classList.add('flash-gold');
    if (big) {
      playSfx('blackjack_fanfare', 0.9);
      playSfx('chip_payout', 0.9);
      confettiBurst();
    } else {
      playSfx('win_chime', 0.85);
    }
    setMessage(`${lk.label} — ${result.net >= 0 ? '+$' : '-$'}${fmt(Math.abs(result.net))}`, result.net >= 0 ? 'win' : undefined);
  } else {
    house.classList.remove('flash-gold', 'flash-dim');
    void house.offsetWidth;
    house.classList.add('flash-dim');
    playSfx('bust_thud', 0.45);
    setMessage(`${lk.label} — NO HIT`, 'lose');
  }
  showToast(lk, result);

  setTimeout(() => {
    for (const s of Core.SYMBOLS) {
      State.bets[s] = 0;
      paintSpot(s);
      spotEls[s].classList.remove('dud');
    }
    State.phase = 'BETTING';
    updateActions();
    setMessage('PLACE YOUR BETS');
  }, big ? 2100 : 1400);
}

function showToast(lk, result) {
  els.toastSym.textContent = (lk.glyph ? lk.glyph + ' ' : '') + lk.label;
  const win = result.net >= 0 && result.grossReturn > 0;
  els.toastAmt.textContent = (result.net >= 0 ? '+$' : '-$') + fmt(Math.abs(result.net));
  els.toastAmt.classList.toggle('lose', !win);
  els.toast.classList.add('show');
  setTimeout(() => els.toast.classList.remove('show'), 1500);
}

function confettiBurst() {
  if (LOW_POWER) return;
  const r = house.getBoundingClientRect();
  const cx = r.left + r.width / 2, cy = r.top + r.height / 2;
  const colors = ['#ffd24a', '#ff2e93', '#22d3ee', '#5cffa1', '#a855f7'];
  for (let i = 0; i < 18; i++) {
    const d = document.createElement('div');
    d.className = 'dw-confetti';
    d.style.left = cx + 'px';
    d.style.top = cy + 'px';
    d.style.background = colors[i % colors.length];
    const a = Math.random() * TWO_PI, dist = 90 + Math.random() * 180;
    d.style.setProperty('--dx', Math.cos(a) * dist + 'px');
    d.style.setProperty('--dy', (Math.sin(a) * dist - 60) + 'px');
    d.style.setProperty('--rot', ((Math.random() * 540 - 270) | 0) + 'deg');
    document.body.appendChild(d);
    setTimeout(() => d.remove(), 1100);
  }
}

function rebet() {
  if (State.phase !== 'BETTING' || !State.lastBets) return;
  let need = 0;
  for (const s of Core.SYMBOLS) need += State.lastBets[s];
  if (need <= 0 || State.balance < need) { setMessage('NOT ENOUGH CHIPS', 'lose'); return; }
  setBalance(State.balance - need);
  for (const s of Core.SYMBOLS) { State.bets[s] = State.lastBets[s]; paintSpot(s); }
  playSfx('chip_stack_a', 0.85);
  updateActions();
}

/* ---------- wiring ---------- */
buildBoard();
buildRack();
els.spin.addEventListener('click', spin);
els.clear.addEventListener('click', () => clearBets(true));
els.rebet.addEventListener('click', rebet);
document.getElementById('btn-history').addEventListener('click', () => {
  playSfx('button_soft', 0.6);
  if (window.HistoryUI) HistoryUI.open({ scope: 'session', game: 'diamondwheel' });
});
refreshBalance();
updateActions();

addEventListener('focus', refreshBalance);
addEventListener('pageshow', refreshBalance);
document.addEventListener('jackpot-win', refreshBalance);

if (window.SettingsUI) SettingsUI.mount();
if (window.Music) Music.init(encodeURI('Music/Diamond Spin.m4a'));

/* ---------- bring up a renderer (3D, else 2D) ---------- */
(async () => {
  // Give the webfonts a beat to arrive so the first face paint uses
  // Outfit; the fonts.ready repaint hooks catch any stragglers.
  try {
    await Promise.race([
      Promise.all([
        document.fonts.load('800 60px Outfit'),
        document.fonts.load('400 60px Outfit'),
      ]),
      new Promise(r => setTimeout(r, 900)),
    ]);
  } catch (e) {}
  try {
    // ?2d escape hatch: force the Canvas2D renderer (debug + devices
    // whose WebGL canvas-texture path misbehaves).
    if (new URLSearchParams(location.search).has('2d')) throw new Error('forced 2d');
    if (!window.WebGLRenderingContext) throw new Error('no webgl');
    renderer = await make3D();
  } catch (e) {
    try { renderer = makeFallback2D(); } catch (e2) { renderer = null; }
  }
  if (renderer) {
    renderer.resize();
    renderOnce();
  }
  if (window.Loader) Loader.hide();
})();
</script>
