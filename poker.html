  });

  // ----- DOM refs -----
  const $ = id => document.getElementById(id);
  const dom = {
    balAmt: $('bal-amt'),
    balAdd: $('bl-add'),
    tableSelect: $('table-select'),
    tablesGrid: $('tables-grid'),
    gameScreen: $('game-screen'),
    thName: $('th-name'),
    thStakes: $('th-stakes'),
    community: $('community'),
    potAmount: $('pot-amount'),
    dealerBtn: $('dealer-btn'),
    showdownToast: $('showdown-toast'),
    seatsLayer: $('seats-layer'),
    msgBanner: $('message-banner'),
    actionBar: $('action-bar'),
    btnFold: $('btn-fold'),
    btnCheck: $('btn-check'),
    btnRaise: $('btn-raise'),
    btnAllin: $('btn-allin'),
    betSlider: $('bet-slider'),
    betSliderRow: $('bet-slider-row'),
    betAmt: $('bet-amt'),
    btnHistory: $('btn-history'),
    btnLeave: $('btn-leave'),
    buyinModal: $('buyin-modal'),
    buyinTitle: $('buyin-title'),
    buyinSlider: $('buyin-slider'),
    buyinAmt: $('buyin-amt'),
    buyinMin: $('buyin-min'),
    buyinMax: $('buyin-max'),
    buyinCancel: $('buyin-cancel'),
    buyinConfirm: $('buyin-confirm'),
    historyModal: $('history-modal'),
    historyList: $('history-list'),
    historyClose: $('history-close'),
    addfundsModal: $('addfunds-modal'),
    addfundsInput: $('addfunds-input'),
    addfundsCancel: $('addfunds-cancel'),
    addfundsConfirm: $('addfunds-confirm'),
    particles: $('particles'),
    heroHandStrength: $('hero-hand-strength'),
    preactionBar: $('preaction-bar'),
    paCallAmt: $('pa-call-amt'),
  };

  // ----- State -----
  const State = {
    balance: loadBalance(),
    selectedTable: null,        // Core.TABLES item
    pokerState: null,           // Core state object
    heroSeat: 0,
    seatBots: [],               // array of bot info per seat (null for empty)
    history: [],                // hand history rows
    busy: false,                // mid-animation
    handStartStack: 0,
    autoHandTimer: null,
    actionTimerHandle: null,
    pendingTimers: [],
    revealedSeats: new Set(),
    showdownInProgress: false,
    // Zynga-style armed pre-action: { type, amount } or null.
    //  type: 'fold' | 'checkfold' | 'check' | 'call' | 'callany'
    //  amount: the to-call price this CALL was armed against (call only)
    preAction: null,
  };

  function paintBalance() { dom.balAmt.textContent = fmt(State.balance); }

  function refreshBalanceFromStorage() {
    const fresh = loadBalance();
    if (fresh !== State.balance) { State.balance = fresh; paintBalance(); renderTables(); }
  }
  window.addEventListener('pageshow', refreshBalanceFromStorage);
  window.addEventListener('focus', refreshBalanceFromStorage);
  document.addEventListener('visibilitychange', () => { if (document.visibilityState === 'visible') refreshBalanceFromStorage(); });
  window.addEventListener('storage', e => { if (e.key === BALANCE_KEY) refreshBalanceFromStorage(); });
  document.addEventListener('jackpot-win', () => refreshBalanceFromStorage());

  paintBalance();

  // ----- Helpers -----
  function delay(ms) {
    return new Promise(res => {
      const id = setTimeout(() => { State.pendingTimers = State.pendingTimers.filter(x => x !== id); res(); }, ms);
      State.pendingTimers.push(id);
    });
  }
  function clearPendingTimers() {
    for (const id of State.pendingTimers) clearTimeout(id);
    State.pendingTimers.length = 0;
    if (State.actionTimerHandle) { clearTimeout(State.actionTimerHandle); State.actionTimerHandle = null; }
  }

  // ----- Render: tables grid -----
  function renderTables() {
    dom.tablesGrid.innerHTML = '';
    for (const t of Core.TABLES) {
      const canAfford = State.balance >= t.minBuyIn;
      const card = document.createElement('button');
      card.className = 'table-card';
      card.disabled = !canAfford;
      card.innerHTML = `
        <div class="tc-tier">${t.id.toUpperCase()}</div>
        <div class="tc-name">${t.name}</div>
        <div class="tc-blinds">
          <span class="tc-pill">$${t.sb} / $${t.bb}</span>
          <span class="tc-pill">NL HOLD'EM</span>
        </div>
        <div class="tc-buyin">Buy-in: <b>$${t.minBuyIn.toLocaleString()}</b> – <b>$${t.maxBuyIn.toLocaleString()}</b></div>
        <div class="tc-presence">${randInt(3,5)} PLAYERS WAITING</div>
        ${canAfford
          ? '<div class="tc-cta">SIT DOWN</div>'
          : `<div class="tc-locked">NEEDS $${t.minBuyIn.toLocaleString()}</div>`}
      `;
      card.addEventListener('click', () => {
        if (!canAfford) return;
        Audio.click();
        openBuyIn(t);
      });
      dom.tablesGrid.appendChild(card);
    }
  }
  function randInt(a, b) { return a + Math.floor(Math.random() * (b - a + 1)); }

  // ----- Buy-in modal -----
  let buyinTable = null;
  function openBuyIn(t) {
    buyinTable = t;
    const maxAvail = Math.min(t.maxBuyIn, Math.floor(State.balance));
    dom.buyinTitle.textContent = 'BUY-IN — ' + t.name.toUpperCase();
    dom.buyinSlider.min = t.minBuyIn;
    dom.buyinSlider.max = maxAvail;
    dom.buyinSlider.step = Math.max(1, Math.round(t.bb));
    const def = Math.min(maxAvail, Math.max(t.minBuyIn, t.bb * 100));
    dom.buyinSlider.value = def;
    dom.buyinAmt.textContent = '$' + fmt(def);
    dom.buyinMin.textContent = '$' + fmt(t.minBuyIn) + ' min';
    dom.buyinMax.textContent = '$' + fmt(maxAvail) + ' max';
    dom.buyinModal.classList.add('show');
  }
  dom.buyinSlider.addEventListener('input', () => {
    dom.buyinAmt.textContent = '$' + fmt(+dom.buyinSlider.value);
  });
  dom.buyinCancel.addEventListener('click', () => { Audio.click(); dom.buyinModal.classList.remove('show'); });
  dom.buyinConfirm.addEventListener('click', () => {
    Audio.click();
    const amt = +dom.buyinSlider.value;
    if (amt < buyinTable.minBuyIn || amt > State.balance) return;
    dom.buyinModal.classList.remove('show');
    sitDown(buyinTable, amt);
  });

  // ----- Bot pool (names + colors borrowed from CasinoBots if available) -----
  function pickBotPool(n) {
    const pool = [];
    if (window.CasinoBots && !window.CasinoBots.disabled) {
      const all = window.CasinoBots.bots ? window.CasinoBots.bots() : [];
      const shuffled = all.slice().sort(() => Math.random() - 0.5).slice(0, n * 3);
      for (const b of shuffled) pool.push({ name: b.name, hue: b.hue, avatarSeed: b.id });
    }
    while (pool.length < n) {
      const adj = ['Velvet','Neon','Diamond','Crimson','Midnight','Silver','Royal','Onyx','Lucky','Wild','Phantom','Golden','Frosty','Atomic'];
      const noun = ['Wolf','Spades','Phoenix','Jester','Vixen','Knight','Shark','Aces','King','Hawk','Comet','Vegas','Snake'];
      pool.push({
        name: adj[randInt(0,adj.length-1)] + noun[randInt(0,noun.length-1)] + (Math.random() < 0.5 ? randInt(2, 99) : ''),
        hue: randInt(0, 359),
        avatarSeed: Math.random().toString(36).slice(2),
      });
    }
    return pool.slice(0, n);
  }

  function avatarBg(hue) {
    return `linear-gradient(135deg, hsl(${hue}, 70%, 55%), hsl(${(hue+40)%360}, 75%, 35%))`;
  }
  function initials(name) {
    if (name === 'You') return 'ME';
    const parts = String(name || '?').replace(/[._-]/g, ' ').split(/\s+/).filter(Boolean);
    if (!parts.length) return '?';
    if (parts.length === 1) return parts[0].slice(0, 2).toUpperCase();
    return (parts[0][0] + parts[1][0]).toUpperCase();
  }

  // ----- Build players for a new sit -----
  function buildPlayers(table, heroBuyIn, botInfo) {
    // 6 seats: hero at 0, bots at 1..5 (5 bots)
    const players = new Array(6).fill(null);
    players[0] = {
      id: 'hero',
      seat: 0,
      name: 'You',
      isHero: true,
      avatar: null,
      hue: 200,
      stack: heroBuyIn,
      holeCards: [], inHand: true, hasFolded: false, isAllIn: false,
      betThisStreet: 0, totalCommitted: 0,
      needsToAct: true, actedThisHand: false,
      personality: 'BAL',
    };
    for (let s = 1; s <= 5; s++) {
      const info = botInfo[s - 1];
      const personality = Core.PERSONALITY_KEYS[Math.floor(Math.random() * Core.PERSONALITY_KEYS.length)];
      // Bots buy in between min and max (skewed to mid)
      const buyin = randInt(table.minBuyIn, Math.min(table.maxBuyIn, Math.round(table.bb * (60 + Math.random() * 140))));
      players[s] = {
        id: 'bot' + s,
        seat: s,
        name: info.name,
        isHero: false,
        avatar: null,
        hue: info.hue,
        stack: buyin,
        holeCards: [], inHand: true, hasFolded: false, isAllIn: false,
        betThisStreet: 0, totalCommitted: 0,
        needsToAct: true, actedThisHand: false,
        personality,
      };
    }
    return players;
  }

  // ----- Sit down -----
  function sitDown(table, heroBuyIn) {
    State.selectedTable = table;
    setBalance(State.balance - heroBuyIn);
    const botInfo = pickBotPool(5);
    const players = buildPlayers(table, heroBuyIn, botInfo);
    const seed = (Math.random() * 1e9) | 0;
    State.pokerState = Core.createState({ players, button: 0, sbAmt: table.sb, bbAmt: table.bb, seed });
    State.heroSeat = 0;
    State.history = [];

    dom.tableSelect.style.display = 'none';
    dom.gameScreen.classList.add('show');
    dom.btnLeave.style.display = 'inline-flex';
    dom.thName.textContent = table.name;
    dom.thStakes.textContent = `$${table.sb} / $${table.bb} NL HOLD'EM`;
    renderSeats();
    scheduleNextHand(700);
  }

  // ----- Render: seats -----
  function renderSeats() {
    dom.seatsLayer.innerHTML = '';
    if (!State.pokerState) return;
    for (let i = 0; i < State.pokerState.players.length; i++) {
      const p = State.pokerState.players[i];
      const el = document.createElement('div');
      el.className = 'seat' + (i === State.heroSeat ? ' hero' : '');
      el.dataset.seat = String(i);
      if (!p) { el.classList.add('empty'); }
      el.innerHTML = `
        <div class="seat-hole" data-hole></div>
        <div class="seat-bet empty" data-bet></div>
        <div class="seat-box">
          <div class="seat-avatar" data-avatar>${p ? initials(p.name) : '?'}</div>
          <div class="seat-name" data-name>${p ? p.name : 'Empty'}</div>
          <div class="seat-stack" data-stack>${p ? fmtChip(Math.round(p.stack)) : '—'}</div>
          <div class="seat-status" data-status></div>
        </div>
      `;
      if (p) el.querySelector('[data-avatar]').style.background = avatarBg(p.hue || 200);
      dom.seatsLayer.appendChild(el);
    }
  }
  function refreshSeats() {
    if (!State.pokerState) return;
    const now = Date.now();
    for (let i = 0; i < State.pokerState.players.length; i++) {
      const p = State.pokerState.players[i];
      const seat = dom.seatsLayer.querySelector(`.seat[data-seat="${i}"]`);
      if (!seat || !p) continue;
      seat.querySelector('[data-name]').textContent = p.name;
      seat.querySelector('[data-stack]').textContent = fmtChip(Math.round(p.stack));
      seat.classList.toggle('folded', !!p.hasFolded);
      const statusEl = seat.querySelector('[data-status]');
      // Only overwrite the action label if (a) the seat is folded
      // or all-in (durable states), or (b) the previous action label
      // has been sitting there for a while.
      const lastActionAt = +(statusEl.dataset.actAt || 0);
      const stale = !lastActionAt || now - lastActionAt > 2200;
      if (p.hasFolded) {
        statusEl.className = 'seat-status fold';
        statusEl.textContent = 'FOLD';
        statusEl.dataset.actAt = '';
      } else if (p.isAllIn && stale) {
        statusEl.className = 'seat-status allin';
        statusEl.textContent = 'ALL IN';
      } else if (stale) {
        statusEl.className = 'seat-status';
        statusEl.textContent = '';
      }
      const betEl = seat.querySelector('[data-bet]');
      if (p.betThisStreet > 0) {
        betEl.classList.remove('empty');
        betEl.textContent = fmtChip(Math.round(p.betThisStreet));
      } else {
        betEl.classList.add('empty');
        betEl.textContent = '';
      }
    }
    // Pot
    const pot = Core.totalPot(State.pokerState) - State.pokerState.players.reduce((s, p) => s + (p ? p.betThisStreet : 0), 0);
    // Show "pot collected on table" (excluding chips still on the felt as current-street bets)
    const onTableTotal = Core.totalPot(State.pokerState);
    dom.potAmount.textContent = '$' + fmt(onTableTotal);
    dom.potAmount.classList.toggle('zero', onTableTotal === 0);

    // Hero hand strength readout (only when hero has hole cards and is still in)
    updateHeroHandStrength();

    // Dealer button position
    positionDealerButton();
  }

  function updateHeroHandStrength() {
    const st = State.pokerState;
    const hero = st && st.players[State.heroSeat];
    if (!hero || hero.hasFolded || !hero.holeCards || hero.holeCards.length !== 2) {
      dom.heroHandStrength.classList.remove('show');
      dom.heroHandStrength.textContent = '';
      return;
    }
    // Pre-flop: show the hole-card shorthand like "AKs"
    if (!st.board || st.board.length === 0) {
      const r1 = Core.RANK(hero.holeCards[0]);
      const r2 = Core.RANK(hero.holeCards[1]);
      const s1 = Core.SUIT(hero.holeCards[0]);
      const s2 = Core.SUIT(hero.holeCards[1]);
      const suited = (s1 === s2);
      let tag;
      if (r1 === r2) {
        // Pocket pair: pluralize the rank name so "POCKET 1010" doesn't happen.
        const names = ['TWOS','THREES','FOURS','FIVES','SIXES','SEVENS','EIGHTS','NINES','TENS','JACKS','QUEENS','KINGS','ACES'];
        tag = 'POCKET ' + names[r1];
      } else {
        // Hi-lo with a hyphen so "109 OFFSUIT" reads as the 10 and 9 it is.
        tag = rankLabel(Math.max(r1, r2)) + '-' + rankLabel(Math.min(r1, r2))
            + (suited ? ' SUITED' : ' OFFSUIT');
      }
      dom.heroHandStrength.textContent = tag;
      dom.heroHandStrength.classList.add('show');
      return;
    }
    // Post-flop: best 5-of-7
    const v = Core.evaluate7([hero.holeCards[0], hero.holeCards[1], ...st.board]);
    dom.heroHandStrength.textContent = Core.describeHand(v).toUpperCase();
    dom.heroHandStrength.classList.add('show');
  }

  function positionDealerButton() {
    const st = State.pokerState;
    const bIdx = st.button;
    const seat = dom.seatsLayer.querySelector(`.seat[data-seat="${bIdx}"]`);
    if (!seat) { dom.dealerBtn.style.display = 'none'; return; }
    dom.dealerBtn.style.display = 'grid';
    // Position near the seat
    const fwrap = seat.parentElement.parentElement;
    const fr = fwrap.getBoundingClientRect();
    const sr = seat.getBoundingClientRect();
    // place button at the table-side edge of the seat
    const cx = (sr.left + sr.right) / 2 - fr.left;
    const cy = (sr.top + sr.bottom) / 2 - fr.top;
    // Pull the button toward the center of the table
    const tx = fr.width / 2;
    const ty = fr.height / 2;
    const dx = tx - cx, dy = ty - cy;
    const len = Math.sqrt(dx * dx + dy * dy);
    const pullDist = 56;
    const px = cx + (dx / len) * pullDist;
    const py = cy + (dy / len) * pullDist;
    dom.dealerBtn.style.left = (px - 13) + 'px';
    dom.dealerBtn.style.top = (py - 13) + 'px';
  }

  // ----- Card DOM helpers -----
  // Engine stores ranks as a single char ('2'..'9','T','J','Q','K','A') —
  // that's the standard poker shorthand we want in unit tests and the
  // describeHand strings. But when we paint a card face the player should
  // see "10", not "T". Single helper to translate just before render.
  function rankLabel(r) { return r === 8 ? '10' : Core.RANK_CHARS[r]; }

  function buildCardEl(card, opts) {
    const el = document.createElement('div');
    el.className = 'card';
    if (opts && opts.facedown) {
      el.classList.add('flip-pending');
    } else if (typeof card === 'number') {
      const r = Core.RANK(card), s = Core.SUIT(card);
      el.classList.add(Core.RED_SUITS.has(s) ? 'red' : 'black');
      const ch = rankLabel(r);
      const sg = Core.SUIT_GLYPH[s];
      el.innerHTML = `
        <div class="corner tl"><div class="r">${ch}</div><div class="s">${sg}</div></div>
        <div class="center-suit">${sg}</div>
        <div class="corner br"><div class="r">${ch}</div><div class="s">${sg}</div></div>
      `;
    }
    return el;
  }
  function paintCardFace(el, card) {
    el.classList.remove('flip-pending');
    const r = Core.RANK(card), s = Core.SUIT(card);
    el.classList.remove('red','black');
    el.classList.add(Core.RED_SUITS.has(s) ? 'red' : 'black');
    const ch = rankLabel(r);
    const sg = Core.SUIT_GLYPH[s];
    el.innerHTML = `
      <div class="corner tl"><div class="r">${ch}</div><div class="s">${sg}</div></div>
      <div class="center-suit">${sg}</div>
      <div class="corner br"><div class="r">${ch}</div><div class="s">${sg}</div></div>
    `;
  }

  // ----- Main hand loop -----
  function seatedWithChips(st) {
    let n = 0;
    for (const p of st.players) if (p && p.stack > 0) n++;
    return n;
  }

  async function scheduleNextHand(delayMs) {
    clearPendingTimers();
    await delay(delayMs);
    // Refill busted seats with new bots
    refillBustedSeats();
    if (!State.pokerState) return;
    // Hero busted?
    if (State.pokerState.players[State.heroSeat].stack <= 0) {
      offerRebuyOrLeave();
      return;
    }
    // Count players who still have chips to play the next hand. (We must NOT
    // use activeCount here — at the end of a hand everyone but the winner is
    // flagged hasFolded, so that would always read as 1 and end the table.)
    if (seatedWithChips(State.pokerState) < 2) {
      // No opponents left with chips — refill should have handled it, but
      // guard anyway by topping up the table before bailing.
      refillBustedSeats();
      if (seatedWithChips(State.pokerState) < 2) { offerRebuyOrLeave(); return; }
    }
    startNewHand();
  }

  function makeFreshBot(seat) {
    const T = State.selectedTable;
    const info = pickBotPool(1)[0];
    const buyin = randInt(T.minBuyIn, Math.min(T.maxBuyIn, Math.round(T.bb * (60 + Math.random() * 140))));
    return {
      id: 'bot' + seat + '_' + Date.now() + '_' + Math.floor(Math.random() * 1e4),
      seat,
      name: info.name, isHero: false, hue: info.hue,
      stack: buyin, holeCards: [], inHand: true, hasFolded: false, isAllIn: false,
      betThisStreet: 0, totalCommitted: 0, needsToAct: true, actedThisHand: false,
      personality: Core.PERSONALITY_KEYS[Math.floor(Math.random() * Core.PERSONALITY_KEYS.length)],
    };
  }

  // Between hands: busted bots leave, fresh bots sit down. Occasionally a
  // healthy bot also stands up (cashes out) and a new face arrives, so the
  // table feels like a living room of players coming and going.
  function refillBustedSeats() {
    if (!State.pokerState || !State.selectedTable) return;
    const st = State.pokerState;
    let changed = false;
    // Pass 1 — busted bots leave the table.
    for (let i = 0; i < st.players.length; i++) {
      const p = st.players[i];
      if (p && !p.isHero && p.stack <= 0) { st.players[i] = null; changed = true; }
    }
    // Pass 1b — a healthy bot occasionally cashes out (one per hand at most),
    // but never drop below 3 live bots so hands always have action.
    const liveBots = st.players.filter(p => p && !p.isHero && p.stack > 0).length;
    if (liveBots > 3 && Math.random() < 0.18) {
      const candidates = [];
      for (let i = 0; i < st.players.length; i++) {
        const p = st.players[i];
        if (p && !p.isHero && p.stack > 0) candidates.push(i);
      }
      if (candidates.length) {
        const leave = candidates[Math.floor(Math.random() * candidates.length)];
        st.players[leave] = null; changed = true;
      }
    }
    // Pass 2 — fill every empty (non-hero) seat with a fresh buy-in so the
    // table stays full and hands keep dealing.
    for (let i = 0; i < st.players.length; i++) {
      if (i === State.heroSeat) continue;
      if (!st.players[i]) { st.players[i] = makeFreshBot(i); changed = true; }
    }
    if (changed) renderSeats();
  }

  function offerRebuyOrLeave() {
    showBanner('Out of chips. Returning to lobby...', 'lose');
    setTimeout(() => leaveTable(), 1600);
  }

  async function startNewHand() {
    if (State.busy) return;
    State.busy = true;
    State.revealedSeats = new Set();
    State.showdownInProgress = false;
    clearPreAction();
    hidePreActionBar();
    State.handStartStack = State.pokerState.players[State.heroSeat] ? State.pokerState.players[State.heroSeat].stack : 0;
    // Clear board UI
    dom.community.innerHTML = '';
    dom.showdownToast.classList.remove('show');
    showBanner('New hand...', '');
    const ok = Core.startHand(State.pokerState);
    if (!ok) { State.busy = false; offerRebuyOrLeave(); return; }
    // Reset seat UI
    for (let i = 0; i < State.pokerState.players.length; i++) {
      const seat = dom.seatsLayer.querySelector(`.seat[data-seat="${i}"]`);
      if (!seat) continue;
      seat.querySelector('[data-hole]').innerHTML = '';
      seat.classList.remove('folded', 'acting');
      const sb = seat.querySelector('[data-bet]');
      sb.classList.add('empty'); sb.textContent = '';
    }
    refreshSeats();
    positionDealerButton();
    // Visual deal animation
    await dealHoleCardsAnimation();
    refreshSeats();
    // Begin betting loop
    State.busy = false;
    runBettingLoop();
  }

  async function dealHoleCardsAnimation() {
    const st = State.pokerState;
    const order = [];
    let idx = st.button;
    for (let step = 0; step < st.players.length; step++) {
      idx = (idx + 1) % st.players.length;
      if (st.players[idx] && st.players[idx].inHand) order.push(idx);
    }
    for (let pass = 0; pass < 2; pass++) {
      for (const i of order) {
        const seat = dom.seatsLayer.querySelector(`.seat[data-seat="${i}"]`);
        if (!seat) continue;
        const hole = seat.querySelector('[data-hole]');
        const p = st.players[i];
        const card = p.holeCards[pass];
        const isHero = (i === State.heroSeat);
        const el = buildCardEl(card, { facedown: !isHero });
        el.classList.add('dealing');
        hole.appendChild(el);
        Audio.deal();
        await delay(90);
      }
    }
    await delay(140);
  }

  async function runBettingLoop() {
    while (true) {
      // The user can leave the table mid-loop; bail cleanly.
      const st = State.pokerState;
      if (!st) return;
      // Only one player left → no further action this hand.
      if (Core.activeCount(st) <= 1) {
        await finishHandFoldout();
        return;
      }
      // Everyone remaining is all-in or has acted — close the street.
      const stillActing = st.players.filter(p => p && p.inHand && !p.hasFolded && !p.isAllIn);
      if (stillActing.length === 0 || Core.roundComplete(st)) {
        await endOfStreet();
        if (!State.pokerState) return;
        if (st.street === 'showdown') { await finishHandShowdown(); return; }
        continue;
      }
      const i = st.toActIdx;
      // Defensive: if toActIdx is invalid for any reason, force a round-end
      // pass rather than risk an infinite spin reading players[-1].
      if (i < 0 || i >= st.players.length) { await endOfStreet(); if (!State.pokerState) return; continue; }
      const p = st.players[i];
      if (!p || !p.inHand || p.hasFolded || p.isAllIn) {
        st.toActIdx = Core.nextActiveSeat(st, i);
        if (st.toActIdx < 0) { await endOfStreet(); if (!State.pokerState) return; }
        continue;
      }
      markActing(i);
      if (p.isHero) {
        await heroTurn(p);
      } else {
        // While a bot acts, let the hero arm a pre-action (Check / Call etc).
        renderPreActionBar();
        await botTurn(p, i);
      }
      if (!State.pokerState) return;
      unmarkActing(i);
      refreshSeats();
      // The bot may have raised — reconcile any armed pre-action.
      renderPreActionBar();
      await delay(120);
    }
  }

  function markActing(i) {
    for (const el of dom.seatsLayer.querySelectorAll('.seat')) el.classList.remove('acting');
    const seat = dom.seatsLayer.querySelector(`.seat[data-seat="${i}"]`);
    if (seat) seat.classList.add('acting');
  }
  function unmarkActing(i) {
    const seat = dom.seatsLayer.querySelector(`.seat[data-seat="${i}"]`);
    if (seat) seat.classList.remove('acting');
  }

  async function endOfStreet() {
    refreshSeats();
    await delay(420);
    // Collect bets to pot (visual: hide seat-bets; pot already includes them).
    // Also clear per-seat action labels so they don't bleed into the next street.
    for (let i = 0; i < State.pokerState.players.length; i++) {
      const seat = dom.seatsLayer.querySelector(`.seat[data-seat="${i}"]`);
      if (!seat) continue;
      const sb = seat.querySelector('[data-bet]');
      sb.classList.add('empty'); sb.textContent = '';
      const statusEl = seat.querySelector('[data-status]');
      const p = State.pokerState.players[i];
      if (statusEl && p && !p.hasFolded) {
        statusEl.dataset.actAt = '';
        if (!p.isAllIn) { statusEl.className = 'seat-status'; statusEl.textContent = ''; }
      }
    }
    const stBefore = State.pokerState.street;
    if (stBefore === 'preflop') {
      Core.advanceStreet(State.pokerState);
      await revealFlop();
    } else if (stBefore === 'flop') {
      Core.advanceStreet(State.pokerState);
      await revealTurnOrRiver();
    } else if (stBefore === 'turn') {
      Core.advanceStreet(State.pokerState);
      await revealTurnOrRiver();
    } else if (stBefore === 'river') {
      // moves to showdown
      Core.advanceStreet(State.pokerState);
    }
    refreshSeats();
  }

  async function revealFlop() {
    const board = State.pokerState.board;
    for (let k = 0; k < 3; k++) {
      const el = buildCardEl(board[k]);
      el.classList.add('dealing');
      dom.community.appendChild(el);
      Audio.flip();
      await delay(180);
    }
    await delay(180);
  }
  async function revealTurnOrRiver() {
    const board = State.pokerState.board;
    const k = board.length - 1;
    const el = buildCardEl(board[k]);
    el.classList.add('dealing');
    dom.community.appendChild(el);
    Audio.flip();
    await delay(220);
  }

  // ----- Hero turn (UI prompt) -----
  let heroResolve = null;
  function heroTurn(p) {
    // If a valid pre-action is armed, fire it immediately and skip the prompt.
    const pre = resolveArmedAction(p);
    if (pre) {
      clearPreAction();
      hidePreActionBar();
      State._autoFireCount = (State._autoFireCount || 0) + 1;
      return (async () => {
        await delay(260); // brief beat so the auto-action reads naturally
        if (!State.pokerState || State.pokerState.players[State.heroSeat] !== p) return;
        applyHeroAction(pre, p);
      })();
    }
    return new Promise(res => {
      heroResolve = res;
      clearPreAction();
      hidePreActionBar();
      updateActionBarForHero(p);
      startActionTimer(p);
    });
  }
  // Apply an action when it's genuinely the hero's turn (used by both the
  // manual buttons and the auto pre-action path).
  function applyHeroAction(action, p) {
    const hero = p || (State.pokerState && State.pokerState.players[State.heroSeat]);
    const beforeBet = hero ? hero.betThisStreet : 0;
    try {
      Core.applyAction(State.pokerState, action);
    } catch (e) { console.error('applyAction error', e); }
    playActionSound(action);
    if (hero) showActionOnSeat(State.heroSeat, action, hero.betThisStreet - beforeBet);
    if (heroResolve) { const r = heroResolve; heroResolve = null; r(); }
  }
  function endHeroTurn(action) {
    if (!heroResolve) return;
    cancelActionTimer();
    disableActionBar();
    applyHeroAction(action);
  }

  // ----- Zynga-style pre-action engine -----
  // Decide whether an armed pre-action can fire on the hero's actual turn.
  // Returns a concrete action object, or null if it should fall through to
  // the manual prompt (e.g. a CALL armed against a price that has since
  // been raised — the player must re-confirm).
  function resolveArmedAction(p) {
    const pa = State.preAction;
    if (!pa) return null;
    const la = Core.legalActions(State.pokerState, p);
    switch (pa.type) {
      case 'fold':
        return { type: 'fold' };
      case 'checkfold':
        return la.canCheck ? { type: 'check' } : { type: 'fold' };
      case 'callany':
        return la.canCheck ? { type: 'check' } : { type: 'call' };
      case 'check':
        // Only fires if checking is still free; a bet appeared → re-confirm.
        return la.canCheck ? { type: 'check' } : null;
      case 'call':
        // Fires only if the price is unchanged. Free now → just check.
        if (la.canCheck) return { type: 'check' };
        if (la.canCall && la.toCall === pa.amount) return { type: 'call' };
        return null; // price moved → drop arm, prompt manually
      default:
        return null;
    }
  }

  function clearPreAction() {
    State.preAction = null;
    for (const b of dom.preactionBar.querySelectorAll('.preact')) b.classList.remove('armed');
  }
  function hidePreActionBar() { dom.preactionBar.classList.remove('show'); }

  // Show/refresh the pre-action toggles. Called whenever the betting state
  // changes while it's NOT the hero's turn. Reconciles any armed selection
  // that the latest raise has invalidated.
  function renderPreActionBar() {
    const st = State.pokerState;
    const hero = st && st.players[State.heroSeat];
    // Only meaningful when a hand is live, hero is still in it, and it's
    // not currently the hero's turn (their own turn uses the real buttons).
    if (!st || !hero || hero.hasFolded || hero.isAllIn || !hero.inHand ||
        st.street === 'showdown' || st.toActIdx === State.heroSeat) {
      hidePreActionBar();
      return;
    }
    const la = Core.legalActions(st, hero);
    const facingBet = !la.canCheck && la.toCall > 0;

    // Reconcile the armed action against the new price.
    const pa = State.preAction;
    if (pa) {
      if (pa.type === 'check' && facingBet) clearPreAction();
      else if (pa.type === 'call' && (!facingBet || la.toCall !== pa.amount)) clearPreAction();
    }

    const byType = {};
    for (const b of dom.preactionBar.querySelectorAll('.preact')) byType[b.dataset.pa] = b;

    // Which toggles make sense right now:
    //  - not facing a bet: CHECK, CHECK/FOLD
    //  - facing a bet:      FOLD, CALL $X, CALL ANY
    const show = facingBet
      ? { fold: true, call: true, callany: true, check: false, checkfold: false }
      : { fold: false, call: false, callany: false, check: true, checkfold: true };
    for (const t of Object.keys(byType)) byType[t].hidden = !show[t];
    if (show.call) dom.paCallAmt.textContent = '$' + fmt(la.toCall);

    // Reflect armed state on the buttons.
    for (const b of dom.preactionBar.querySelectorAll('.preact')) {
      b.classList.toggle('armed', !!State.preAction && State.preAction.type === b.dataset.pa);
    }
    dom.preactionBar.classList.add('show');
  }

  function armPreAction(type) {
    const st = State.pokerState;
    const hero = st && st.players[State.heroSeat];
    if (!hero) return;
    // Toggle off if re-clicking the armed one.
    if (State.preAction && State.preAction.type === type) { clearPreAction(); renderPreActionBar(); return; }
    const la = Core.legalActions(st, hero);
    const amount = (type === 'call') ? la.toCall : undefined;
    State.preAction = { type, amount };
    renderPreActionBar();
    Audio.click();
  }

  for (const b of document.querySelectorAll('.preact')) {
    b.addEventListener('click', () => armPreAction(b.dataset.pa));
  }
  function playActionSound(action) {
    switch (action.type) {
      case 'fold': Audio.fold(); break;
      case 'check': Audio.check(); break;
      case 'call': Audio.chip(); break;
      case 'bet': Audio.bet(); break;
      case 'raise': Audio.raise(); break;
      case 'allin': Audio.allin(); break;
    }
  }

  function showActionOnSeat(seatIdx, action, paidAmount) {
    const seat = dom.seatsLayer.querySelector(`.seat[data-seat="${seatIdx}"]`);
    if (!seat) return;
    const statusEl = seat.querySelector('[data-status]');
    statusEl.className = 'seat-status';
    let cls = '', label = '';
    switch (action.type) {
      case 'fold':   cls = 'fold';  label = 'FOLD'; break;
      case 'check':  cls = 'check'; label = 'CHECK'; break;
      case 'call':   cls = 'call';  label = 'CALL ' + (paidAmount != null ? '$' + fmt(paidAmount) : ''); break;
      case 'bet':    cls = 'bet';   label = 'BET ' + (action.amount != null ? '$' + fmt(action.amount) : ''); break;
      case 'raise':  cls = 'raise'; label = 'RAISE ' + (action.amount != null ? '$' + fmt(action.amount) : ''); break;
      case 'allin':  cls = 'allin'; label = 'ALL-IN'; break;
    }
    statusEl.classList.add(cls);
    statusEl.textContent = label.trim();
    statusEl.dataset.actAt = String(Date.now());

    // Per-action signifiers — a check knocks the seat (universal poker
    // gesture); chip actions fly a chip from the seat into the bet badge
    // so the player can see chips actually moving when bots act.
    if (action.type === 'check') {
      seat.classList.remove('knock');
      void seat.offsetWidth;
      seat.classList.add('knock');
      setTimeout(() => seat.classList.remove('knock'), 460);
    } else if (paidAmount > 0 || action.type === 'allin') {
      flyChipToSeatBet(seatIdx);
    }
  }

  // Fire a small chip from the seat's avatar to its bet badge. Quick
  // feedback that the bot really moved chips into the pot.
  function flyChipToSeatBet(seatIdx) {
    const seat = dom.seatsLayer.querySelector(`.seat[data-seat="${seatIdx}"]`);
    if (!seat) return;
    const av = seat.querySelector('[data-avatar]');
    const bet = seat.querySelector('[data-bet]');
    if (!av || !bet) return;
    // Compute travel vector in viewport coords.
    const ar = av.getBoundingClientRect();
    const br = bet.getBoundingClientRect();
    const fly = document.createElement('div');
    fly.className = 'flying-chip ' + chipClassFor(1);
    fly.style.left = (ar.left + ar.width/2 - 16) + 'px';
    fly.style.top  = (ar.top  + ar.height/2 - 16) + 'px';
    fly.style.transform = 'translate(0,0) scale(0.5)';
    document.body.appendChild(fly);
    const dx = (br.left + br.width/2)  - (ar.left + ar.width/2);
    const dy = (br.top  + br.height/2) - (ar.top  + ar.height/2);
    requestAnimationFrame(() => {
      fly.style.transform = `translate(${dx}px, ${dy}px) scale(0.7)`;
    });
    setTimeout(() => fly.style.opacity = '0', 420);
    setTimeout(() => fly.remove(), 800);
  }

  function updateActionBarForHero(p) {
    const la = Core.legalActions(State.pokerState, p);
    dom.actionBar.classList.remove('disabled');
    dom.btnFold.disabled = false;
    dom.btnCheck.textContent = la.canCheck ? 'CHECK' : ('CALL $' + fmt(la.callAmount));
    dom.btnCheck.disabled = !la.canCheck && !la.canCall;
    dom.btnCheck.classList.toggle('cool', !la.canCheck && la.canCall);
    if (la.canBet || la.canRaise) {
      dom.btnRaise.textContent = la.canBet ? 'BET' : 'RAISE';
      dom.btnRaise.disabled = false;
      const min = la.minRaiseTo;
      const max = la.maxRaiseTo;
      dom.betSlider.min = Math.max(0, min);
      dom.betSlider.max = max;
      dom.betSlider.step = Math.max(1, Math.round(State.selectedTable.bb / 2));
      // Default to the MINIMUM legal raise (clamped to all-in if min > max),
      // not half-pot — half-pot was rounding up to maxRaiseTo on small
      // stacks and silently turning a casual "BET" click into an all-in.
      const def = Math.min(max, min);
      dom.betSlider.value = def;
      dom.betAmt.textContent = '$' + fmt(def);
      dom.betSliderRow.style.display = 'flex';
      dom.btnAllin.disabled = false;
      for (const b of document.querySelectorAll('.bet-quick')) b.disabled = false;
    } else {
      dom.btnRaise.disabled = true;
      dom.betSliderRow.style.display = 'none';
      dom.btnAllin.disabled = true;
      for (const b of document.querySelectorAll('.bet-quick')) b.disabled = true;
    }
  }
  function disableActionBar() {
    dom.actionBar.classList.add('disabled');
    dom.btnFold.disabled = true;
    dom.btnCheck.disabled = true;
    dom.btnRaise.disabled = true;
    dom.btnAllin.disabled = true;
    for (const b of document.querySelectorAll('.bet-quick')) b.disabled = true;
  }

  function startActionTimer(p) {
    // After 18s of inactivity, fold or check
    cancelActionTimer();
    State.actionTimerHandle = setTimeout(() => {
      if (!heroResolve || !State.pokerState) return;
      const la = Core.legalActions(State.pokerState, p);
      if (la.canCheck) endHeroTurn({ type: 'check' });
      else endHeroTurn({ type: 'fold' });
    }, 18000);
  }
  function cancelActionTimer() {
    if (State.actionTimerHandle) clearTimeout(State.actionTimerHandle);
    State.actionTimerHandle = null;
  }

  // Hero action button handlers — every handler guards against a null
  // pokerState in case the user already left the table.
  dom.btnFold.addEventListener('click', () => {
    if (!State.pokerState || !heroResolve) return;
    endHeroTurn({ type: 'fold' });
  });
  dom.btnCheck.addEventListener('click', () => {
    if (!State.pokerState || !heroResolve) return;
    const p = State.pokerState.players[State.heroSeat];
    const la = Core.legalActions(State.pokerState, p);
    if (la.canCheck) endHeroTurn({ type: 'check' });
    else endHeroTurn({ type: 'call' });
  });
  dom.btnRaise.addEventListener('click', () => {
    if (!State.pokerState || !heroResolve) return;
    const p = State.pokerState.players[State.heroSeat];
    const la = Core.legalActions(State.pokerState, p);
    let amt = +dom.betSlider.value;
    if (amt >= la.maxRaiseTo) endHeroTurn({ type: 'allin' });
    else endHeroTurn({ type: la.canBet ? 'bet' : 'raise', amount: amt });
  });
  dom.btnAllin.addEventListener('click', () => {
    if (!State.pokerState || !heroResolve) return;
    endHeroTurn({ type: 'allin' });
  });
  dom.betSlider.addEventListener('input', () => { dom.betAmt.textContent = '$' + fmt(+dom.betSlider.value); });

  // Bet quick buttons
  for (const b of document.querySelectorAll('.bet-quick')) {
    b.addEventListener('click', () => {
      if (b.id === 'btn-allin') return;
      const p = State.pokerState.players[State.heroSeat];
      const la = Core.legalActions(State.pokerState, p);
      const pct = parseFloat(b.dataset.pct);
      const pot = Core.totalPot(State.pokerState);
      let target;
      if (pct === -2) target = la.minRaiseTo;
      else if (pct === 2) target = la.toCall ? la.toCall * 3 + p.betThisStreet : Math.round(pot * 2);
      else target = la.canBet ? Math.round(pot * pct) : (State.pokerState.currentBet + Math.round(pot * pct));
      target = Math.max(la.minRaiseTo, Math.min(la.maxRaiseTo, target));
      dom.betSlider.value = target;
      dom.betAmt.textContent = '$' + fmt(target);
    });
  }

  // ----- Bot turn -----
  async function botTurn(p, i) {
    disableActionBar();
    // Pace bot thinking. When the hero is still in the hand we linger a beat
    // so the action reads; once the hero has folded (or is all-in) there's
    // nothing for them to decide, so we speed the table up considerably.
    const hero = State.pokerState.players[State.heroSeat];
    const heroWatching = hero && (hero.hasFolded || hero.isAllIn || !hero.inHand);
    const thinkMs = heroWatching ? (110 + Math.random() * 130)
                                 : (240 + Math.random() * 340);
    await delay(thinkMs);
    // If the user left the table during the think, bail before touching state.
    if (!State.pokerState || State.pokerState.players[i] !== p) return;
    const action = Core.decideBot(State.pokerState, i);
    const beforeBet = p.betThisStreet;
    Core.applyAction(State.pokerState, action);
    playActionSound(action);
    const paid = p.betThisStreet - beforeBet;
    showActionOnSeat(i, action, paid);
    refreshSeats();
    await delay(heroWatching ? 130 : 230);
  }

  // ----- Fold-out resolution -----
  async function finishHandFoldout() {
    clearPreAction();
    hidePreActionBar();
    const st = State.pokerState;
    const summary = Core.resolveFoldOut(st);
    refreshSeats();
    const winnerId = summary[0].winnerId;
    const winnerSeat = st.players.findIndex(p => p && p.id === winnerId);
    if (winnerSeat >= 0) flashWinAtSeat(winnerSeat, summary[0].amount, 'Wins pot — uncontested');
    await delay(1400);
    cleanupAfterHand();
  }

  // ----- Showdown resolution -----
  async function finishHandShowdown() {
    if (State.showdownInProgress) return;
    State.showdownInProgress = true;
    clearPreAction();
    hidePreActionBar();
    const st = State.pokerState;
    // Reveal all hole cards in order from last aggressor or button
    const seatsToReveal = [];
    for (let i = 0; i < st.players.length; i++) {
      const p = st.players[i];
      if (p && p.inHand && !p.hasFolded) seatsToReveal.push(i);
    }
    for (const i of seatsToReveal) {
      if (i === State.heroSeat) continue; // hero already shown
      await flipHoleAtSeat(i);
      await delay(280);
    }
    const summary = Core.resolveShowdown(st);
    refreshSeats();
    // Display each winning hand description + flash chips
    const winningSeats = new Set();
    let biggestWin = 0;
    for (const w of summary) {
      const i = st.players.findIndex(p => p && p.id === w.winnerId);
      if (i < 0) continue;
      winningSeats.add(i);
      flashWinAtSeat(i, w.amount, Core.describeHand(w.value));
      biggestWin = Math.max(biggestWin, w.amount);
    }
    // Glow winning hole cards
    for (const i of winningSeats) {
      const seat = dom.seatsLayer.querySelector(`.seat[data-seat="${i}"]`);
      if (!seat) continue;
      seat.querySelectorAll('.card').forEach(c => c.classList.add('winning'));
    }
    // Big hero win shower
    if (winningSeats.has(State.heroSeat) && biggestWin >= State.pokerState.bbAmt * 20) {
      coinShower();
      Audio.bigwin();
    }
    await delay(1900);
    cleanupAfterHand();
  }

  async function flipHoleAtSeat(seatIdx) {
    const seat = dom.seatsLayer.querySelector(`.seat[data-seat="${seatIdx}"]`);
    if (!seat) return;
    const p = State.pokerState.players[seatIdx];
    if (!p) return;
    const cards = seat.querySelectorAll('[data-hole] .card');
    for (let k = 0; k < cards.length; k++) {
      const cardEl = cards[k];
      cardEl.classList.add('flipping');
      setTimeout(() => paintCardFace(cardEl, p.holeCards[k]), 270);
    }
    Audio.flip();
    await delay(560);
  }

  function flashWinAtSeat(seatIdx, amount, label) {
    const seat = dom.seatsLayer.querySelector(`.seat[data-seat="${seatIdx}"]`);
    if (!seat) return;
    const status = seat.querySelector('[data-status]');
    status.className = 'seat-status win';
    status.textContent = 'WINS $' + fmt(amount);
    // Show showdown toast with hand description
    if (label) {
      dom.showdownToast.textContent = label + ' — ' + State.pokerState.players[seatIdx].name;
      dom.showdownToast.classList.add('show');
      Audio.win();
      flyChipsFromPot(seatIdx, amount);
    }
  }

  function flyChipsFromPot(seatIdx, amount) {
    const seat = dom.seatsLayer.querySelector(`.seat[data-seat="${seatIdx}"]`);
    if (!seat) return;
    const potEl = dom.potAmount;
    const sr = potEl.getBoundingClientRect();
    const tr = seat.getBoundingClientRect();
    const sx = sr.left + sr.width/2 - 16;
    const sy = sr.top + sr.height/2 - 16;
    const tx = tr.left + tr.width/2 - 16;
    const ty = tr.top + tr.height/2 - 16;
    const cls = chipClassFor(amount);
    const count = Math.min(8, Math.max(3, Math.floor(Math.log2(amount + 2))));
    for (let k = 0; k < count; k++) {
      setTimeout(() => {
        const c = document.createElement('div');
        c.className = 'flying-chip ' + cls;
        c.style.left = sx + 'px';
        c.style.top = sy + 'px';
        c.style.transform = 'translate(0,0) scale(0.6)';
        document.body.appendChild(c);
        requestAnimationFrame(() => {
          c.style.transform = `translate(${tx - sx}px, ${ty - sy}px) scale(0.7) rotate(${Math.random() * 180 - 90}deg)`;
        });
        setTimeout(() => c.style.opacity = '0', 480);
        setTimeout(() => c.remove(), 900);
      }, k * 50);
    }
  }
  function chipClassFor(amount) {
    if (amount >= 5000) return 'c-1k';
    if (amount >= 1000) return 'c-500';
    if (amount >= 250) return 'c-100';
    if (amount >= 50) return 'c-25';
    if (amount >= 10) return 'c-5';
    return 'c-1';
  }

  function coinShower() {
    const cx = window.innerWidth / 2;
    const cy = window.innerHeight / 2;
    const count = window.matchMedia('(pointer: coarse)').matches ? 18 : 30;
    for (let i = 0; i < count; i++) {
      const c = document.createElement('div');
      c.className = 'coin';
      const angle = Math.random() * Math.PI - Math.PI / 2;
      const dist = 200 + Math.random() * 280;
      c.style.setProperty('--tx', Math.cos(angle) * dist + (Math.random() - 0.5) * 200 + 'px');
      c.style.setProperty('--ty', -Math.abs(Math.sin(angle)) * dist + 700 + 'px');
      c.style.left = cx + 'px';
      c.style.top = cy + 'px';
      c.style.animationDuration = (1.3 + Math.random() * 0.6) + 's';
      dom.particles.appendChild(c);
      setTimeout(() => c.remove(), 2200);
    }
  }

  // ----- Cleanup + History + next hand -----
  function cleanupAfterHand() {
    const st = State.pokerState;
    if (!st) return; // user already left the table
    const hero = st.players[State.heroSeat];
    if (hero) {
      const delta = hero.stack - State.handStartStack;
      State.history.unshift({
        handNo: st.handNo,
        delta,
        desc: deltaDescription(delta),
      });
      if (State.history.length > 50) State.history.length = 50;
      // XP + jackpot contribution. The engine zeros totalCommitted on the
      // next startHand, so read it now while it still reflects the chips
      // hero put in this hand. Gross win = net delta + chips put in.
      if (window.History && window.History.record) {
        const bet = Math.max(0, Math.round(hero.totalCommitted || 0));
        const win = delta > 0 ? Math.round(delta + bet) : 0;
        try { window.History.record('poker', bet, win, 'poker hand'); } catch(e){}
      }
      // History.record may have triggered a level-up that credited chips
      // straight to localStorage; re-sync so leaveTable's setBalance(...+stack)
      // doesn't overwrite that reward with our stale State.balance.
      State.balance = loadBalance(); paintBalance();
    }
    refreshSeats();
    scheduleNextHand(1200);
  }

  function deltaDescription(d) {
    if (d > 0) return 'Won pot · +$' + fmt(d);
    if (d < 0) return 'Lost · -$' + fmt(-d);
    return 'Folded — no chips lost';
  }

  function showBanner(text, cls) {
    dom.msgBanner.textContent = text;
    dom.msgBanner.className = 'message-banner' + (cls ? ' ' + cls : '');
  }

  // ----- Leave table -----
  dom.btnLeave.addEventListener('click', () => {
    if (!confirm('Leave the table? Your remaining chips will return to your balance.')) return;
    leaveTable();
  });
  function leaveTable() {
    clearPendingTimers();
    const hero = State.pokerState && State.pokerState.players[State.heroSeat];
    if (hero) setBalance(State.balance + Math.max(0, hero.stack));
    State.pokerState = null;
    State.selectedTable = null;
    dom.gameScreen.classList.remove('show');
    dom.tableSelect.style.display = '';
    dom.btnLeave.style.display = 'none';
    renderTables();
  }

  // ----- History modal -----
  dom.btnHistory.addEventListener('click', () => {
    Audio.click();
    dom.historyList.innerHTML = '';
    if (!State.history.length) {
      dom.historyList.innerHTML = '<div class="history-empty">No hands yet.</div>';
    } else {
      for (const row of State.history) {
        const div = document.createElement('div');
        div.className = 'row';
        const cls = row.delta > 0 ? 'win' : row.delta < 0 ? 'lose' : '';
        div.innerHTML = `<div class="h-no">#${row.handNo}</div><div class="h-desc">${row.desc}</div><div class="h-net ${cls}">${row.delta > 0 ? '+' : ''}${fmt(row.delta)}</div>`;
        dom.historyList.appendChild(div);
      }
    }
    dom.historyModal.classList.add('show');
  });
  dom.historyClose.addEventListener('click', () => {
    Audio.click();
    dom.historyModal.classList.remove('show');
  });

  // ----- Add funds modal -----
  dom.balAdd.addEventListener('click', e => { e.preventDefault(); e.stopPropagation(); Audio.click(); dom.addfundsModal.classList.add('show'); });
  dom.addfundsCancel.addEventListener('click', () => { Audio.click(); dom.addfundsModal.classList.remove('show'); });
  dom.addfundsConfirm.addEventListener('click', () => {
    Audio.click();
    const v = Math.max(0, Math.round(parseFloat(dom.addfundsInput.value) || 0));
    if (v > 0) setBalance(State.balance + v);
    dom.addfundsModal.classList.remove('show');
    renderTables();
  });
  for (const b of document.querySelectorAll('.quick-chip')) {
    b.addEventListener('click', () => {
      const amt = +b.dataset.amt;
      setBalance(State.balance + amt);
      renderTables();
      Audio.chip();
      dom.addfundsModal.classList.remove('show');
    });
  }

  // ----- Init -----
  renderTables();
  // jackpot listener
  document.addEventListener('jackpot-win', e => {
    const d = e.detail || {};
    showBanner('JACKPOT WIN — ' + (d.kind || '') + ' $' + fmt(d.amount || 0), 'win');
    Audio.bigwin();
    coinShower();
  });
  // level up
  document.addEventListener('level-up', e => {
    const d = e.detail || {};
    showBanner('LEVEL UP — Level ' + d.newLevel + ' · +$' + fmt(d.reward), 'win');
    coinShower();
    refreshBalanceFromStorage();   // pick up the level-up chip reward
  });

  window.addEventListener('resize', () => {
    if (State.pokerState) positionDealerButton();
  });

  // Lightweight read-only hooks for automated tests (no behaviour impact).
  window.PokerDebug = {
    handNo: () => State.pokerState ? State.pokerState.handNo : -1,
    street: () => State.pokerState ? State.pokerState.street : null,
    toAct: () => State.pokerState ? State.pokerState.toActIdx : -1,
    heroStack: () => State.pokerState && State.pokerState.players[State.heroSeat]
      ? State.pokerState.players[State.heroSeat].stack : -1,
    busy: () => State.busy,
    inGame: () => !!State.pokerState,
    autoFireCount: () => State._autoFireCount || 0,
    armedType: () => State.preAction ? State.preAction.type : null,
  };

})();
</script>
</body>
</html>
