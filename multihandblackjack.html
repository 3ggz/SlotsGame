  // 3. Pay winners + pushes (left to right). Balance updates as chips fly.
  const winners = results.filter(r => r.kind !== 'lose');
  for (const r of winners) {
    const circle = circleForHand(r.i);
    paintHandBadge(r.i, r.kind);
    setBalance(State.balance + r.payout);
    showCircleResult(circle, r.kind, r.kind === 'push' ? 0 : r.net);
    if (r.kind === 'push') {
      Audio.push();
    } else {
      payWinChips(circle, r.payout);
      Audio.chipPayout();
    }
    await sleep(360);
  }

  // 4. Macro banner + headline sound.
  let totalWon = 0, totalLost = 0;
  let wins = 0, losses = 0, pushes = 0, blackjacks = 0;
  for (const r of results) {
    if (r.kind === 'bj')   { blackjacks++; totalWon += r.net; }
    else if (r.kind === 'win')  { wins++;  totalWon += r.net; }
    else if (r.kind === 'lose') { losses++; totalLost += r.bet; }
    else                        { pushes++; }
  }
  const net = totalWon - totalLost;
  let banner = '', cls = 'push';
  if (blackjacks && !losses && !pushes && !wins) {
    banner = `BLACKJACK · +$${fmt(totalWon)}`; cls = 'bj';
    Audio.bj(); spawnCoinShower();
  } else if (dealerBJ) {
    banner = pushes ? `DEALER BJ · ${pushes} PUSH` : 'DEALER BLACKJACK';
    cls = pushes && !losses ? 'push' : 'lose';
  } else if (dealerBusted && wins + blackjacks > 0) {
    banner = `DEALER BUSTS · +$${fmt(totalWon)}`; cls = 'win';
    Audio.bigWin(); spawnCoinShower();
  } else if (wins + blackjacks > 0 && losses === 0 && pushes === 0) {
    banner = `WIN +$${fmt(totalWon)}`; cls = 'win'; Audio.win();
  } else if (losses > 0 && wins + blackjacks === 0 && pushes === 0) {
    banner = `DEALER WINS · ${dealerTotal}`; cls = 'lose'; Audio.lose();
  } else if (pushes > 0 && wins + blackjacks === 0 && losses === 0) {
    banner = `PUSH · ${dealerTotal}`; cls = 'push'; Audio.push();
  } else {
    const parts = [];
    if (wins + blackjacks) parts.push(`${wins + blackjacks}W`);
    if (losses) parts.push(`${losses}L`);
    if (pushes) parts.push(`${pushes}P`);
    banner = `${parts.join(' · ')}  ${net >= 0 ? '+' : '-'}$${fmt(Math.abs(net))}`;
    cls = net > 0 ? 'win' : (net < 0 ? 'lose' : 'push');
    if (net > 0) Audio.win();
    else if (net < 0) Audio.lose();
    else Audio.push();
  }
  setMessage(banner, cls);
  finishRound();
}

function finishRound() {
  State.phase = 'RESOLVED';
  // Record this hand's result in shared history. Net = balance delta vs.
  // the snapshot taken at deal time (which captured pre-bet balance).
  if (window.History && State.handStartBal != null) {
    const net = State.balance - State.handStartBal;
    let note = State.handNote || '';
    if (!note) {
      // Derive a label from the message banner so the history shows what happened
      const msg = (document.getElementById('message')?.textContent || '').toUpperCase();
      if (msg.includes('BLACKJACK')) note = 'BLACKJACK';
      else if (msg.includes('BUST')) note = 'BUST';
      else if (msg.includes('PUSH')) note = 'PUSH';
      else if (msg.includes('WIN')) note = 'WIN';
      else if (msg.includes('DEALER')) note = 'DEALER WIN';
      else if (msg.includes('SPLIT')) note = 'SPLIT';
    }
    History.record('multihandblackjack', State.handTotalWagered || 0, net, note || null);
  }
  updateActionButtons();
  refreshBets();
  // NOTE: don't re-render the player area here — it would wipe the per-hand
  // result badges that resolveAllHands just placed. Instead, just drop the
  // active-hand highlight from whichever hand-box currently has it.
  document.querySelectorAll('.hand-box.active').forEach(b => b.classList.remove('active'));
  refreshPlayerTotal();
}

function newHand() {
  State.bets = { mains: [0, 0, 0] };
  State.dealer = { cards: [], holeRevealed: false };
  State.hands = [];
  State.activeHandIdx = 0;
  State.insurance = 0;
  State.phase = 'BETTING';
  clearAllCircleResults();
  hideInsurance();
  renderDealer();
  renderPlayer();
  refreshBets();
  setMessage('PLACE YOUR BET');
  updateActionButtons();
}

function restoreLastBets(multiplier = 1) {
  const target = State.lastBets.mains.map(v => v * multiplier);
  const total = target.reduce((s, v) => s + v, 0);
  if (total === 0) return false;
  if (State.balance < total) return false;
  setBalance(State.balance - total);
  State.bets = { mains: target };
  refreshBets();
  updateActionButtons();
  Audio.chip();
  return true;
}

function rebetOnly() {
  if (State.phase !== 'RESOLVED') return;
  newHand();
  restoreLastBets(1);
}

function rebetAndDeal() {
  if (State.phase !== 'RESOLVED') return;
  newHand();
  if (restoreLastBets(1)) dealHand();
}

function rebet2xAndDeal() {
  if (State.phase !== 'RESOLVED') return;
  newHand();
  if (restoreLastBets(2)) dealHand();
}

/* ============================================================
   PARTICLES
   ============================================================ */
function spawnConfettiAt(targetEl) {
  const r = targetEl.getBoundingClientRect();
  const cx = r.left + r.width/2;
  const cy = r.top + r.height/2;
  const layer = document.getElementById('particles');
  const colors = ['#ff2e93','#22d3ee','#a855f7','#ffd24a','#5cffa1','#ffffff'];
  for (let i = 0; i < 20; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.left = cx + 'px';
    p.style.top = cy + 'px';
    p.style.background = colors[Math.floor(Math.random()*colors.length)];
    const angle = Math.random() * Math.PI * 2;
    const dist = 60 + Math.random() * 180;
    p.style.setProperty('--tx', Math.cos(angle) * dist + 'px');
    p.style.setProperty('--ty', Math.sin(angle) * dist + 240 + 'px');
    p.style.setProperty('--tr', (Math.random()*720-360) + 'deg');
    p.style.animationDuration = (1.4 + Math.random()*0.8) + 's';
    layer.appendChild(p);
    setTimeout(() => p.remove(), 2400);
  }
}

function spawnCoinShower() {
  const layer = document.getElementById('particles');
  const cx = window.innerWidth / 2;
  const cy = window.innerHeight / 2;
  for (let i = 0; i < 30; i++) {
    const c = document.createElement('div');
    c.className = 'coin';
    c.style.left = cx + 'px';
    c.style.top = cy + 'px';
    const angle = Math.random() * Math.PI - Math.PI/2;
    const dist = 200 + Math.random() * 280;
    c.style.setProperty('--tx', Math.cos(angle) * dist + (Math.random()-0.5)*180 + 'px');
    c.style.setProperty('--ty', -Math.abs(Math.sin(angle)) * dist + 600 + 'px');
    c.style.animationDuration = (1.3 + Math.random()*0.6) + 's';
    setTimeout(() => Audio.coin(), i * 35);
    layer.appendChild(c);
    setTimeout(() => c.remove(), 2200);
  }
}

/* ============================================================
   ADD FUNDS MODAL
   ============================================================ */
function openAdd() {
  document.getElementById('modal-veil').classList.add('show');
  const inp = document.getElementById('amount-input');
  inp.value = '';
  setTimeout(() => inp.focus(), 100);
  Audio.click();
}
function closeAdd() {
  document.getElementById('modal-veil').classList.remove('show');
  Audio.click();
}
function confirmAdd() {
  const inp = document.getElementById('amount-input');
  const amt = parseFloat(inp.value);
  if (isNaN(amt) || amt <= 0) { inp.focus(); return; }
  setBalance(State.balance + amt);
  Audio.addCash();
  closeAdd();
}

/* ============================================================
   WIRING
   ============================================================ */
function init() {
  if (window.SettingsUI) SettingsUI.mount();
  if (window.Music) Music.init('Music/Blackjack%20Velvet.m4a');
  document.getElementById('balance').textContent = fmt(State.balance);

  // Eagerly preload SFX — decoding works while the audio context is suspended,
  // so by the time the user first interacts, buffers are ready and we just
  // need a gesture to flip the context to 'running'.
  Audio.init();
  const sfxResume = () => { Audio.init(); };
  window.addEventListener('pointerdown', sfxResume, { capture: true });
  window.addEventListener('keydown',     sfxResume, { capture: true });
  window.addEventListener('touchstart',  sfxResume, { capture: true, passive: true });

  // Chips — picking a denomination
  document.querySelectorAll('.chip').forEach(c => {
    c.addEventListener('click', () => {
      selectChip(parseInt(c.dataset.value, 10));
      c.classList.remove('poking');
      void c.offsetWidth;
      c.classList.add('poking');
      Audio.chipSelect();
    });
  });

  // Bet circles — left-click adds a chip, right-click removes the last one placed
  document.querySelectorAll('.bet-circle').forEach(c => {
    c.addEventListener('click', () => addBet(c.dataset.bet));
    c.addEventListener('contextmenu', e => {
      e.preventDefault();
      removeBet(c.dataset.bet);
    });
  });

  // Actions
  document.getElementById('btn-deal').addEventListener('click', dealHand);
  document.getElementById('btn-clear').addEventListener('click', clearBets);
  document.getElementById('btn-rebet').addEventListener('click', rebet);
  document.getElementById('btn-hit').addEventListener('click', hit);
  document.getElementById('btn-stand').addEventListener('click', stand);
  document.getElementById('btn-double').addEventListener('click', doubleDown);
  document.getElementById('btn-split').addEventListener('click', split);
  document.getElementById('ins-yes').addEventListener('click', () => takeInsurance(true));
  document.getElementById('ins-no').addEventListener('click', () => takeInsurance(false));
  document.getElementById('confirm-yes').addEventListener('click', () => {
    const cb = _confirmPending;
    hideConfirm();
    cb?.();
  });
  document.getElementById('confirm-no').addEventListener('click', () => {
    hideConfirm();
    Audio.click?.();
  });
  document.getElementById('btn-next').addEventListener('click', newHand);
  document.getElementById('btn-rebet-only').addEventListener('click', rebetOnly);
  document.getElementById('btn-rebet-deal').addEventListener('click', rebetAndDeal);
  document.getElementById('btn-rebet-2x').addEventListener('click', rebet2xAndDeal);

  // History
  document.getElementById('btn-history').addEventListener('click', () => {
    Audio.click();
    if (window.HistoryUI) HistoryUI.open({ scope: 'session', game: 'multihandblackjack' });
  });

  // Add funds
  document.getElementById('btn-add').addEventListener('click', openAdd);
  document.getElementById('btn-cancel').addEventListener('click', closeAdd);
  document.getElementById('btn-confirm').addEventListener('click', confirmAdd);
  document.getElementById('modal-veil').addEventListener('click', e => {
    if (e.target.id === 'modal-veil') closeAdd();
  });
  document.querySelectorAll('.quick-chip').forEach(b => {
    b.addEventListener('click', () => {
      const cur = parseFloat(document.getElementById('amount-input').value) || 0;
      document.getElementById('amount-input').value = cur + parseInt(b.dataset.amt, 10);
    });
  });
  document.getElementById('amount-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') confirmAdd();
    if (e.key === 'Escape') closeAdd();
  });

  // Keyboard shortcuts
  window.addEventListener('keydown', e => {
    if (document.getElementById('modal-veil').classList.contains('show')) return;
    if (State.phase === 'PLAYER') {
      if (e.key === 'h' || e.key === 'H') hit();
      if (e.key === 's' || e.key === 'S') stand();
      if (e.key === 'd' || e.key === 'D') doubleDown();
      if (e.key === 'p' || e.key === 'P') split();
    } else if (State.phase === 'BETTING' && e.code === 'Space') {
      e.preventDefault();
      if (totalBetSum() > 0) dealHand();
    } else if (State.phase === 'RESOLVED' && e.code === 'Space') {
      e.preventDefault();
      newHand();
    }
  });

  newHand();

  // Global jackpot win — refresh balance from shared localStorage.
  document.addEventListener('jackpot-win', () => setBalance(loadBalance()));
}

init();
</script>
