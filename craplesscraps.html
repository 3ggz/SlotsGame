/* ---- Roll history ---- */
const rhCells = document.getElementById('rh-cells');
function classifyRoll(total, prevPhase, prevPoint, postPhase, sevenOut, pointMade) {
  // Color the cell based on what happened.
  if (sevenOut) return 'seven';
  if (pointMade) return 'point';
  if (prevPhase === 'comeOut' && total === 7) return 'point';   // come-out 7 = pass win (gold-ish — use 'yo')
  if ([2,3,12].includes(total)) return 'craps';
  if (total === 11) return 'yo';
  return '';
}
function pushRoll(d1, d2, prevPhase, prevPoint, postPhase, sevenOut, pointMade) {
  const total = d1 + d2;
  rollHistory.push({
    d1, d2, total,
    cls: classifyRoll(total, prevPhase, prevPoint, postPhase, sevenOut, pointMade),
  });
  while (rollHistory.length > ROLL_HISTORY_MAX) rollHistory.shift();
  renderRollHistory(true);
}
function renderRollHistory(animateLast) {
  rhCells.innerHTML = '';
  rollHistory.forEach((r, i) => {
    const cell = document.createElement('div');
    cell.className = 'rh-cell' + (r.cls ? ' ' + r.cls : '');
    if (animateLast && i === rollHistory.length - 1) cell.classList.add('new');
    cell.textContent = r.total;
    cell.title = `${r.d1}+${r.d2}=${r.total}`;
    rhCells.appendChild(cell);
  });
}

/* ---- REBET — replay last bet pattern ---- */
function snapshotBets() {
  return JSON.parse(JSON.stringify(game.bets));
}
function bettingPatternEmpty(snap) {
  if (!snap) return true;
  let t = (snap.pass||0) + (snap.odds||0) + (snap.field||0);
  for (const n in (snap.place||{})) t += snap.place[n];
  for (const n in (snap.hard||{}))  t += snap.hard[n];
  for (const k in (snap.props||{})) {
    if (k === 'hop') for (const h in snap.props.hop) t += snap.props.hop[h];
    else t += snap.props[k];
  }
  for (const k in (snap.bonus||{})) t += snap.bonus[k];
  return t <= 0;
}
function reBetFromPattern(snap) {
  if (!snap) return;
  const tryPlace = (key, want) => {
    if (want <= 0) return;
    if (!canPlace(key)) return;
    const aff = Math.min(want, balance);
    if (aff > 0) placeChip(key, aff);
  };
  // Pass first so odds becomes legal.
  tryPlace('pass', snap.pass || 0);
  tryPlace('field', snap.field || 0);
  for (const n in (snap.place||{})) tryPlace('place:' + n, snap.place[n]);
  for (const n in (snap.hard||{}))  tryPlace('hard:'  + n, snap.hard[n]);
  for (const k in (snap.props||{})) {
    if (k === 'hop') {
      for (const h in snap.props.hop) tryPlace('hop:' + h, snap.props.hop[h]);
    } else {
      tryPlace('props:' + k, snap.props[k]);
    }
  }
  for (const k in (snap.bonus||{})) tryPlace('bonus:' + k, snap.bonus[k]);
  // Odds last — requires point AND pass; will silently no-op on come-out (correct: odds isn't legal yet).
  tryPlace('odds', snap.odds || 0);
}
const rebetBtn = document.getElementById('btn-rebet');
function refreshRebet() {
  const canRebet = !bettingPatternEmpty(lastBetPattern) && bettingPatternEmpty(snapshotBets());
  rebetBtn.disabled = !canRebet;
}
rebetBtn.addEventListener('click', () => {
  if (rebetBtn.disabled) return;
  reBetFromPattern(lastBetPattern);
});

/* ---- PRESS / TAKE DOWN long-press menu ---- */
const betMenu       = document.getElementById('bet-menu');
const betMenuTitle  = document.getElementById('bet-menu-title');
const menuSubPress  = document.getElementById('menu-sub-press');
const menuSubAdd    = document.getElementById('menu-sub-add');
const menuSubTake   = document.getElementById('menu-sub-take');
let menuKey = null;

function betLabel(key) {
  if (key === 'pass')  return 'PASS LINE';
  if (key === 'odds')  return 'ODDS';
  if (key === 'field') return 'FIELD';
  if (key.startsWith('place:')) return 'PLACE ' + key.slice(6);
  if (key.startsWith('hard:'))  return 'HARD ' + key.slice(5);
  if (key.startsWith('hop:'))   return 'HOP ' + key.slice(4);
  if (key.startsWith('props:')) return key.slice(6).toUpperCase();
  if (key.startsWith('bonus:')) return key.slice(6).toUpperCase();
  return key.toUpperCase();
}
function canTakeDown(key) {
  if (getBetStake(key) <= 0) return false;
  return !isBetLocked(key);
}
function openBetMenu(key, x, y) {
  if (game.shooter.rolling) return;
  playSfx('buttonSoft');
  menuKey = key;
  betMenuTitle.textContent = betLabel(key) + ' — $' + fmt(getBetStake(key));
  const stake = getBetStake(key);
  menuSubPress.textContent = '$' + fmt(stake);
  menuSubAdd.textContent   = '+$' + fmt(game.chipDenom);
  menuSubTake.textContent  = canTakeDown(key) ? '−$' + fmt(stake) : 'LOCKED';
  betMenu.querySelector('[data-action="takedown"]').disabled = !canTakeDown(key);
  betMenu.querySelector('[data-action="takedown"]').style.opacity = canTakeDown(key) ? '' : '0.5';
  betMenu.classList.add('show');
  betMenu.setAttribute('aria-hidden', 'false');
  // Position so it stays on screen
  const w = 150, h = 160;
  const px = Math.max(8, Math.min(window.innerWidth - w - 8, x - w/2));
  const py = Math.max(8, Math.min(window.innerHeight - h - 8, y - 8));
  betMenu.style.left = px + 'px';
  betMenu.style.top  = py + 'px';
}
function closeBetMenu() {
  betMenu.classList.remove('show');
  betMenu.setAttribute('aria-hidden', 'true');
  menuKey = null;
}
betMenu.addEventListener('click', e => {
  const btn = e.target.closest('[data-action]');
  if (!btn || !menuKey) return;
  if (btn.disabled) return;
  const action = btn.dataset.action;
  if (action === 'takedown') {
    takeDownBet(menuKey);
  } else if (action === 'press') {
    const stake = getBetStake(menuKey);
    if (stake > 0) placeChip(menuKey, Math.min(stake, balance));
  } else if (action === 'addchip') {
    placeChip(menuKey);
  }
  closeBetMenu();
});
document.addEventListener('pointerdown', e => {
  if (!betMenu.classList.contains('show')) return;
  if (!betMenu.contains(e.target)) closeBetMenu();
}, true);
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeBetMenu(); });

// Long-press detection on any bet target. Threshold 450ms.
const LONG_PRESS_MS = 450;
function attachLongPress(el) {
  let timer = null;
  let startX = 0, startY = 0;
  let triggered = false;
  el.addEventListener('pointerdown', e => {
    if (e.target.closest('.max-odds-btn')) return;
    const key = el.dataset.bet;
    if (!key || getBetStake(key) <= 0) return;
    triggered = false;
    startX = e.clientX; startY = e.clientY;
    timer = setTimeout(() => {
      triggered = true;
      // Prevent the click that fires on pointerup after a long-press
      openBetMenu(key, e.clientX, e.clientY);
    }, LONG_PRESS_MS);
  });
  const cancel = () => { if (timer) { clearTimeout(timer); timer = null; } };
  el.addEventListener('pointermove', e => {
    if (Math.abs(e.clientX - startX) > 8 || Math.abs(e.clientY - startY) > 8) cancel();
  });
  el.addEventListener('pointerup', cancel);
  el.addEventListener('pointercancel', cancel);
  el.addEventListener('pointerleave', cancel);
  // Right-click as desktop equivalent
  el.addEventListener('contextmenu', e => {
    const key = el.dataset.bet;
    if (!key || getBetStake(key) <= 0) return;
    e.preventDefault();
    openBetMenu(key, e.clientX, e.clientY);
  });
  // Suppress the click that follows a long-press
  el.addEventListener('click', e => {
    if (triggered) { e.stopPropagation(); e.preventDefault(); triggered = false; }
  }, true);
}
document.querySelectorAll('.bet-zone[data-bet], .hop-cell[data-bet], .bonus-zone[data-bet], .bt-section[data-bet]')
  .forEach(attachLongPress);

/* ---- Wire everything together: a single refresh function we call after state changes.
   Coalesced via microtask — several callers fire per roll; the work runs once. ---- */
let _secondaryQueued = false;
function refreshSecondaryUI() {
  if (_secondaryQueued) return;
  _secondaryQueued = true;
  queueMicrotask(() => {
    _secondaryQueued = false;
    refreshMaxOddsBtn();
    refreshWagered();
    refreshRebet();
    updateClearEnabled();
    renderBonusTracker();
  });
}

// Hook into existing render chain.
const _rerenderWithoutSecondary = rerenderAllStacks;
rerenderAllStacks = function() {
  _rerenderWithoutSecondary();
  refreshSecondaryUI();
};
const _updateIndicatorsWithoutSecondary = updateIndicators;
updateIndicators = function() {
  _updateIndicatorsWithoutSecondary();
  refreshSecondaryUI();
};

// Capture roll outcomes for history + snapshot bets for REBET.
// We hook into the shake() flow by wrapping rollDice.
const _origRollDice = rollDice;
let _pendingRollMeta = null;
rollDice = function() {
  _pendingRollMeta = { prevPhase: game.phase, prevPoint: game.point };
  return _origRollDice();
};
function noticeResolution() {
  if (!_pendingRollMeta || !game.lastRoll) return;
  const meta = _pendingRollMeta;
  _pendingRollMeta = null;
  const lr = game.lastRoll;
  const sevenOut  = (meta.prevPhase === 'point' && lr.total === 7);
  const pointMade = (meta.prevPhase === 'point' && lr.total === meta.prevPoint);
  pushRoll(lr.d1, lr.d2, meta.prevPhase, meta.prevPoint, game.phase, sevenOut, pointMade);
}
// Pre-roll snapshot of bets (for REBET) and history record (for HISTORY modal).
const _origShake = shake;
shake = async function() {
  // Snapshot the bet pattern at shake time — REBET restores whatever you wagered for that roll.
  lastBetPattern = snapshotBets();
  const wagerAtRisk = totalWagered();
  const balanceBefore = balance;
  await _origShake();
  noticeResolution();
  // Per-roll history entry: net delta on the balance, with a context note
  // describing what the roll did (POINT MADE / 7-OUT / POINT SET / etc).
  if (window.History) {
    const net = balance - balanceBefore;
    const lr  = game.lastRoll;
    let note = null;
    if (lr) {
      const last = rollHistory[rollHistory.length - 1];
      if (last && last.cls === 'seven')      note = '7-OUT';
      else if (last && last.cls === 'point') note = 'POINT';
      else if (lr.total === 11)              note = 'YO';
      else if ([2,3,12].includes(lr.total))  note = 'CRAPS';
    }
    History.record('craplesscraps', wagerAtRisk, net, note);
  }
  refreshSecondaryUI();
};
shakeBtn.removeEventListener('click', _origShake);
shakeBtn.addEventListener('click', shake);

// HISTORY modal open
document.getElementById('btn-history').addEventListener('click', () => {
  if (window.HistoryUI) HistoryUI.open({ scope: 'session', game: 'craplesscraps' });
});

// Initial paint of the new UI bits
refreshSecondaryUI();
renderRollHistory(false);
</script>
</body>
