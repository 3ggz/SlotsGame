<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<title>Bingo &middot; Diamond Casino</title>
<link rel="manifest" href="manifest.webmanifest" />
<meta name="theme-color" content="#0a0418" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
<link rel="icon" href="icons/favicon-32.png" sizes="32x32" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bungee&family=Bungee+Shade&family=Outfit:wght@400;600;700;800&family=Geist+Mono:wght@500;700&display=swap" rel="stylesheet" />
<style>
:root {
  --bg-0: #0a0418; --bg-1: #150828; --bg-2: #1c0a3a;
  --gold-0: #fff0a8; --gold-1: #ffd24a; --gold-2: #b8860b; --gold-deep: #5c3d00;
  --neon-pink: #ff2e93; --neon-cyan: #22d3ee; --neon-violet: #a855f7; --neon-green: #5cffa1;
  --shadow-deep: 0 30px 60px -10px rgba(0,0,0,0.7), 0 18px 36px -18px rgba(0,0,0,0.5);
  /* B I N G O ball colors */
  --b-B: #22d3ee; --b-I: #ff2e93; --b-N: #5cffa1; --b-G: #ffd24a; --b-O: #a855f7;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { width: 100%; min-height: 100%; }
body {
  font-family: 'Outfit', system-ui, -apple-system, sans-serif;
  background:
    radial-gradient(ellipse at 50% -10%, rgba(168,85,247,0.2), transparent 55%),
    radial-gradient(ellipse at 80% 20%, rgba(34,211,238,0.15), transparent 55%),
    radial-gradient(ellipse at 20% 70%, rgba(255,46,147,0.12), transparent 55%),
    linear-gradient(180deg, var(--bg-0), var(--bg-1) 60%, var(--bg-0));
  color: #fff; overflow-x: hidden;
}

/* nav */
.top-nav { position: fixed; top: 12px; left: 12px; display: flex; gap: 8px; z-index: 50; }
.lobby-link, .leave-btn {
  display: inline-flex; align-items: center; gap: 6px; padding: 0 12px; height: 36px;
  background: rgba(10,4,24,0.7); backdrop-filter: blur(6px); border-radius: 12px; color: #fff;
  font-family: 'Bungee', cursive; font-size: 10px; letter-spacing: 0.18em; text-decoration: none;
  cursor: pointer; border: 0; box-shadow: inset 0 0 0 1.5px rgba(255,210,74,0.35), 0 4px 12px rgba(0,0,0,0.5);
  transition: filter 0.15s, transform 0.08s;
}
.leave-btn { box-shadow: inset 0 0 0 1.5px rgba(255,46,147,0.5), 0 4px 12px rgba(0,0,0,0.5); }
.lobby-link:hover, .leave-btn:hover { filter: brightness(1.15); }
.lobby-link:active, .leave-btn:active { transform: translateY(2px); }
.balance-link {
  position: fixed; top: 12px; right: 12px; z-index: 50; display: inline-flex; align-items: center; gap: 8px;
  padding: 7px 13px 6px; background: rgba(10,4,24,0.78); backdrop-filter: blur(6px); border-radius: 12px;
  box-shadow: inset 0 0 0 1.5px rgba(255,210,74,0.45), 0 4px 12px rgba(0,0,0,0.5); color: #fff; text-decoration: none;
}
.balance-link .bl-label { font-family: 'Bungee', cursive; font-size: 9px; letter-spacing: 0.18em; color: rgba(255,255,255,0.5); }
.balance-link .bl-amt { font-family: 'Geist Mono', monospace; font-weight: 700; font-size: 14px; color: var(--gold-1); text-shadow: 0 0 10px rgba(255,210,74,0.45); }
.balance-link .bl-add { width: 22px; height: 22px; border-radius: 50%; background: linear-gradient(180deg, var(--gold-0), var(--gold-1)); display: grid; place-items: center; color: #0a0418; font-family: 'Bungee', cursive; font-size: 14px; cursor: pointer; box-shadow: 0 2px 0 #3a2200; }

.stage { position: relative; min-height: 100vh; padding: 60px 12px 24px; display: flex; flex-direction: column; align-items: center; }
.stage-inner { width: 100%; max-width: 1180px; display: flex; flex-direction: column; }

/* room select */
.select-header { text-align: center; margin-bottom: 22px; }
.select-title { font-family: 'Bungee Shade', cursive; font-size: clamp(30px, 7vw, 56px); line-height: 1; background: linear-gradient(180deg, var(--gold-0), var(--gold-1) 50%, var(--gold-2)); -webkit-background-clip: text; background-clip: text; color: transparent; filter: drop-shadow(0 6px 14px rgba(255,210,74,0.25)); }
.select-sub { margin-top: 8px; font-family: 'Bungee', cursive; font-size: 11px; letter-spacing: 0.22em; color: var(--neon-cyan); text-shadow: 0 0 12px rgba(34,211,238,0.4); }
.rooms-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 16px; width: 100%; }
.room-card {
  position: relative; display: flex; flex-direction: column; padding: 22px; border-radius: 22px; border: 0; cursor: pointer; text-align: left;
  background: linear-gradient(180deg, #2c1456 0%, #1a0735 50%, #0f041e 100%); color: #fff;
  box-shadow: var(--shadow-deep), inset 0 0 0 1.5px rgba(255,210,74,0.22);
  transition: transform 0.13s cubic-bezier(.2,1.4,.4,1), box-shadow 0.16s, filter 0.2s; font-family: inherit;
}
.room-card:hover:not(:disabled) { transform: translateY(-4px); box-shadow: var(--shadow-deep), inset 0 0 0 1.5px rgba(255,210,74,0.5), 0 0 36px rgba(255,210,74,0.2); }
.room-card:disabled { filter: grayscale(0.4) brightness(0.55); cursor: not-allowed; }
.room-card::before { content: ''; position: absolute; inset: 8px; border-radius: 16px; pointer-events: none; padding: 1.5px; background: linear-gradient(135deg, var(--gold-0), var(--gold-1) 30%, var(--gold-deep) 50%, var(--gold-1) 70%, var(--gold-0)); -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0); -webkit-mask-composite: xor; mask-composite: exclude; opacity: 0.5; }
.room-card .rc-tier { font-family: 'Bungee', cursive; font-size: 10px; letter-spacing: 0.2em; color: var(--neon-cyan); margin-bottom: 4px; }
.room-card .rc-name { font-family: 'Bungee', cursive; font-size: 23px; background: linear-gradient(180deg, #fff7d1, var(--gold-1)); -webkit-background-clip: text; background-clip: text; color: transparent; margin-bottom: 12px; }
.room-card .rc-row { display: flex; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
.room-card .rc-pill { display: inline-block; padding: 4px 10px; border-radius: 999px; background: rgba(255,210,74,0.15); border: 1px solid rgba(255,210,74,0.35); font-family: 'Bungee', cursive; font-size: 10px; letter-spacing: 0.14em; color: var(--gold-1); }
.room-card .rc-prize { font-size: 12px; color: rgba(255,255,255,0.7); margin-bottom: 6px; }
.room-card .rc-prize b { color: var(--neon-green); font-family: 'Geist Mono', monospace; }
.room-card .rc-cta { margin-top: auto; padding: 10px; text-align: center; font-family: 'Bungee', cursive; font-size: 13px; letter-spacing: 0.18em; color: #0a0418; background: linear-gradient(180deg, var(--gold-0), var(--gold-1)); border-radius: 10px; box-shadow: 0 4px 0 #3a2200, inset 0 1px 0 rgba(255,255,255,0.3); }
.room-card .rc-locked { margin-top: auto; padding: 10px; text-align: center; font-family: 'Bungee', cursive; font-size: 11px; letter-spacing: 0.18em; color: rgba(255,255,255,0.55); background: rgba(255,46,147,0.15); border-radius: 10px; border: 1px solid rgba(255,46,147,0.3); }
/* mini pattern preview on room card */
.rc-pattern { position: absolute; top: 18px; right: 18px; display: grid; grid-template-columns: repeat(5, 1fr); gap: 2px; width: 46px; }
.rc-pattern span { aspect-ratio: 1; border-radius: 2px; background: rgba(255,255,255,0.08); }
.rc-pattern span.on { background: var(--neon-cyan); box-shadow: 0 0 5px var(--neon-cyan); }

/* game screen */
.game-screen { display: none; flex-direction: column; width: 100%; align-items: center; }
.game-screen.show { display: flex; }
.game-header { text-align: center; margin-bottom: 10px; }
.game-header .gh-name { font-family: 'Bungee Shade', cursive; font-size: clamp(20px, 4vw, 30px); background: linear-gradient(180deg, var(--gold-0), var(--gold-1) 50%, var(--gold-2)); -webkit-background-clip: text; background-clip: text; color: transparent; }
.game-header .gh-info { font-family: 'Bungee', cursive; font-size: 10px; letter-spacing: 0.18em; color: var(--neon-cyan); margin-top: 2px; }

/* caller area */
.caller { display: flex; align-items: center; justify-content: center; gap: 22px; flex-wrap: wrap; margin-bottom: 14px; width: 100%; }
.current-ball-wrap { display: flex; flex-direction: column; align-items: center; gap: 6px; }
.ball {
  position: relative; border-radius: 50%; display: grid; place-items: center;
  font-family: 'Bungee', cursive; color: #07121a; isolation: isolate;
  background: radial-gradient(circle at 34% 28%, #fff 0%, rgba(255,255,255,0.6) 12%, var(--bc, #22d3ee) 45%, color-mix(in srgb, var(--bc, #22d3ee) 60%, #000) 100%);
  box-shadow: inset 0 -6px 12px rgba(0,0,0,0.35), inset 0 4px 8px rgba(255,255,255,0.45), 0 8px 18px rgba(0,0,0,0.55), 0 0 22px color-mix(in srgb, var(--bc,#22d3ee) 55%, transparent);
}
.ball::after { content: ''; position: absolute; top: 14%; left: 20%; width: 30%; height: 22%; border-radius: 50%; background: rgba(255,255,255,0.75); filter: blur(2px); }
.ball .ball-inner { position: relative; z-index: 1; display: flex; flex-direction: column; align-items: center; line-height: 0.95; }
.ball .ball-letter { font-size: 0.42em; letter-spacing: 0.04em; opacity: 0.92; }
.ball .ball-num { font-size: 0.62em; }
.current-ball { width: 118px; height: 118px; font-size: 46px; }
.current-ball.pop { animation: ballPop 0.6s cubic-bezier(.2,1.5,.4,1); }
@keyframes ballPop { 0% { transform: scale(0.2) translateY(-30px); opacity: 0; } 55% { transform: scale(1.16); opacity: 1; } 100% { transform: scale(1); } }
.current-ball-label { font-family: 'Bungee', cursive; font-size: 9px; letter-spacing: 0.2em; color: rgba(255,255,255,0.5); }
.current-ball.empty { background: rgba(255,255,255,0.06); box-shadow: inset 0 0 0 2px rgba(255,255,255,0.1); color: rgba(255,255,255,0.3); }
.current-ball.empty::after { display: none; }
.recent-balls { display: flex; gap: 6px; align-items: center; }
.recent-balls .ball { width: 44px; height: 44px; font-size: 17px; }
.recent-balls .rb-label { font-family: 'Bungee', cursive; font-size: 8px; letter-spacing: 0.18em; color: rgba(255,255,255,0.4); margin-right: 2px; }

/* pattern mini diagram */
.pattern-mini { display: flex; flex-direction: column; align-items: center; gap: 4px; }
.pattern-mini .pm-label { font-family: 'Bungee', cursive; font-size: 8px; letter-spacing: 0.16em; color: rgba(255,255,255,0.5); }
.pattern-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 2px; width: 64px; }
.pattern-grid span { aspect-ratio: 1; border-radius: 2px; background: rgba(255,255,255,0.08); }
.pattern-grid span.on { background: var(--neon-green); box-shadow: 0 0 5px var(--neon-green); }
.pattern-grid span.free { background: var(--gold-1); }

/* play row: master board + hero card */
.play-row { display: flex; gap: 18px; justify-content: center; align-items: flex-start; width: 100%; flex-wrap: wrap; }

/* master board */
.master-board {
  background: rgba(10,4,24,0.5); border-radius: 16px; padding: 10px;
  box-shadow: inset 0 0 0 1.5px rgba(255,210,74,0.2); display: flex; flex-direction: column; gap: 3px;
}
.mb-row { display: flex; align-items: center; gap: 3px; }
.mb-letter { width: 18px; font-family: 'Bungee', cursive; font-size: 12px; text-align: center; }
.mb-letter.B { color: var(--b-B); } .mb-letter.I { color: var(--b-I); } .mb-letter.N { color: var(--b-N); } .mb-letter.G { color: var(--b-G); } .mb-letter.O { color: var(--b-O); }
.mb-cell {
  width: 20px; height: 20px; border-radius: 4px; display: grid; place-items: center;
  font-family: 'Geist Mono', monospace; font-size: 9px; font-weight: 700; color: rgba(255,255,255,0.35);
  background: rgba(255,255,255,0.04); transition: all 0.2s;
}
.mb-cell.called { color: #07121a; font-weight: 700; }
.mb-cell.called.B { background: var(--b-B); box-shadow: 0 0 8px var(--b-B); }
.mb-cell.called.I { background: var(--b-I); box-shadow: 0 0 8px var(--b-I); color:#fff; }
.mb-cell.called.N { background: var(--b-N); box-shadow: 0 0 8px var(--b-N); }
.mb-cell.called.G { background: var(--b-G); box-shadow: 0 0 8px var(--b-G); }
.mb-cell.called.O { background: var(--b-O); box-shadow: 0 0 8px var(--b-O); color:#fff; }
.mb-cell.just { animation: mbPop 0.4s ease-out; }
@keyframes mbPop { 0% { transform: scale(1.6); } 100% { transform: scale(1); } }

/* hero card */
.hero-card-wrap { display: flex; flex-direction: column; align-items: center; gap: 6px; }
.bingo-card { display: flex; flex-direction: column; gap: 4px; padding: 10px; border-radius: 18px; background: linear-gradient(180deg, #221046, #120630); box-shadow: var(--shadow-deep), inset 0 0 0 2px rgba(255,210,74,0.4); }
.card-header { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; }
.card-header .ch { aspect-ratio: 1.4; display: grid; place-items: center; font-family: 'Bungee', cursive; font-size: clamp(16px, 4.4vw, 24px); border-radius: 8px; }
.card-header .ch.B { color: var(--b-B); } .card-header .ch.I { color: var(--b-I); } .card-header .ch.N { color: var(--b-N); } .card-header .ch.G { color: var(--b-G); } .card-header .ch.O { color: var(--b-O); }
.card-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; }
.card-cell {
  position: relative; aspect-ratio: 1; border-radius: 10px; display: grid; place-items: center;
  font-family: 'Geist Mono', monospace; font-weight: 700; font-size: clamp(15px, 4.2vw, 22px);
  background: linear-gradient(180deg, #fffdf3, #e6dcc4); color: #1a0a2e; cursor: pointer;
  box-shadow: inset 0 -2px 4px rgba(0,0,0,0.12), 0 2px 5px rgba(0,0,0,0.3); transition: transform 0.1s;
}
.card-cell:active { transform: scale(0.95); }
.card-cell.free { background: linear-gradient(180deg, var(--gold-0), var(--gold-1)); color: #2a0a00; font-family: 'Bungee', cursive; font-size: clamp(8px, 2.4vw, 12px); cursor: default; }
.card-cell .daub {
  position: absolute; inset: 8%; border-radius: 50%; display: grid; place-items: center;
  opacity: 0; transform: scale(0.3); pointer-events: none;
  background: radial-gradient(circle at 35% 30%, rgba(255,255,255,0.5), var(--dc, var(--neon-pink)) 60%, color-mix(in srgb, var(--dc, var(--neon-pink)) 60%, #000));
  box-shadow: 0 2px 6px rgba(0,0,0,0.5), inset 0 0 0 2px rgba(255,255,255,0.25);
}
.card-cell.daubed .daub { animation: daubStamp 0.34s cubic-bezier(.2,1.5,.4,1) forwards; }
@keyframes daubStamp { 0% { opacity: 0; transform: scale(0.2) rotate(-20deg); } 60% { opacity: 1; transform: scale(1.12) rotate(6deg); } 100% { opacity: 0.92; transform: scale(1) rotate(0); } }
.card-cell.needed { box-shadow: inset 0 -2px 4px rgba(0,0,0,0.12), 0 2px 5px rgba(0,0,0,0.3), 0 0 0 2.5px var(--neon-green); animation: neededPulse 1.2s ease-in-out infinite; }
@keyframes neededPulse { 0%, 100% { box-shadow: inset 0 -2px 4px rgba(0,0,0,0.12), 0 2px 5px rgba(0,0,0,0.3), 0 0 0 2.5px rgba(92,255,161,0.5); } 50% { box-shadow: inset 0 -2px 4px rgba(0,0,0,0.12), 0 2px 5px rgba(0,0,0,0.3), 0 0 0 3px rgba(92,255,161,1), 0 0 16px rgba(92,255,161,0.6); } }
.card-cell.winning { animation: winCell 0.7s ease-out infinite alternate; }
@keyframes winCell { 0% { box-shadow: inset 0 -2px 4px rgba(0,0,0,0.12), 0 0 0 3px var(--gold-1); } 100% { box-shadow: inset 0 -2px 4px rgba(0,0,0,0.12), 0 0 22px var(--gold-1), 0 0 0 3px var(--gold-1); } }
.card-cell .daub.B { --dc: var(--b-B); } .card-cell .daub.I { --dc: var(--b-I); } .card-cell .daub.N { --dc: var(--b-N); } .card-cell .daub.G { --dc: var(--b-G); } .card-cell .daub.O { --dc: var(--b-O); }

/* opponents strip */
.opponents { display: flex; gap: 8px; overflow-x: auto; width: 100%; max-width: 760px; padding: 10px 2px; scrollbar-width: none; }
.opponents::-webkit-scrollbar { display: none; }
.opp {
  flex: 0 0 auto; min-width: 78px; padding: 6px 8px; border-radius: 12px;
  background: linear-gradient(180deg, rgba(20,10,38,0.95), rgba(10,4,24,0.95));
  box-shadow: 0 4px 10px rgba(0,0,0,0.5), inset 0 0 0 1.5px rgba(255,255,255,0.06);
  display: flex; flex-direction: column; align-items: center; gap: 2px; transition: box-shadow 0.25s;
}
.opp.close { box-shadow: 0 4px 10px rgba(0,0,0,0.5), inset 0 0 0 2px var(--neon-pink), 0 0 16px rgba(255,46,147,0.5); }
.opp.winner { box-shadow: 0 4px 10px rgba(0,0,0,0.5), inset 0 0 0 2px var(--gold-1), 0 0 20px rgba(255,210,74,0.7); }
.opp .opp-av { width: 30px; height: 30px; border-radius: 50%; display: grid; place-items: center; font-family: 'Bungee', cursive; font-size: 11px; color: #fff; box-shadow: 0 0 0 2px rgba(255,255,255,0.1); }
.opp .opp-name { font-family: 'Bungee', cursive; font-size: 8px; letter-spacing: 0.04em; white-space: nowrap; max-width: 72px; overflow: hidden; text-overflow: ellipsis; }
.opp .opp-away { font-family: 'Geist Mono', monospace; font-size: 9px; color: var(--neon-cyan); }
.opp .opp-away.one { color: var(--neon-pink); font-weight: 700; }

/* status + controls */
.status-banner { margin: 10px auto 0; padding: 9px 18px; border-radius: 14px; background: rgba(0,0,0,0.4); box-shadow: inset 0 0 0 1.5px rgba(255,210,74,0.3); font-family: 'Bungee', cursive; font-size: 12px; letter-spacing: 0.14em; color: #fff; text-align: center; min-height: 38px; align-self: center; display: inline-block; transition: all 0.2s; }
.status-banner.one-away { color: var(--neon-pink); box-shadow: inset 0 0 0 1.5px var(--neon-pink), 0 0 22px rgba(255,46,147,0.4); animation: oneAwayPulse 0.8s ease-in-out infinite; }
@keyframes oneAwayPulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.04); } }
.status-banner.win { color: var(--neon-green); box-shadow: inset 0 0 0 1.5px var(--neon-green), 0 0 26px rgba(92,255,161,0.4); }

.controls { width: 100%; max-width: 600px; margin: 12px auto 0; display: flex; flex-direction: column; gap: 10px; }
.control-row { display: flex; gap: 10px; justify-content: center; }
.bingo-btn {
  width: 100%; padding: 18px; border: 0; border-radius: 16px; font-family: 'Bungee', cursive; font-size: 22px; letter-spacing: 0.2em;
  color: #2a0a00; cursor: pointer; background: linear-gradient(180deg, var(--gold-0), var(--gold-1) 50%, var(--gold-2));
  box-shadow: 0 6px 0 #3a2200, inset 0 1px 0 rgba(255,255,255,0.5); transition: transform 0.08s, filter 0.15s;
}
.bingo-btn:active:not(:disabled) { transform: translateY(4px); box-shadow: 0 2px 0 #3a2200, inset 0 1px 0 rgba(255,255,255,0.5); }
.bingo-btn:disabled { filter: grayscale(0.8) brightness(0.5); cursor: not-allowed; box-shadow: 0 6px 0 rgba(0,0,0,0.4); }
.bingo-btn.ready { animation: bingoReady 0.55s ease-in-out infinite; }
@keyframes bingoReady { 0%,100% { transform: scale(1); box-shadow: 0 6px 0 #3a2200, inset 0 1px 0 rgba(255,255,255,0.5), 0 0 18px rgba(255,210,74,0.5); } 50% { transform: scale(1.04); box-shadow: 0 6px 0 #3a2200, inset 0 1px 0 rgba(255,255,255,0.5), 0 0 38px rgba(255,210,74,0.95); } }
.ctl-btn {
  flex: 1; padding: 11px 8px; border: 0; border-radius: 12px; font-family: 'Bungee', cursive; font-size: 10px; letter-spacing: 0.1em;
  color: #fff; cursor: pointer; background: linear-gradient(180deg, #2a124d, #15082a);
  box-shadow: inset 0 0 0 1.5px rgba(255,210,74,0.3), 0 4px 0 rgba(0,0,0,0.6); transition: transform 0.08s, filter 0.15s;
}
.ctl-btn:hover { filter: brightness(1.15); } .ctl-btn:active { transform: translateY(2px); }
.ctl-btn.on { color: #06181d; background: linear-gradient(180deg, var(--neon-cyan), #0a7a99); box-shadow: inset 0 0 0 1.5px rgba(255,255,255,0.3), 0 4px 0 #022838; }
.ctl-btn.primary { color: #0a0418; background: linear-gradient(180deg, var(--gold-0), var(--gold-1)); box-shadow: 0 4px 0 #3a2200; }

/* modals */
.modal-veil { position: fixed; inset: 0; z-index: 100; background: rgba(8,4,22,0.82); backdrop-filter: blur(8px); display: none; align-items: center; justify-content: center; }
.modal-veil.show { display: flex; }
.modal-card { background: linear-gradient(180deg, #2c1456 0%, #1a0735 100%); border-radius: 22px; padding: 26px 22px 22px; box-shadow: var(--shadow-deep), inset 0 0 0 1.5px rgba(255,210,74,0.35); width: min(440px, 92vw); position: relative; text-align: center; }

<script>
/* CORE TESTABLE API START */
(function(){
  'use strict';

  // ----- seedable RNG -----
  function mulberry32(seed) {
    let a = (seed >>> 0) || 1;
    return function() {
      a = (a + 0x6D2B79F5) | 0;
      let t = Math.imul(a ^ (a >>> 15), 1 | a);
      t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
      return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
    };
  }
  function shuffle(arr, rng) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(rng() * (i + 1));
      const t = arr[i]; arr[i] = arr[j]; arr[j] = t;
    }
    return arr;
  }

  // ----- 75-ball bingo -----
  // Columns B,I,N,G,O each cover 15 numbers:
  //   B: 1-15  I: 16-30  N: 31-45  G: 46-60  O: 61-75
  const LETTERS = ['B', 'I', 'N', 'G', 'O'];
  const BALL_COUNT = 75;
  const FREE_INDEX = 12;               // center cell of the 5x5 grid

  function ballLetterIndex(n) { return Math.floor((n - 1) / 15); }   // 0..4
  function ballLetter(n) { return LETTERS[ballLetterIndex(n)]; }
  function ballLabel(n) { return ballLetter(n) + n; }

  // A card is a flat 25-length array (row-major). Index 12 is the FREE space
  // (value 0). Column c holds 5 distinct numbers from [c*15+1 .. c*15+15],
  // sorted ascending top-to-bottom (the N column only has 4, free center).
  function makeCard(rng) {
    const grid = new Array(25).fill(0);
    for (let c = 0; c < 5; c++) {
      const pool = [];
      for (let k = 1; k <= 15; k++) pool.push(c * 15 + k);
      shuffle(pool, rng);
      const need = (c === 2) ? 4 : 5;
      const chosen = pool.slice(0, need).sort((a, b) => a - b);
      const rows = (c === 2) ? [0, 1, 3, 4] : [0, 1, 2, 3, 4];
      for (let r = 0; r < rows.length; r++) grid[rows[r] * 5 + c] = chosen[r];
    }
    grid[FREE_INDEX] = 0;   // FREE
    return grid;
  }
  function makeCards(n, rng) {
    const out = [];
    for (let i = 0; i < n; i++) out.push(makeCard(rng));
    return out;
  }

  function makeDrawOrder(rng) {
    const balls = [];
    for (let n = 1; n <= BALL_COUNT; n++) balls.push(n);
    return shuffle(balls, rng);
  }

  // ----- winning patterns (sets of cell indices) -----
  const ROWS = [], COLS = [];
  for (let r = 0; r < 5; r++) { const row = []; for (let c = 0; c < 5; c++) row.push(r * 5 + c); ROWS.push(row); }
  for (let c = 0; c < 5; c++) { const col = []; for (let r = 0; r < 5; r++) col.push(r * 5 + c); COLS.push(col); }
  const DIAG1 = [0, 6, 12, 18, 24];
  const DIAG2 = [4, 8, 12, 16, 20];
  const LINES = ROWS.concat(COLS, [DIAG1, DIAG2]);          // 12 shapes
  const FOUR_CORNERS = [[0, 4, 20, 24]];
  const X_SHAPE = [[0, 6, 12, 18, 24, 4, 8, 16, 20]];       // both diagonals
  const ALL_CELLS = []; for (let i = 0; i < 25; i++) ALL_CELLS.push(i);
  const BLACKOUT = [ALL_CELLS.slice()];

  const PATTERNS = {
    line: { id: 'line', name: 'Any Line', shapes: LINES },
    four_corners: { id: 'four_corners', name: 'Four Corners', shapes: FOUR_CORNERS },
    x: { id: 'x', name: 'Big X', shapes: X_SHAPE },
    blackout: { id: 'blackout', name: 'Blackout', shapes: BLACKOUT },
  };
  function patternShapes(patternId) { return (PATTERNS[patternId] || PATTERNS.line).shapes; }

  function cellDaubed(grid, calledSet, idx) {
    if (idx === FREE_INDEX) return true;          // free space always daubed
    return calledSet.has(grid[idx]);
  }
  // Returns the winning shape (array of cell indices) or null.
  function cardWins(grid, calledSet, patternId) {
    const shapes = patternShapes(patternId);
    for (const shape of shapes) {
      let all = true;
      for (const idx of shape) { if (!cellDaubed(grid, calledSet, idx)) { all = false; break; } }
      if (all) return shape;
    }
    return null;
  }
  // How many more cells are needed for the CLOSEST winning shape, plus that shape.
  function cardProgress(grid, calledSet, patternId) {
    const shapes = patternShapes(patternId);
    let best = Infinity, bestShape = null;
    for (const shape of shapes) {
      let missing = 0;
      for (const idx of shape) if (!cellDaubed(grid, calledSet, idx)) missing++;
      if (missing < best) { best = missing; bestShape = shape; }
    }
    return { away: best, shape: bestShape };
  }
  // The numbers (still uncalled) this card needs to complete its closest shape.
  function neededNumbers(grid, calledSet, patternId) {
    const { shape } = cardProgress(grid, calledSet, patternId);
    const out = [];
    if (!shape) return out;
    for (const idx of shape) {
      if (idx === FREE_INDEX) continue;
      if (!calledSet.has(grid[idx])) out.push(grid[idx]);
    }
    return out;
  }

  // The 0-based draw index at which this card first completes (auto-daub).
  function winningBallIndex(grid, drawOrder, patternId) {
    const called = new Set();
    for (let i = 0; i < drawOrder.length; i++) {
      called.add(drawOrder[i]);
      if (cardWins(grid, called, patternId)) return i;
    }
    return Infinity;
  }
  // Earliest-completing card across a field. Ties go to the LOWER index
  // (the hero is index 0, so the hero wins ties).
  function simulateRace(grids, drawOrder, patternId) {
    let best = Infinity, winner = -1;
    const indices = [];
    for (let k = 0; k < grids.length; k++) {
      const bi = winningBallIndex(grids[k], drawOrder, patternId);
      indices.push(bi);
      if (bi < best) { best = bi; winner = k; }
    }
    return { winnerIdx: winner, ballIndex: best, ballsCalled: best === Infinity ? drawOrder.length : best + 1, winningBallIndices: indices };
  }

  // ----- rooms -----
  const ROOMS = [
    { id: 'coffee',   name: 'Coffee Bingo',      buyIn: 10,   players: 6,  pattern: 'line',         callMs: 2200 },
    { id: 'lines',    name: 'Lucky Lines',       buyIn: 50,   players: 12, pattern: 'line',         callMs: 2000 },
    { id: 'corners',  name: 'Four Corners Club', buyIn: 100,  players: 12, pattern: 'four_corners', callMs: 2000 },
    { id: 'bigx',     name: 'Big X Hall',        buyIn: 250,  players: 16, pattern: 'x',            callMs: 1800 },
    { id: 'blackout', name: 'Blackout Bonanza',  buyIn: 1000, players: 20, pattern: 'blackout',     callMs: 1300 },
    { id: 'highroll', name: 'High Roller Room',  buyIn: 5000, players: 30, pattern: 'line',         callMs: 1600 },
  ];
  function prizeFor(room) {
    // Winner takes the pool; a small consolation for the runner-up (closest).
    const pool = room.buyIn * room.players;
    return { pool, prize: Math.round(pool * 0.9), consolation: Math.round(pool * 0.1) };
  }

  // ----- export -----
  const api = {
    mulberry32, shuffle,
    LETTERS, BALL_COUNT, FREE_INDEX,
    ballLetterIndex, ballLetter, ballLabel,
    makeCard, makeCards, makeDrawOrder,
    PATTERNS, patternShapes, ROWS, COLS, DIAG1, DIAG2, LINES,
    cellDaubed, cardWins, cardProgress, neededNumbers,
    winningBallIndex, simulateRace,
    ROOMS, prizeFor,
  };
  if (typeof globalThis !== 'undefined') globalThis.BingoCore = api;
  if (typeof window !== 'undefined') window.BingoCore = api;
})();
/* CORE TESTABLE API END */
</script>

<script>

  function persistBalance(v) { try { localStorage.setItem(BALANCE_KEY, String(v)); } catch (e) {} }

  const fmt = n => Math.round(n || 0).toLocaleString('en-US');

    let actx = null;
    function ctx() { if (!actx) { try { actx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {} } return actx; }
    function tone(freq, dur, type, gain) {
      const a = ctx(); if (!a) return;
      try {
        if (a.state === 'suspended') a.resume();
        const o = a.createOscillator(); o.type = type || 'sine'; o.frequency.value = freq;
        const g = a.createGain(); const vol = (window.Settings ? Settings.sfxVolume() : 1) * (gain || 0.16);
        g.gain.value = 0; g.gain.linearRampToValueAtTime(vol, a.currentTime + 0.005);
        g.gain.exponentialRampToValueAtTime(0.0001, a.currentTime + dur);
        o.connect(g); g.connect(a.destination); o.start(); o.stop(a.currentTime + dur + 0.02);
      } catch (e) {}
    }
    function slide(f0, f1, dur, type, gain) {
      const a = ctx(); if (!a) return;
      try {
        if (a.state === 'suspended') a.resume();
        const o = a.createOscillator(); o.type = type || 'sine';
        o.frequency.setValueAtTime(f0, a.currentTime); o.frequency.exponentialRampToValueAtTime(f1, a.currentTime + dur);
        const g = a.createGain(); const vol = (window.Settings ? Settings.sfxVolume() : 1) * (gain || 0.14);
        g.gain.value = 0; g.gain.linearRampToValueAtTime(vol, a.currentTime + 0.01); g.gain.exponentialRampToValueAtTime(0.0001, a.currentTime + dur);
        o.connect(g); g.connect(a.destination); o.start(); o.stop(a.currentTime + dur + 0.02);
      } catch (e) {}
    }

    return {
      click() { tone(540, 0.04, 'square', 0.08); },

    };
  })();
  ['pointerdown','touchstart','keydown'].forEach(e => window.addEventListener(e, () => { try { Audio.click(); } catch(_){} }, { once: true }));

  // ---- DOM ----
  const $ = id => document.getElementById(id);

    balAmt: $('bal-amt'), balAdd: $('bl-add'),
    roomSelect: $('room-select'), roomsGrid: $('rooms-grid'),
    gameScreen: $('game-screen'), ghName: $('gh-name'), ghInfo: $('gh-info'),

    currentBall: $('current-ball'), currentBallLabel: $('current-ball-label'), recentBalls: $('recent-balls'),
    masterBoard: $('master-board'), cardGrid: $('card-grid'),
    opponents: $('opponents'), status: $('status-banner'),
    btnBingo: $('btn-bingo'), btnAutodaub: $('btn-autodaub'), btnMusic: $('btn-music'), btnStart: $('btn-start'), btnNewcard: $('btn-newcard'),
    countdown: $('countdown'), btnLeave: $('btn-leave'),
    buyinModal: $('buyin-modal'), buyinTitle: $('buyin-title'), buyinBlurb: $('buyin-blurb'), buyinCancel: $('buyin-cancel'), buyinConfirm: $('buyin-confirm'),
    resultModal: $('result-modal'), resultTitle: $('result-title'), resultSub: $('result-sub'), resultPrize: $('result-prize'), resultLeave: $('result-leave'), resultAgain: $('result-again'),
    addfundsModal: $('addfunds-modal'), addfundsInput: $('addfunds-input'), addfundsCancel: $('addfunds-cancel'), addfundsConfirm: $('addfunds-confirm'),
    particles: $('particles'),
  };

  // ---- state ----
  const State = {
    balance: loadBalance(),
    room: null,
    rng: null,
    cards: [],            // index 0 = hero
    drawOrder: [],
    drawPos: 0,           // how many balls called
    calledSet: new Set(),

    autoDaub: true,
    musicOn: true,
    phase: 'idle',        // 'idle'|'pregame'|'calling'|'over'
    gameOver: false,
    callTimer: null,
    heroAutoClaimTimer: null,
    botReactionTimers: [],
    pendingTimers: [],
    manualDaubed: new Set(),  // cells hero tapped (cosmetic when auto off)
    winnerIdx: -1,
  };
  function paintBalance() { dom.balAmt.textContent = fmt(State.balance); }
  paintBalance();
  function refreshBal() { const f = loadBalance(); if (f !== State.balance) { State.balance = f; paintBalance(); renderRooms(); } }
  window.addEventListener('pageshow', refreshBal);
  window.addEventListener('focus', refreshBal);
  document.addEventListener('visibilitychange', () => { if (document.visibilityState === 'visible') refreshBal(); });
  window.addEventListener('storage', e => { if (e.key === BALANCE_KEY) refreshBal(); });

  function delay(ms) { return new Promise(res => { const id = setTimeout(() => { State.pendingTimers = State.pendingTimers.filter(x => x !== id); res(); }, ms); State.pendingTimers.push(id); }); }
  function clearAllTimers() {
    for (const id of State.pendingTimers) clearTimeout(id); State.pendingTimers.length = 0;
    if (State.callTimer) { clearTimeout(State.callTimer); State.callTimer = null; }
    if (State.heroAutoClaimTimer) { clearTimeout(State.heroAutoClaimTimer); State.heroAutoClaimTimer = null; }
    for (const t of State.botReactionTimers) clearTimeout(t.id); State.botReactionTimers.length = 0;
  }
  function randInt(a, b) { return a + Math.floor(Math.random() * (b - a + 1)); }

  // ---- music ----
  function startMusic() { if (window.Music) { try { Music.init(encodeURI("Music/High Roller's Room.m4a")); Music.start(); } catch(e){} } }
  function setMusic(on) {
    State.musicOn = on;
    dom.btnMusic.textContent = 'MUSIC: ' + (on ? 'ON' : 'OFF');
    dom.btnMusic.classList.toggle('on', on);
    if (window.Music) { try { on ? Music.start() : Music.pause(); } catch(e){} }
  }

  // ---- rooms ----
  function patternCells(patternId) {
    // Return a representative set of cells lit for the pattern preview.
    if (patternId === 'four_corners') return new Set([0,4,20,24]);
    if (patternId === 'x') return new Set([0,6,12,18,24,4,8,16,20]);
    if (patternId === 'blackout') { const s = new Set(); for (let i=0;i<25;i++) s.add(i); return s; }
    return new Set([10,11,12,13,14]); // line: show a middle row
  }
  function renderRooms() {
    dom.roomsGrid.innerHTML = '';
    for (const room of Core.ROOMS) {
      const purse = Core.prizeFor(room);
      const afford = State.balance >= room.buyIn;
      const card = document.createElement('button');
      card.className = 'room-card'; card.disabled = !afford;
      const cells = patternCells(room.pattern);
      let pat = ''; for (let i=0;i<25;i++) pat += `<span class="${cells.has(i)?'on':''}"></span>`;
      card.innerHTML = `
        <div class="rc-pattern">${pat}</div>
        <div class="rc-tier">${room.id.toUpperCase()}</div>
        <div class="rc-name">${room.name}</div>
        <div class="rc-row"><span class="rc-pill">BUY-IN $${fmt(room.buyIn)}</span><span class="rc-pill">${Core.PATTERNS[room.pattern].name.toUpperCase()}</span></div>
        <div class="rc-prize">Prize <b>$${fmt(purse.prize)}</b> &middot; ${room.players} players</div>
        ${afford ? '<div class="rc-cta">PLAY</div>' : `<div class="rc-locked">NEEDS $${fmt(room.buyIn)}</div>`}`;
      card.addEventListener('click', () => { if (!afford) return; Audio.click(); openBuyIn(room); });
      dom.roomsGrid.appendChild(card);
    }
  }
  let buyinRoom = null;
  function openBuyIn(room) {
    buyinRoom = room;
    const purse = Core.prizeFor(room);
    dom.buyinTitle.textContent = 'JOIN ' + room.name.toUpperCase();
    dom.buyinBlurb.textContent = `Buy in for $${fmt(room.buyIn)} against ${room.players-1} other players. First to complete ${Core.PATTERNS[room.pattern].name} wins $${fmt(purse.prize)}.`;
    dom.buyinModal.classList.add('show');
  }
  dom.buyinCancel.addEventListener('click', () => { Audio.click(); dom.buyinModal.classList.remove('show'); });
  dom.buyinConfirm.addEventListener('click', () => {
    Audio.click();
    if (State.balance < buyinRoom.buyIn) return;
    dom.buyinModal.classList.remove('show');
    joinRoom(buyinRoom);
  });

  // ---- bot names ----
  function pickBots(n) {
    const out = [];
    if (window.CasinoBots && !window.CasinoBots.disabled && window.CasinoBots.bots) {
      const all = window.CasinoBots.bots().slice().sort(() => Math.random() - 0.5);
      for (const b of all) { if (out.length >= n) break; out.push({ name: b.name, hue: b.hue }); }
    }
    const adj = ['Velvet','Neon','Lucky','Wild','Royal','Golden','Frosty','Quiet','Crimson','Onyx','Jolly','Swift'];
    const noun = ['Wolf','Aces','Jester','Shark','Knight','Crown','Hawk','Vegas','Comet','Saint','Bingo','Star'];
    while (out.length < n) out.push({ name: adj[randInt(0,adj.length-1)]+noun[randInt(0,noun.length-1)]+randInt(2,99), hue: randInt(0,359) });
    return out.slice(0, n);
  }

  // ---- join ----
  function joinRoom(room) {
    resetGameState();   // clear any timers/flags from a prior game (heroWon, one-away, etc.)
    setBalance(State.balance - room.buyIn);
    State.room = room;
    State.rng = Core.mulberry32((Math.random() * 1e9) | 0);
    State.cards = Core.makeCards(room.players, State.rng);
    State.drawOrder = Core.makeDrawOrder(State.rng);
    // The winner is decided up front by the cards + draw order: the earliest
    // card to complete the pattern (ties to the lowest index, i.e. the hero).
    // We stop calling balls at exactly that ball, so no later card can "steal"
    // it and the hero always wins when their card is genuinely first. Fully
    // deterministic — no reaction-timing nondeterminism.
    State.race = Core.simulateRace(State.cards, State.drawOrder, room.pattern);
    State.drawPos = 0; State.calledSet = new Set();
    State.botInfo = [{ name: 'You', hue: 200 }, ...pickBots(room.players - 1)];
    State.gameOver = false; State.winnerIdx = -1; State.manualDaubed = new Set();
    State.phase = 'pregame';

    dom.roomSelect.style.display = 'none';
    dom.gameScreen.classList.add('show');
    dom.btnLeave.style.display = 'inline-flex';
    const purse = Core.prizeFor(room);
    dom.ghName.textContent = room.name;
    dom.ghInfo.textContent = `${Core.PATTERNS[room.pattern].name.toUpperCase()} · PRIZE $${fmt(purse.prize)} · ${room.players} PLAYERS`;
    if (State.musicOn) startMusic();
    renderPatternGoal();
    renderMasterBoard();
    renderCard();
    renderOpponents();
    renderBalls();
    // pre-game: let the hero swap cards then start
    dom.btnStart.style.display = ''; dom.btnNewcard.style.display = '';
    dom.btnBingo.disabled = true; dom.btnBingo.classList.remove('ready');
    setStatus('Your card is ready — START when you are', '');
  }

  // ---- renders ----
  function renderPatternGoal() {
    const cells = patternCells(State.room.pattern);
    dom.patternGrid.innerHTML = '';
    for (let i = 0; i < 25; i++) {
      const s = document.createElement('span');
      if (i === Core.FREE_INDEX) s.className = 'free';
      else if (cells.has(i)) s.className = 'on';
      dom.patternGrid.appendChild(s);
    }
  }
  function renderMasterBoard() {
    dom.masterBoard.innerHTML = '';
    for (let li = 0; li < 5; li++) {
      const row = document.createElement('div'); row.className = 'mb-row';
      const letter = Core.LETTERS[li];
      const lab = document.createElement('div'); lab.className = 'mb-letter ' + letter; lab.textContent = letter;
      row.appendChild(lab);
      for (let k = 1; k <= 15; k++) {
        const n = li * 15 + k;
        const cell = document.createElement('div');
        cell.className = 'mb-cell ' + letter + (State.calledSet.has(n) ? ' called' : '');
        cell.textContent = n; cell.dataset.n = String(n);
        row.appendChild(cell);
      }
      dom.masterBoard.appendChild(row);
    }
  }
  function markMasterCalled(n, isJust) {
    const cell = dom.masterBoard.querySelector(`.mb-cell[data-n="${n}"]`);
    if (cell) { cell.classList.add('called'); if (isJust) { cell.classList.add('just'); setTimeout(() => cell.classList.remove('just'), 420); } }
  }

  function renderCard() {
    const grid = State.cards[0];
    dom.cardGrid.innerHTML = '';
    const need = State.phase === 'calling' ? new Set(Core.neededNumbers(grid, State.calledSet, State.room.pattern)) : new Set();
    const winShape = State.gameOver && State.winnerIdx === 0 ? Core.cardWins(grid, State.calledSet, State.room.pattern) : null;
    for (let i = 0; i < 25; i++) {
      const cell = document.createElement('div');
      cell.className = 'card-cell';
      if (i === Core.FREE_INDEX) {
        cell.classList.add('free'); cell.textContent = 'FREE';
      } else {
        const n = grid[i];
        const letter = Core.ballLetter(n);
        cell.textContent = n; cell.dataset.idx = String(i); cell.dataset.n = String(n);
        const isDaubed = State.calledSet.has(n) && (State.autoDaub || State.manualDaubed.has(i));
        const daub = document.createElement('div'); daub.className = 'daub ' + letter; cell.appendChild(daub);
        if (isDaubed) cell.classList.add('daubed');
        if (need.has(n)) cell.classList.add('needed');
        if (winShape && winShape.indexOf(i) >= 0) cell.classList.add('winning');
        cell.addEventListener('click', () => heroTapCell(i, n));
      }
      dom.cardGrid.appendChild(cell);
    }
    if (winShape) { for (const idx of winShape) { const c = dom.cardGrid.children[idx]; if (c) c.classList.add('winning'); } }
  }
  function heroTapCell(idx, n) {
    // Manual daub: only meaningful when auto-daub is off and the number is called.
    if (State.phase !== 'calling') return;
    if (!State.calledSet.has(n)) { return; }
    if (!State.autoDaub) {
      State.manualDaubed.add(idx);
      const cell = dom.cardGrid.children[idx];
      if (cell && !cell.classList.contains('daubed')) { cell.classList.add('daubed'); Audio.daub(); }
    }
  }

  function renderOpponents() {
    dom.opponents.innerHTML = '';
    for (let i = 1; i < State.cards.length; i++) {
      const prog = Core.cardProgress(State.cards[i], State.calledSet, State.room.pattern);
      const el = document.createElement('div');
      el.className = 'opp' + (prog.away === 1 && State.phase === 'calling' ? ' close' : '') + (State.gameOver && State.winnerIdx === i ? ' winner' : '');
      const awayTxt = prog.away === 0 ? 'BINGO' : (prog.away + ' away');
      el.innerHTML = `
        <div class="opp-av" style="background:linear-gradient(135deg, hsl(${State.botInfo[i].hue},70%,55%), hsl(${(State.botInfo[i].hue+40)%360},75%,35%))">${initials(State.botInfo[i].name)}</div>
        <div class="opp-name">${State.botInfo[i].name}</div>
        <div class="opp-away ${prog.away===1?'one':''}">${awayTxt}</div>`;
      dom.opponents.appendChild(el);
    }
  }
  function initials(name) {
    const parts = String(name||'?').replace(/[._-]/g,' ').split(/\s+/).filter(Boolean);
    return (parts.length===1 ? parts[0].slice(0,2) : (parts[0][0]+parts[1][0])).toUpperCase();
  }

  function renderBalls() {
    // current ball
    if (State.drawPos === 0) {
      dom.currentBall.className = 'ball current-ball empty';
      dom.currentBall.innerHTML = '<span class="ball-inner"><span class="ball-num">&ndash;</span></span>';
      dom.currentBallLabel.textContent = State.phase === 'pregame' ? 'READY' : 'WAITING';
    }
    // recent
    dom.recentBalls.innerHTML = '<span class="rb-label">LAST</span>';
    const recent = [];
    for (let i = State.drawPos - 1; i >= Math.max(0, State.drawPos - 5); i--) recent.push(State.drawOrder[i]);
    for (const n of recent) {
      const letter = Core.ballLetter(n);
      const b = document.createElement('div'); b.className = 'ball'; b.style.setProperty('--bc', `var(--b-${letter})`);
      b.innerHTML = `<span class="ball-inner"><span class="ball-letter">${letter}</span><span class="ball-num">${n}</span></span>`;
      dom.recentBalls.appendChild(b);
    }
  }
  function showCurrentBall(n) {
    const letter = Core.ballLetter(n);
    dom.currentBall.className = 'ball current-ball pop';
    dom.currentBall.style.setProperty('--bc', `var(--b-${letter})`);
    dom.currentBall.innerHTML = `<span class="ball-inner"><span class="ball-letter">${letter}</span><span class="ball-num">${n}</span></span>`;
    dom.currentBallLabel.textContent = 'BALL ' + State.drawPos + ' OF 75';
    setTimeout(() => dom.currentBall.classList.remove('pop'), 620);
  }

  function setStatus(text, cls) { dom.status.textContent = text; dom.status.className = 'status-banner' + (cls ? ' ' + cls : ''); }

  // ---- start / new card ----
  dom.btnStart.addEventListener('click', async () => {
    if (State.phase !== 'pregame') return;
    Audio.click();
    dom.btnStart.style.display = 'none'; dom.btnNewcard.style.display = 'none';
    await countdown();
    // Guard: if the player left (or the game was torn down) during the 3-2-1,
    // don't kick off a ball loop into a dead/!current game.
    if (State.phase !== 'starting' || !State.room) return;
    beginCalling();
  });
  dom.btnNewcard.addEventListener('click', () => {
    if (State.phase !== 'pregame') return;
    Audio.click();
    State.cards[0] = Core.makeCard(State.rng);
    renderCard();
  });
  async function countdown() {
    State.phase = 'starting';
    dom.countdown.style.display = '';
    for (const t of ['3', '2', '1', 'GO!']) {
      dom.countdown.textContent = t;
      dom.countdown.style.animation = 'none'; void dom.countdown.offsetWidth; dom.countdown.style.animation = '';
      if (t === 'GO!') Audio.go(); else Audio.tick();
      await delay(700);
    }
    dom.countdown.style.display = 'none';
  }

  // ---- calling loop ----
  function beginCalling() {
    State.phase = 'calling';
    setStatus('Daub your card as the balls roll!', '');
    scheduleNextBall(600);
  }
  function scheduleNextBall(ms) {
    if (State.gameOver) return;
    State.callTimer = setTimeout(callNextBall, ms);
  }
  function callNextBall() {
    if (State.gameOver) return;
    if (State.drawPos >= State.drawOrder.length) return; // safety (race guarantees a winner first)
    const n = State.drawOrder[State.drawPos];
    State.drawPos++;
    State.calledSet.add(n);
    Audio.ball();
    showCurrentBall(n);
    markMasterCalled(n, true);
    // auto-daub hero cells for this number
    daubHeroNumber(n);
    // update needed highlights + opponents
    refreshNeededHighlights();
    renderOpponents();
    // Reached the pre-determined winning ball? Resolve and stop calling.
    if (State.drawPos - 1 >= State.race.ballIndex) { resolveWinner(State.race.winnerIdx); return; }
    scheduleNextBall(State.room.callMs);
  }
  function daubHeroNumber(n) {
    const grid = State.cards[0];
    for (let i = 0; i < 25; i++) {
      if (i === Core.FREE_INDEX) continue;
      if (grid[i] === n) {
        const cell = dom.cardGrid.children[i];
        if (State.autoDaub) {
          if (cell && !cell.classList.contains('daubed')) { cell.classList.add('daubed'); Audio.daub(); }
        }
      }
    }
  }
  function refreshNeededHighlights() {
    const grid = State.cards[0];
    const need = new Set(Core.neededNumbers(grid, State.calledSet, State.room.pattern));
    for (let i = 0; i < 25; i++) {
      const cell = dom.cardGrid.children[i]; if (!cell || i === Core.FREE_INDEX) continue;
      const n = grid[i];
      cell.classList.toggle('needed', need.has(n) && !State.calledSet.has(n));
    }
    // hero one-away tension
    const prog = Core.cardProgress(grid, State.calledSet, State.room.pattern);
    if (!State.gameOver && prog.away === 1 && !State._announcedOneAway) {
      State._announcedOneAway = true;
      setStatus('ONE AWAY — come on!', 'one-away');
      Audio.oneAway();
    } else if (prog.away !== 1 && State._announcedOneAway && !State.gameOver) {
      State._announcedOneAway = false;
      setStatus('Daub your card as the balls roll!', '');
    }
  }
  // The winning ball has been called — `idx` is the predetermined winner.
  function resolveWinner(idx) {
    if (State.gameOver) return;
    if (idx === 0) {
      // Hero's card completes now. Light the BINGO button; auto-claim as a
      // safety so a distracted-but-rightful winner never misses their win.
      State.heroWon = true;
      dom.btnBingo.disabled = false; dom.btnBingo.classList.add('ready');
      setStatus('YOU HAVE BINGO — SLAM THE BUTTON!', 'win');
      State.heroAutoClaimTimer = setTimeout(() => claimBingo(0, false), 2400);
    } else {
      setStatus(State.botInfo[idx].name + ' is calling bingo...', '');
      const t = setTimeout(() => claimBingo(idx, false), 1000 + Math.random() * 1200);
      State.botReactionTimers.push({ id: t, idx });
    }
  }

  // Single guarded win resolution.
  function claimBingo(playerIdx, viaButton) {
    if (State.gameOver) return;
    // validate
    if (!Core.cardWins(State.cards[playerIdx], State.calledSet, State.room.pattern)) {
      if (viaButton) { Audio.lose(); setStatus("No bingo yet — keep daubing!", ''); }
      return;
    }
    State.gameOver = true;
    State.winnerIdx = playerIdx;
    State.phase = 'over';
    clearTimersExceptPending();
    endGame(playerIdx);
  }
  function clearTimersExceptPending() {
    if (State.callTimer) { clearTimeout(State.callTimer); State.callTimer = null; }
    if (State.heroAutoClaimTimer) { clearTimeout(State.heroAutoClaimTimer); State.heroAutoClaimTimer = null; }
    for (const t of State.botReactionTimers) clearTimeout(t.id); State.botReactionTimers.length = 0;
  }

  async function endGame(winnerIdx) {
    dom.btnBingo.disabled = true; dom.btnBingo.classList.remove('ready');
    const room = State.room; const purse = Core.prizeFor(room);
    renderCard();       // highlight winning shape if hero
    renderOpponents();  // mark winner
    const heroWon = winnerIdx === 0;
    if (heroWon) {
      Audio.bingo(); if (window.Music) try { Music.duck(0.4, 900); } catch(e){}
      coinShower(); setStatus('BINGO! YOU WIN $' + fmt(purse.prize), 'win');
    } else {
      Audio.win(); setStatus(State.botInfo[winnerIdx].name + ' got BINGO!', '');
    }
    await delay(900);
    // payout + record
    if (heroWon) setBalance(State.balance + purse.prize);
    if (window.History && window.History.record) {
      try { window.History.record('bingo', room.buyIn, heroWon ? purse.prize : 0, 'bingo game'); } catch(e){}
    }
    showResult(heroWon, winnerIdx, purse);
  }

  function showResult(heroWon, winnerIdx, purse) {
    dom.resultTitle.textContent = heroWon ? 'BINGO! YOU WIN!' : 'BINGO CALLED';
    dom.resultTitle.className = heroWon ? 'win' : '';
    if (heroWon) {
      dom.resultSub.textContent = 'You completed ' + Core.PATTERNS[State.room.pattern].name + ' first!';
      dom.resultPrize.style.display = ''; dom.resultPrize.textContent = '+$' + fmt(purse.prize);
    } else {
      dom.resultSub.textContent = State.botInfo[winnerIdx].name + ' completed ' + Core.PATTERNS[State.room.pattern].name + ' first. Better luck next game!';
      dom.resultPrize.style.display = 'none';
    }
    dom.resultModal.classList.add('show');
  }
  dom.resultAgain.addEventListener('click', () => {
    Audio.click(); dom.resultModal.classList.remove('show');
    const room = State.room;
    if (State.balance < room.buyIn) { setStatus('Not enough chips to play again', ''); leaveRoom(); return; }
    resetGameState();
    joinRoom(room);
  });
  dom.resultLeave.addEventListener('click', () => { Audio.click(); dom.resultModal.classList.remove('show'); leaveRoom(); });

  function resetGameState() {
    State.heroWon = false; State._botScheduled = null; State._announcedOneAway = false;
    clearAllTimers();
  }

  // ---- controls ----
  dom.btnAutodaub.addEventListener('click', () => {
    State.autoDaub = !State.autoDaub;
    dom.btnAutodaub.textContent = 'AUTO-DAUB: ' + (State.autoDaub ? 'ON' : 'OFF');
    dom.btnAutodaub.classList.toggle('on', State.autoDaub);
    Audio.click();
    if (State.autoDaub && State.phase === 'calling') {
      // catch up: daub all called numbers
      renderCard();
    }
  });
  dom.btnMusic.addEventListener('click', () => { Audio.click(); setMusic(!State.musicOn); });

  // ---- leave ----
  dom.btnLeave.addEventListener('click', () => {
    if (State.phase === 'calling' && !confirm('Leave the game? Your buy-in is forfeited.')) return;
    leaveRoom();
  });
  function leaveRoom() {
    resetGameState();
    State.room = null; State.phase = 'idle'; State.gameOver = true;
    dom.gameScreen.classList.remove('show');
    dom.roomSelect.style.display = '';
    dom.btnLeave.style.display = 'none';
    dom.resultModal.classList.remove('show');
    renderRooms();
  }

  // ---- add funds ----
  dom.balAdd.addEventListener('click', e => { e.preventDefault(); e.stopPropagation(); Audio.click(); dom.addfundsModal.classList.add('show'); });
  dom.addfundsCancel.addEventListener('click', () => { Audio.click(); dom.addfundsModal.classList.remove('show'); });
  dom.addfundsConfirm.addEventListener('click', () => { Audio.click(); const v = Math.max(0, Math.round(parseFloat(dom.addfundsInput.value)||0)); if (v>0) setBalance(State.balance + v); dom.addfundsModal.classList.remove('show'); renderRooms(); });
  for (const b of document.querySelectorAll('.quick-chip')) b.addEventListener('click', () => { setBalance(State.balance + (+b.dataset.amt)); renderRooms(); Audio.click(); dom.addfundsModal.classList.remove('show'); });

  // ---- coin shower ----
  function coinShower() {
    const cx = window.innerWidth/2, cy = window.innerHeight/2;
    const n = window.matchMedia('(pointer: coarse)').matches ? 18 : 32;
    for (let i = 0; i < n; i++) {
      const c = document.createElement('div'); c.className = 'coin';
      const ang = Math.random()*Math.PI - Math.PI/2, dist = 200 + Math.random()*280;
      c.style.setProperty('--tx', Math.cos(ang)*dist + (Math.random()-0.5)*200 + 'px');
      c.style.setProperty('--ty', -Math.abs(Math.sin(ang))*dist + 700 + 'px');
      c.style.left = cx+'px'; c.style.top = cy+'px'; c.style.animationDuration = (1.3+Math.random()*0.6)+'s';
      dom.particles.appendChild(c); setTimeout(() => c.remove(), 2200);
    }
  }

  document.addEventListener('jackpot-win', () => refreshBal());

  // ---- init ----
  setMusic(true);
  renderRooms();
  window.BingoDebug = {
    inGame: () => !!State.room,
    phase: () => State.phase,
    drawPos: () => State.drawPos,
    gameOver: () => State.gameOver,
    winnerIdx: () => State.winnerIdx,
    expectedWinner: () => State.room ? Core.simulateRace(State.cards, State.drawOrder, State.room.pattern) : null,
    // The ball index at which the actual UI winner's card completes — must
    // equal the race minimum, proving the UI never lets a non-earliest card win.
    winnerCompletesAt: () => (State.winnerIdx >= 0 && State.room)
      ? Core.winningBallIndex(State.cards[State.winnerIdx], State.drawOrder, State.room.pattern) : -1,
    forceFastCalls: () => { if (State.room) State.room.callMs = 120; },
  };
})();
</script>
</body>
</html>
